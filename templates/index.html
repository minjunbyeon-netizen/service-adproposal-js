<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>adproposal-js</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230071E3' rx='3'/><text x='3' y='12' font-size='11' fill='white'>P</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
    <h1>adproposal-js</h1>
    <div class="header-actions">
        <button class="btn btn-secondary btn-sm" onclick="openPresentation()" id="btnPT" disabled>PT</button>
        <button class="btn btn-secondary btn-sm" onclick="exportMd()" id="btnExport" disabled>Export</button>
    </div>
</div>

<div class="main">
    <!-- Left: proposals + upload -->
    <div class="panel panel-left">
        <div class="upload-form">
            <label>제안서 제목</label>
            <input type="text" id="inputTitle" placeholder="예: 영산대학교 광고">
            <label style="margin-top:8px">파일 (PDF/DOCX, 최대 5개)</label>
            <input type="file" id="inputFiles" multiple accept=".pdf,.docx">
            <label style="margin-top:8px">텍스트 직접 입력 (HWP 등)</label>
            <textarea id="inputText" placeholder="HWP 파일 내용을 여기에 붙여넣기..."></textarea>
            <div class="upload-actions">
                <button class="btn btn-primary btn-sm" onclick="handleUpload()" id="btnUpload">업로드</button>
            </div>
        </div>
        <div id="proposalList"></div>
    </div>

    <!-- Center: analysis + TOC -->
    <div class="panel panel-center" id="panelCenter">
        <div class="empty-state" id="centerEmpty">제안서를 선택하거나 새로 만드세요</div>
        <div id="centerContent" style="display:none">
            <div class="analysis-header">
                <h2 id="proposalTitle"></h2>
                <div>
                    <button class="btn btn-primary btn-sm" onclick="startAnalysis()" id="btnAnalyze">분석 시작</button>
                    <button class="btn btn-secondary btn-sm" onclick="autoGenerate()" id="btnAutoGen" disabled>전체 자동 생성</button>
                </div>
            </div>
            <div id="rfpSummary"></div>
            <div id="conceptArea" style="display:none">
                <div class="concept-header">
                    <span class="concept-header-title">컨셉 A/B/C</span>
                    <button class="btn btn-primary btn-sm" onclick="generateConcepts()" id="btnConceptGen">컨셉 생성</button>
                </div>
                <div id="conceptCards"></div>
                <div id="conceptLoading" style="display:none"><span class="loading">컨셉 생성 중</span></div>
            </div>
            <div id="tocTree"></div>
            <div id="analysisLoading" style="display:none"><span class="loading">분석 중</span></div>
        </div>
    </div>

    <!-- Right: section content + chat -->
    <div class="panel panel-right" id="panelRight">
        <div class="empty-state" id="rightEmpty">섹션을 선택하세요</div>
        <div id="rightContent" style="display:none">
            <div class="section-header">
                <h3 id="sectionTitle"></h3>
                <button class="btn btn-primary btn-sm" onclick="generateSection()" id="btnGenerate">초안 생성</button>
            </div>
            <div class="section-content" id="sectionContent"></div>
            <div id="genLoading" style="display:none"><span class="loading">생성 중</span></div>
            <div class="chat-area">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="피드백을 입력하세요..." onkeydown="if(event.key==='Enter')sendChat()">
                    <button class="btn btn-primary btn-sm" onclick="sendChat()" id="btnChat">전송</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>

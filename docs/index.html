const VERSIONS={"v5-2026-04-09.json": {"version": 5, "title": "광고제안서 디벨롭", "date": "2026-04-09", "time": "22:33:01", "change_note": "v5 회의 결과", "project_path": "services/adproposal-js", "briefing": "[유형] 신규 서비스\n[요약] 보고서 -- 소통 / 메시지 -- 광고제안서를 작성해야함. 입찰공고나 안의 내용을 철저히 분석해서 나와 소통하면서 제안서를 만들어가는것이 목표\n[기능] 소통 / 메시지\n[대상] 보고서\n[현재 상태] 수작업으로 하고 있음\n[핵심 문제] 새로운 기회\n[사용자 가치] 체계적 정리\n[줄어드는 것] 작업 시간\n[성공 지표] 만족도\n[목표 수치] 일회성 작업이고, 목표한 기한내에 광고제안서를 만드는것.\n[안 만들면] 계속 수작업\n[사용자] 나만\n[동시 접속] 1명\n[사용 기기] PC만\n[인증] 없음\n[핵심 기능] 제안서 분석, 핵심내용 파악 / 대제목,소제목,본문,등 계층별 제안 / 목차에 맞게 제안(과업요구사항 필수로 따라야함)\n[배포] 로컬 전용\n[DB] 자동\n[우선순위] 빠른 완성 (MVP)\n[참고사항] 일론머스크적 사고, 기존과 틀을깨야함. 대학교광고임. 특별할것이없음. 맨날하던 천편일률적인 말은 하지않으려고함.", "reports": {"review": "[검수 결과: 확인 필요]\n\n---\n\n## 확인이 필요한 항목\n\n**[질문 1 - 유형 오기입 의심]**\n브리핑 유형이 \"신규 서비스\"로 되어 있으나, `adproposal-js`는 현재 CLAUDE.md 프로젝트 목록에 이미 등록된 기존 프로젝트입니다 (`services/adproposal-js/`, localhost:8881). 이번 작업이 기존 서비스의 기능 추가/디벨롭인지, 아니면 별도 새 서비스를 새 경로에 만드는 것인지 명확히 해주세요.\n\n**[질문 2 - 핵심 문제 진술 재기술 필요]**\n핵심 문제가 \"새로운 기회\"라고 되어 있는데, 이는 문제가 아니라 기회 진술입니다. 해결하려는 구체적인 불편이 무엇인지 다시 기술해 주세요. 예: \"입찰공고 분석에 시간이 너무 오래 걸리고 빠뜨리는 항목이 생긴다\" 형식이어야 개발 방향이 잡힙니다.\n\n**[질문 3 - AI 소통 방식 미명시]**\n\"나와 소통하면서 제안서를 만든다\"는 목표가 있는데, 구체적인 상호작용 방식이 불명확합니다. 입찰공고 문서를 직접 업로드해서 분석하는 건지, 내용을 텍스트로 붙여넣는 건지, 아니면 Claude CLI를 중계하는 방식인지 확인이 필요합니다.\n\n**[질문 4 - 기한 미제시]**\n우선순위가 \"빠른 완성(MVP)\"이고 목표가 \"기한 내 완성\"인데, 실제 납품 기한이 언제인지 없습니다. 일회성 작업이라면 기한이 범위를 결정하는 가장 중요한 변수입니다.\n\n---\n\n## v1 제외 사항 (잠정)\n\n1. 이전 제안서 히스토리 저장 및 재조회 -- 일회성 작업이므로 불필요\n2. PDF/HWP 내보내기 -- 텍스트 출력 후 수동 복붙으로 대체\n3. 템플릿 라이브러리 -- 현재 요건은 단일 제안서 작성\n4. 다수 프로젝트 동시 관리 -- 단일 제안서 집중\n5. 이미지/디자인 자동 삽입 제안 -- 텍스트 구조 완성이 우선", "scout": "---\n\n## 프로젝트 조사 보고: services/adproposal-js\n\n---\n\n### 1. 프로젝트 상태\n\n로컬 전용 Flask 웹앱. 광고 입찰공고문(PDF/DOCX)을 업로드하면 claude CLI로 분석하고, 대화형으로 제안서 섹션을 생성/수정하는 SPA. 현재 기동 가능한 상태이며, 실제 데이터(영산대 제안서 V1~V4-10)가 DB 및 docs/ 폴더에 누적되어 있음.\n\n실행: `http://localhost:8881`\n\n---\n\n### 2. 파일 구조\n\n```\nadproposal-js/\n├── app.py                   # Flask 진입점, 포트 8881\n├── requirements.txt\n├── api/\n│   ├── db.py                # SQLite 초기화 (WAL 모드)\n│   ├── proposals.py         # 업로드/분석/내보내기 API\n│   └── chat.py              # 섹션 생성/대화 API\n├── services/\n│   ├── claude_client.py     # claude CLI subprocess 래퍼\n│   ├── parser.py            # PDF/DOCX 텍스트 추출\n│   ├── rfp_analyzer.py      # RFP 교차분석 + 목차 생성\n│   └── section_writer.py    # 섹션 초안 생성 + 대화형 수정\n├── templates/\n│   ├── index.html           # 3패널 SPA\n│   └── presentation.html    # PT 슬라이드 (스크롤 스냅)\n├── static/\n│   ├── app.js\n│   └── style.css\n├── assets/logo/\n│   ├── HIVE/                # android-icon-36x36.png (HIVE 로고)\n│   └── YS/JPG/              # 와이즈유 Artboard 1-26.png 등 28개\n├── data/adproposal.db       # 현재 운영 중인 SQLite DB\n├── docs/                    # 영산대 제안서 V1~V4-10 (txt/json/md/html)\n└── uploads/                 # 임시 업로드 폴더\n```\n\n---\n\n### 3. DB 구조\n\n테이블 3개:\n\n| 테이블 | 주요 컬럼 | 상태값 |\n|--------|----------|--------|\n| proposals | id, title, status, raw_text, rfp_json, toc_json | draft → analyzing → ready |\n| sections | id, proposal_id, level(1/2), title, order_idx, content, status | pending → generating → done |\n| messages | id, section_id, role(user/assistant), content | - |\n\n---\n\n### 4. 현재 구현된 기능\n\n- PDF/DOCX 업로드 (최대 5개, 50MB) 또는 텍스트 직접 입력\n- RFP 교차분석: 발주처/사업명/예산/기간/기한/과업/평가기준 추출\n- 자동 목차 생성 (level 1 대제목 6-8개, level 2 소제목 2-4개)\n- 섹션별 초안 생성 (개별 또는 전체 자동)\n- 대화형 섹션 수정 (최근 20턴 컨텍스트 유지)\n- 마크다운 내보내기 / HTML PT 내보내기\n- PT 슬라이드: 커버 → 대제목 구분 → 소제목 내용 → 엔딩 구조\n- 클리셰 블랙리스트 28개 (MZ세대 감성, 4차산업혁명 등 자동 배제)\n- 영산대 제안서 V1~V4-10 버전 버튼 (헤더 빠른 접근)\n\n---\n\n### 5. 재사용 가능한 코드\n\n| 파일 | 재사용 가치 |\n|------|-----------|\n| services/claude_client.py | Windows PATH 강화 claude CLI 래퍼, 타임아웃 300초, stdin 방식 |\n| services/parser.py | PDF/DOCX 텍스트+테이블 추출, [TABLE] 마크다운 변환 |\n| services/section_writer.py | 클리셰 블랙리스트, 일론머스크식 시스템 프롬프트 |\n| api/db.py | SQLite WAL + FK + busy_timeout 표준 패턴 |\n\n---\n\n### 6. 의존성\n\n```\nflask==3.1.0\npython-dotenv==1.1.0\npdfplumber==0.11.9\npython-docx==1.1.2\nmarkdown==3.7\npytest==8.3.5\n```\n\n외부 런타임: claude CLI (PATH 필요)\n\n---\n\n### 7. 발견된 버그 및 이슈\n\n**\"회의 진행중 / 회의 재개중\" 문구 위치**\n\n이 텍스트는 `services/adproposal-js` 프로젝트 코드 어디에도 존재하지 않음. CEO가 언급한 \"왼쪽에 계속 진행중... 회의 재개중\" 표시는 별개의 서비스인 `services/meeting` (localhost:5050)의 UI에서 표시되는 것으로 판단됨. meeting 서비스와 adproposal-js 서비스가 혼용된 것임.\n\n**코드 버그:**\n\n| 항목 | 위치 | 내용 |\n|------|------|------|\n| btnPT ID 없음 | static/app.js:49 | `document.getElementById('btnPT')` 호출하지만 해당 ID 없음, JS 오류 발생 가능 |\n| 재분석 시 메시지 미정리 | api/proposals.py | 재분석해도 기존 messages 테이블 미삭제 |\n| 전체 자동생성 중 오류 처리 | static/app.js | 중간 오류 발생 시 부분 완료 상태로 멈춤 |\n| 임시 파일 삭제 | api/proposals.py:98 | 추출 실패 시 삭제 미보장 |\n\n**미구현:**\n\n- 컨셉 A/B/C 버전 관리 기능 없음 (CEO 요청 사항이나 미구현)\n- 로고 assets 연동 미완성 (폴더만 존재, PT에 실제 이미지 미연동)\n- 와이즈유 전용 브랜딩 완성 안됨 (PT는 오렌지 #E84E10 사용 중이나 실제 YS 로고 미삽입)\n- tests/ 폴더 비어있음\n\n---\n\n### 8. 제약사항\n\n- claude CLI가 PATH에 등록되어 있어야 동작 (없으면 전체 기능 불가)\n- SQLite workers=1 (threaded=True이나 동시 쓰기 위험)\n- 장시간 분석/생성 중 UI 블로킹 (비동기 미구현, 사용자는 결과 대기)\n- 로컬 전용, 배포 설정 없음 (railway.toml, Dockerfile 없음)\n\n---\n\n### 9. 핵심 요약\n\n현재 골격은 완성 상태이며 기본 기능(업로드→분석→섹션생성→대화수정→PT내보내기)은 동작 가능한 구조임. CEO가 요청한 컨셉 A/B/C 3개 버전 관리, 와이즈유 로고 실연동, btnPT 버그 수정이 우선 처리 대상. \"회의 진행중\" 문구는 이 프로젝트가 아닌 `meeting` 서비스(port 5050)의 문제임.", "estimator": "브리핑 분석 및 구현 범위 산정 완료했습니다.\n\n---\n\n# 범위 산정 보고서: adproposal-js\n\n## 프로젝트 현황\n\n### 기존 코드 규모\n| 구성 | 코드량 | 상태 |\n|------|--------|------|\n| Backend (api/ + services/) | 785줄 | 기본 CRUD + AI 분석 완성 |\n| Frontend (JS + HTML) | 754줄 | 3패널 분석 UI 완성 |\n| 총합 | 1,634줄 | MVP 수준 |\n\n### 기존 기능\n- 파일 업로드 (PDF/DOCX)\n- RFP 교차분석 (Claude AI)\n- TOC 자동 생성\n- 섹션별 초안 생성\n- 대화형 수정 (채팅)\n- 마크다운 내보내기\n\n### CEO 추가 요청\n1. 프리젠테이션 모드 (PPT 형태)\n2. 컨셉 3개 버전 (A/B/C)\n3. 내일 1차 초안 발표 가능\n4. 회의 진행 중 상태 표시 버그 해결\n\n---\n\n## 구현 범위 (2 Phase)\n\n### Phase 1: 내일 발표 전 (URGENT)\n\n#### 신규 파일 (4개 생성)\n1. **api/presentation.py** (150-200줄)\n   - GET /api/presentation/{id} - 현재 컨셉 조회\n   - POST /api/presentation/{id}/concept - 컨셉 전환 (A/B/C)\n   - GET /api/presentation/{id}/slides - 슬라이드 목록\n   \n2. **services/concept_generator.py** (150-200줄)\n   - 컨셉별 섹션 내용 생성\n   - placeholder → 실제 내용 변환\n   \n3. **static/presentation.js** (200-250줄)\n   - 슬라이드 네비게이션 (화살표/클릭)\n   - 컨셉 토글 (A/B/C 버튼)\n   - 실시간 렌더링\n\n4. **static/concept-handler.js** (80-120줄)\n   - 컨셉 전환 로직\n   - 섹션 placeholder 처리\n\n#### 수정 파일 (7개)\n1. **app.py** (+20줄) - presentation 블루프린트 등록\n2. **api/db.py** (+40줄) - presentation, slide, concept 테이블\n3. **api/chat.py** (+30줄) - 컨셉 기반 생성\n4. **templates/index.html** (+30줄) - 프리젠테이션 진입 버튼\n5. **templates/presentation.html** (+80줄) - 컨셉 토글 UI 추가\n6. **static/style.css** (+150줄) - 프리젠테이션 UI 스타일\n7. **static/app.js** (+60줄) - presentation 상태 관리\n\n#### DB 변경\n| 테이블 | 컬럼 | 목적 |\n|--------|------|------|\n| presentations | id, proposal_id, title, active_concept | 프리젠테이션 저장 |\n| slides | id, presentation_id, order, title, type | 슬라이드 메타 |\n| slide_concepts | id, slide_id, concept, content | A/B/C 컨셉별 내용 |\n\n### Phase 2: 디자인 & 확장 (이후)\n\n#### 신규 파일 (2개)\n1. **services/pdf_exporter.py** (100-150줄) - PPT/PDF 변환\n2. **api/export.py** (80-120줄) - 내보내기 API\n\n#### 수정 파일 (3개)\n1. **templates/presentation.html** (+150줄) - 애니메이션 & 트랜지션\n2. **static/style.css** (+200줄) - 고급 스타일\n3. **app.py** (+10줄) - export 블루프린트\n\n---\n\n## 복잡도 등급\n\n| 항목 | 등급 | 사유 |\n|------|------|------|\n| 전체 구현 | **중간** | 3-4단계 + 6파일 동시 수정 |\n| DB | **낮음** | 기존 proposals 확장 (새 테이블 3개) |\n| API | **중간** | 6개 엔드포인트 (CRUD + 상태 전환) |\n| 프론트 | **중간-높음** | 상태관리 + DOM 조작 + 실시간 렌더링 |\n| AI 통합 | **낮음** | 기존 claude_client.py 재활용 |\n\n---\n\n## 구현 순서 (권장)\n\n**내일 발표 전** (4-6시간):\n1. DB 테이블 추가 (30분)\n2. api/presentation.py 작성 (1시간)\n3. services/concept_generator.py 작성 (1시간)\n4. presentation.html 개선 (1시간)\n5. presentation.js + concept-handler.js (1시간)\n6. 통합 & 버그 수정 (1-2시간)\n\n**회의 중** (상호 작용으로 진행):\n- 컨셉 A/B/C 내용 기반 피드백\n- 섹션 재생성 (Claude AI)\n- 실시간 슬라이드 갱신\n\n**이후** (디자인 & 배포):\n- 애니메이션 추가\n- PPT 변환 (optional)\n- 프로덕션 배포\n\n---\n\n## 주의사항\n\n- **파일 크기**: presentation.html (현재 320줄 → 최대 500줄) - 분할 권장\n- **상태 관리**: 컨셉 선택 + 슬라이드 위치 + 채팅 상태 3개 동시 관리\n- **회의 연동**: 회의 시스템의 SSE와 충돌 가능성 → 테스트 필수\n- **성능**: 슬라이드 5개 × 컨셉 3개 = 15개 렌더링 → 가상 스크롤 고려\n\n---\n\n**총 작업량**: Phase 1: 4-6시간 / Phase 2: 5-8시간\n**파일 추가**: 4개 (신규) / 수정: 7개\n\nGitHub 커밋 추천:\n1. `feat: add presentation mode with concept A/B/C`\n2. `feat: add presentation API endpoints`\n3. `feat: implement real-time concept switching`\n4. `fix: resolve meeting status display bug`", "strategy": "이제 충분한 조사가 완료되었습니다. 6-Pager를 작성합니다.\n\n---\n\n# 6-Pager: adproposal-js 광고제안서 디벨롭\n\n---\n\n## 1. 목적\n\n입찰공고 분석부터 발표용 PT 산출물까지 한 곳에서 완결하는 로컬 전용 도구를 완성한다. 현재 \"분석-목차생성-섹션작성-대화수정\" 파이프라인은 동작하지만, CEO가 실제로 필요한 것은 **내일 대표님 앞에서 보여줄 수 있는 HTML PT 슬라이드**다. 즉, 코드 골격이 아니라 \"발표 가능한 콘텐츠\"가 이 프로젝트의 최종 산출물이다.\n\n핵심 전환: 도구 개발 -> 콘텐츠 제작. 도구는 이미 80% 완성이므로, 남은 20% 기능(컨셉 A/B/C, 로고 연동, 버그 수정)을 빠르게 메운 뒤 **대화형 회의를 통해 실제 제안서 내용을 채우는 것**이 이번 회의의 본질이다.\n\n---\n\n## 2. 배경\n\n**현재 상태:**\n- Flask 웹앱(localhost:8881) 기동 가능. SQLite DB에 영산대 제안서 V1~V4-10 데이터 누적.\n- 업로드 -> RFP 분석 -> 목차 생성 -> 섹션별 초안 -> 대화 수정 -> PT 내보내기 파이프라인 존재.\n- presentation.html은 이미 320줄 규모의 완성된 슬라이드 템플릿 보유 (커버, L1 디바이더, L2 콘텐츠, 엔딩).\n- 와이즈유 로고 28개(assets/logo/YS/JPG/), HIVE 로고 1개(assets/logo/HIVE/) 확보.\n\n**미완성 사항:**\n- 컨셉 A/B/C 3개 버전 관리 기능 미구현 (CEO 명시 요청).\n- 로고 이미지가 PT에 경로만 연결, 실제 표시 검증 미완.\n- btnPT 버튼(app.js:49)이 HTML에 ID 없어 JS 오류 가능.\n- \"회의 진행중 / 회의 재개중\" 표시는 meeting 서비스(port 5050) 문제이며 이 프로젝트와 무관.\n\n**시간 제약:** 내일 대표님 1차 초안 발표. 디자인/트랜지션은 후순위, 전체 흐름 확보가 우선.\n\n---\n\n## 3. 범위\n\n### [포함]\n\n| 순서 | 항목 | 산출물 |\n|------|------|--------|\n| 1 | 기존 버그 수정 | btnPT ID 추가, 임시파일 삭제 보장 |\n| 2 | 컨셉 A/B/C 텍스트 표시 | 슬라이드 내 concept-card 3열 그리드 (이미 CSS 존재, 데이터 연동만) |\n| 3 | 로고 실연동 확인 | YS 로고(Artboard 2.png) 커버/엔딩, HIVE 로고 표시 검증 |\n| 4 | 와이즈유 전용 브랜딩 | 기존 오렌지(#E84E10) + 다크그레이(#58595B) 유지, 프로젝터 대형 화면 최적화 |\n| 5 | 대화형 회의로 실제 콘텐츠 제작 | 목차별 섹션 내용 생성/수정, 컨셉 3개 버전 텍스트 확정 |\n| 6 | PT HTML 최종 출력 | 내일 발표용 전체 흐름 완성본 |\n\n### [제외  수립. 버그 수정 + 컨셉 A/B/C + 로고 연동의 파일별 구현 순서 확정 필요. |\n| 기타 팀 | 불필요 | 로컬 전용, 1인 사용, 배포 없음, 보안/인프라 이슈 없음. 순수 개발 + 콘텐츠 작업. |\n\n소집 대상: **개발팀장 1명**만. 이유: 프로젝트가 이미 골격 완성 상태이고, 남은 작업은 기능 보완 + 콘텐츠 제작이므로 아키텍처 논의나 보안 검토가 불필요하다. 개발팀장이 구현 계획을 확정하면 바로 실행에 들어간다.\n\n---\n\n## CEO 질문사항 (최대 3개)\n\n1. **영산대 RFP 원문이 이미 시스템에 업로드/분석되어 있는 상태인가?** DB에 V1~V4-10 데이터가 있는 것은 확인했으나, 현재 \"ready\" 상태의 proposal이 어떤 것인지, 그리고 이것을 그대로 사용할지 새로 분석할지 확인이 필요하다.\n\n2. **컨셉 A/B/C의 방향성이 이미 머릿속에 있는가, 아니면 AI가 3개를 제안하는 것을 원하는가?** 컨셉별 차별점(예: A=데이터 기반, B=감성 스토리텔링, C=실험적 등)을 CEO가 지정하면 생성 품질이 올라간다. 방향이 없으면 AI가 3개를 생성한 뒤 CEO가 선택/수정하는 방식으로 진행한다.\n\n3. **내일 발표 시 빈 섹션이 있어도 괜찮은가?** 전체 흐름(목차 구조 + 주요 섹션 내용)은 확보하되, 시간 부족으로 일부 섹션이 placeholder 상태일 수 있다. \"전체 구조는 보여주되 세부는 추후 보완\"이 허용되는지, 아니면 모든 섹션에 최소한의 내용이 반드시 있어야 하는지 확인한다.", "engineering": "충돌 사항을 파악했습니다. 이제 통합 구현 계획서를 작성합니다.\n\n---\n\n# 통합 구현 계획서: adproposal-js 광고제안서 디벨롭\n\n> 작성일: 2026-04-09 | 대상: C:\\dev\\services\\adproposal-js\n\n---\n\n## 1. 아키텍처 결정\n\n### AD-1. 컨셉 A/B/C 데이터 모델\n\n**결정: concepts 별도 테이블, proposal_id 기준 FK**\n\n3개 보고서 간 충돌이 있었다.\n\n| 보고서 | 제안 | 판정 |\n|--------|------|------|\n| 아키텍처 | sections.concept_variants JSON 컬럼 (섹션 레벨) | 기각 |\n| 구현계획 | concepts 테이블, section_id FK (섹션 레벨) | 기각 |\n| API/DB | concepts 테이블, proposal_id FK (제안서 레벨) | **채택** |\n\n**근거:** 광고 제안서의 컨셉 방향(데이터 기반 / 감성 스토리텔링 / 역발상)은 제안서 전체에 적용되는 전략이다. 섹션별로 컨셉이 다르면 발표 일관성이 깨진다. proposal_id FK + UNIQUE(proposal_id, label) 제약이 이 의미를 정확히 표현한다. JSON 컬럼은 CHECK 제약과 UNIQUE 제약을 걸 수 없어 데이터 무결성이 약하다.\n\n### AD-2. 로고 서빙 방식\n\n**결정: app.py에 `/assets/<path:filename>` 라우트 추가**\n\n아키텍처 보고는 proposals.py Blueprint에 추가를 제안했으나, 로고 서빙은 특정 Blueprint 소관이 아닌 앱 전역 기능이다. app.py에 직접 등록한다.\n\n```python\n@app.route('/assets/<path:filename>')\ndef serve_assets(filename):\n    return send_from_directory('assets', filename)\n```\n\nassets/ 전체를 서빙하여 향후 다른 에셋 추가에도 대응한다. static/으로의 파일 이동은 불필요하다.\n\n### AD-3. PT 내보내기 방식\n\n**결정: Jinja2 서버 렌더링 단일 HTML 유지**\n\n현재 presentation.html이 scroll-snap 기반 슬라이드를 320줄로 이미 구현하고 있다. reveal.js 등 외부 프레임워크 도입은 CDN 의존성 + 오프라인 발표 불가 리스크가 있다. 기존 구조를 Jinja2 변수 주입으로 확장한다.\n\n### AD-4. 컨셉 생성 전략\n\n**결정: claude CLI 1회 호출로 A/B/C 3개 동시 생성**\n\n건당 30-60초인 claude CLI를 3회 호출하면 2-3분 소요. 1회 호출로 JSON 배열 응답을 받으면 1/3로 단축. 실패 시 개별 호출 fallback 구현.\n\n### AD-5. API 라우트 네이밍\n\n**결정: 컨셉 라우트는 `/api/proposals/<id>/concepts` 하위로 통일**\n\n구현계획은 `/api/sections/<id>/concepts`를 제안했으나, AD-1에서 컨셉을 제안서 레벨로 결정했으므로 라우트도 proposals 하위가 맞다. 기존 proposals.py Blueprint에 추가한다.\n\n---\n\n## 2. 구현 단계\n\n### Phase A. 버그 수정 및 안정화 (30분, 의존성 없음)\n\n| 순번 | 파일 | 작업 | 비고 |\n|------|------|------|------|\n| A-1 | templates/index.html | `id=\"btnPT\"` 버튼 추가. 하단 내보내기 영역에 배치. currentProposalId로 openPT() 호출. | 현재 하드코딩된 proposal ID 버튼(V1~V3, 4-1~4-10)만 존재. 선택된 제안서로 PT 여는 범용 버튼 필요. |\n| A-2 | static/app.js | `document.getElementById('btnPT')` 호출 전 null 체크. selectProposal() 내에서 btnPT 활성/비활성 처리. | 49번 라인 부근. |\n| A-3 | api/proposals.py | upload_and_analyze() 핸들러에 try/finally 블록 추가. `os.unlink(tmp_path)` 보장. | 임시파일 누적 방지. |\n\n### Phase B. 컨셉 A/B/C 기능 (2-3시간, Phase A 완료 후)\n\n| 순번 | 파일 | 작업 | 비고 |\n|------|------|------|------|\n| B-1 | api/db.py | concepts 테이블 CREATE 문 추가. proposals 테이블에 selected_concept 컬럼 ALTER 추가. migrate_db() 내 idempotent 처리. | 스키마 상세는 3절 참조. |\n| B-2 | services/section_writer.py | `generate_concepts()`, `parse_concept_response()`, `build_concept_prompt()` 3개 함수 추가. | claude CLI 1회 호출, JSON 배열 파싱. 실패 시 placeholder 반환. |\n| B-3 | api/proposals.py | 컨셉 CRUD 라우트 4개 추가: GET concepts, POST generate, PUT edit, POST select. | 라우트 상세는 3절 참조. |\n| B-4 | static/app.js | `renderConceptCards(concepts)` 함수 추가. 섹션 패널 하단 3열 카드. \"컨셉 생성\" 버튼 + 선택 핸들러. | 기존 `.concept-card` CSS 클래스 활용 (presentation.html L146-156에 이미 정의). |\n\n### Phase C. 로고 실연동 (30분, Phase A와 병렬 가능)\n\n| 순번 | 파일 | 작업 | 비고 |\n|------|------|------|------|\n| C-1 | app.py | `/assets/<path:filename>` 라우트 추가. send_from_directory('assets', filename). | |\n| C-2 | templates/presentation.html | 커버 슬라이드: YS 로고 src=\"/assets/logo/YS/JPG/Artboard 2.png\". 엔딩 슬라이드: HIVE 로고. loading=\"eager\" + onerror=\"this.style.display='none'\" 추가. | 발표용이므로 lazy 아닌 eager. |\n| C-3 | static/style.css | `.slide-cover .logo-wrap`, `.slide-end .logo-wrap` 정렬 스타일 추가. | |\n\n### Phase D. PT 출력 완성 (1-2시간, Phase B+C 완료 후)\n\n| 순번 | 파일 | 작업 | 비고 |\n|------|------|------|------|\n| D-1 | api/proposals.py | 기존 `GET /api/proposals/<id>/export-html` 핸들러 확장. concepts(selected) 데이터 조회 추가. | 기존 라우트 경로 유지. 신규 라우트 불필요. |\n| D-2 | api/db.py | `get_proposal_with_concepts(proposal_id)` 함수 추가. proposals + concepts JOIN 조회. | |\n| D-3 | templates/presentation.html | Jinja2 변수 주입으로 동적 렌더링. `{% for section in sections %}` 슬라이드 자동 생성. 컨셉 카드 3열 조건부 표시. | |\n\n### 실행 순서 다이어그램\n\n```\nPhase A (30분) ──┬──> Phase B (2-3시간) ──┐\n                 │                         ├──> Phase D (1-2시간)\nPhase C (30분) ──┘─────────────────────────┘\n```\n\n총 예상: 4-6시간. Phase A+C 병렬 시작, B 완료 후 D 착수.\n\n---\n\n## 3. API / DB 상세\n\n### 3-1. DB 스키마 변경\n\n**신규 테이블: concepts**\n\n| 컬럼 | 타입 | 제약 | 설명 |\n|------|------|------|------|\n| id | INTEGER | PK AUTOINCREMENT | |\n| proposal_id | INTEGER | NOT NULL, FK -> proposals(id) ON DELETE CASCADE | |\n| label | TEXT | NOT NULL, CHECK(label IN ('A','B','C')) | 컨셉 구분 |\n| title | TEXT | NOT NULL | 컨셉명 (예: \"데이터 기반 접근\") |\n| body | TEXT | NOT NULL DEFAULT '' | 컨셉 설명 본문 |\n| created_at | TEXT | NOT NULL DEFAULT (datetime('now')) | |\n\n제약: UNIQUE(proposal_id, label) -- 제안서당 A/B/C 각 1개.\n\n```sql\nCREATE TABLE IF NOT EXISTS concepts (\n    id          INTEGER PRIMARY KEY AUTOINCREMENT,\n    proposal_id INTEGER NOT NULL REFERENCES proposals(id) ON DELETE CASCADE,\n    label       TEXT    NOT NULL CHECK(label IN ('A','B','C')),\n    title       TEXT    NOT NULL,\n    body        TEXT    NOT NULL DEFAULT '',\n    created_at  TEXT    NOT NULL DEFAULT (datetime('now')),\n    UNIQUE(proposal_id, label)\n);\n```\n\n**기존 proposals 테이블 컬럼 추가**\n\n| 컬럼 | 타입 | 기본값 | 설명 |\n|------|------|--------|------|\n| selected_concept | TEXT | NULL | 확정된 컨셉 ('A'/'B'/'C' 또는 NULL) |\n\n```sql\n-- migrate_db() 내 idempotent 처리\nALTER TABLE proposals ADD COLUMN selected_concept TEXT DEFAULT NULL;\n```\n\n### 3-2. API 라우트 전체\n\n**기존 라우트 (변경 없음)**\n\n| 메서드 | 경로 | 기능 | 파일 |\n|--------|------|------|------|\n| GET | /api/proposals | 제안서 목록 | proposals.py |\n| POST | /api/proposals/upload | 파일 업로드 + 생성 | proposals.py |\n| GET | /api/proposals/`<id>` | 제안서 상세 | proposals.py |\n| DELETE | /api/proposals/`<id>` | 제안서 삭제 | proposals.py |\n| POST | /api/proposals/`<id>`/analyze | RFP 분석 | proposals.py |\n| GET | /api/proposals/`<id>`/export | 마크다운 내보내기 | proposals.py |\n| GET | /api/proposals/`<id>`/export-html | PT HTML 렌더링 (확장) | proposals.py |\n| POST | /api/chat/sections/`<id>`/generate | 섹션 초안 | chat.py |\n| POST | /api/chat/sections/`<id>`/message | 피드백 반영 | chat.py |\n| GET | /api/chat/sections/`<id>`/messages | 대화 이력 | chat.py |\n| PUT | /api/chat/sections/`<id>` | 섹션 수동 편집 | chat.py |\n\n**신규 라우트**\n\n| 메서드 | 경로 | 요청 | 응답 | 파일 |\n|--------|------|------|------|------|\n| GET | /api/proposals/`<id>`/concepts | - | `{\"ok\":true, \"data\":[{id,label,title,body,created_at}]}` | proposals.py |\n| POST | /api/proposals/`<id>`/concepts/generate | `{\"direction\":\"\"}` (선택) | `{\"ok\":true, \"data\":[A,B,C]}` | proposals.py |\n| PUT | /api/concepts/`<id>` | `{\"title\":\"...\",\"body\":\"...\"}` | `{\"ok\":true, \"data\":{id,label,title,body}}` | proposals.py |\n| POST | /api/proposals/`<id>`/concepts/select | `{\"label\":\"A\"}` | `{\"ok\":true}` | proposals.py |\n| GET | /assets/`<path:filename>` | - | 파일 바이너리 | app.py |\n| GET | /health | - | `{\"ok\":true, \"service\":\"adproposal-js\"}` | app.py |\n\n**충돌 해소 기록:** 구현계획의 `/api/sections/<id>/concepts` 경로는 기각. 컨셉이 제안서 레벨이므로 `/api/proposals/<id>/concepts`로 통일. export 라우트는 기존 `/api/proposals/<id>/export-html` 경로를 확장하여 사용. API/DB 보고의 `/api/proposals/<id>/export/pt` 신규 경로는 불필요.\n\n### 3-3. 핵심 함수 시그니처\n\n```python\n# --- api/db.py ---\ndef init_db() -> None\n    # concepts 테이블 CREATE + proposals.selected_concept ALTER\n\ndef get_concepts(proposal_id: int) -> list[dict]\n    # concepts 테이블에서 proposal_id 기준 조회\n\ndef upsert_concepts(proposal_id: int, concepts: list[dict]) -> None\n    # INSERT OR REPLACE. 기존 concepts 덮어씀.\n\ndef select_concept(proposal_id: int, label: str) -> None\n    # proposals.selected_concept = label 업데이트\n\ndef get_proposal_with_concepts(proposal_id: int) -> dict\n    # proposals + concepts JOIN. PT 렌더링용.\n\n# --- services/section_writer.py ---\ndef generate_concepts(rfp_json: dict, proposal_title: str) -> list[dict]\n    # claude CLI 1회 호출. [{label, title, body}] 반환.\n\ndef build_concept_prompt(rfp_json: dict, proposal_title: str) -> str\n    # A: 데이터/수치, B: 감성/스토리텔링, C: 역발상\n\ndef parse_concept_response(raw: str) -> list[dict]\n    # JSON 블록 추출. 실패 시 placeholder 반환.\n\n# --- api/proposals.py (신규 핸들러) ---\ndef get_proposal_concepts(proposal_id: int)      # GET\ndef generate_proposal_concepts(proposal_id: int)  # POST generate\ndef update_concept(concept_id: int)               # PUT\ndef select_proposal_concept(proposal_id: int)     # POST select\n```\n\n---\n\n## 4. 리스크 및 완화\n\n| 리스크 | 심각도 | 완화 방안 |\n|--------|--------|----------|\n| claude CLI 타임아웃으로 컨셉 3개 동시 생성 실패 | HIGH | timeout 120초 설정. 실패 시 개별 컨셉 1개씩 fallback 호출 3회. 최악의 경우 CEO 수동 입력 허용 (PUT /api/concepts 활용). |\n| btnPT 누락으로 PT 내보내기 불가 | HIGH | Phase A 첫 작업으로 즉시 수정. 하드코딩 버튼(V1~4-10) 대신 currentProposalId 기반 범용 버튼으로 교체. |\n| 한글/공백 포함 로고 파일명 URL 인코딩 문제 | MEDIUM | send_from_directory가 자동 처리. presentation.html에서 경로 문자열을 그대로 사용. onerror 핸들러로 로고 없어도 레이아웃 유지. |\n| presentation.html Jinja2 렌더링 시 XSS | LOW | Jinja2 autoescaping 기본 활성. 마크다운 HTML 변환 부분은 bleach 등으로 sanitize 후 `\\|safe` 사용. |\n| 임시파일 누적으로 디스크 부족 (로컬) | LOW | Phase A에서 try/finally + os.unlink() 보장. |\n\n---\n\n## 5. 충돌 해소 요약\n\n| 항목 | 충돌 내용 | 최종 결정 | 사유 |\n|------|----------|----------|------|\n| 컨셉 데이터 레벨 | 아키텍처/구현: 섹션 레벨 vs API/DB: 제안서 레벨 | 제안서 레벨 | 광고 컨셉은 전체 제안서의 전략 방향. 섹션별 분기는 발표 일관성 파괴. |\n| 컨셉 저장 방식 | 아키텍처: JSON 컬럼 vs 구현/API: 별도 테이블 | 별도 테이블 | CHECK/UNIQUE 제약으로 데이터 무결성 확보. 1인 도구여도 테이블 6컬럼은 과설계가 아님. |\n| assets 라우트 위치 | 아키텍처: proposals.py vs 구현/API: app.py | app.py | 로고 서빙은 앱 전역 기능. Blueprint 소관 아님. |\n| export 라우트 경로 | 구현: 신규 `/export/html` vs API/DB: 신규 `/export/pt` | 기존 `/export-html` 확장 | 이미 동작하는 라우트가 있음(app.js:331 openPT 함수가 참조 중). 경로 변경은 프론트 수정 유발. |\n| 컨셉 API 경로 | 구현: `/sections/<id>/concepts` vs API/DB: `/proposals/<id>/concepts` | `/proposals/<id>/concepts` | AD-1 결정(제안서 레벨)에 일관. |", "executive-brief": "---\n\n# EXECUTIVE BRIEF\n**프로젝트: adproposal-js 광고제안서 디벨롭**\n작성일: 2026-04-09\n\n---\n\n## PROBLEM\n\n입찰공고 분석부터 발표 자료 완성까지 전 과정을 수작업으로 처리하고 있어, 내일 대표님 앞에서 보여줄 완성도 있는 1차 초안을 제한된 시간 안에 만들어낼 수 없다. 기존 도구(localhost:8881)는 골격의 80%가 완성되어 있으나, 발표 가능한 콘텐츠 산출물은 0%다.\n\n---\n\n## SOLUTION\n\n기존 Flask 기반 도구의 잔여 버그를 즉시 수정하고, 컨셉 A/B/C 3개 버전 표시와 와이즈유 브랜딩을 추가한 뒤, 대화형 회의를 통해 실제 발표용 HTML 슬라이드 전체 흐름을 오늘 안에 완성한다.\n\n---\n\n## SCOPE (v1)\n\n**포함:**\n- 기존 버그 수정 (btnPT ID 누락 등 JS 오류 즉시 해결)\n- 컨셉 A/B/C 텍스트 분기 표시 (기존 CSS 재활용, DB 추가 없이 최소 구현)\n- 와이즈유/HIVE 로고 실연동 및 브랜드 컬러 확정 (오렌지 #E84E10)\n- 대화형 회의로 목차 전 섹션 콘텐츠 작성 (과업요구사항 100% 매핑)\n- 프로젝터 대형 화면(1920x1080 이상) 레이아웃 검증\n\n**제외:**\n- PPT/PDF 파일 변환 (HTML 슬라이드를 프로젝터에서 직접 사용)\n- 애니메이션, 트랜지션, 모핑 효과 (2차 작업)\n- Railway 프로덕션 배포 (로컬 전용)\n- 테스트 코드 작성 (일회성 도구, 시간 제약)\n- 히스토리 저장 및 다중 제안서 관리\n\n---\n\n## SUCCESS METRICS\n\n1. 전체 슬라이드 흐름 완성률: 커버부터 엔딩까지 끊김 없이 전환 -- 목표 100%\n2. 컨셉 3개 버전 표시: A/B/C 모두 해당 섹션에 정상 노출 -- 목표 3/3\n3. CEO 발표 승인: 내일 대표님 발표 전 \"보여줄 수 있는 수준\" CEO 최종 확인 -- 목표 오늘 중 완료\n\n---\n\n## KEY RISKS\n\n1. **AI 응답 지연으로 섹션 생성 블록** -- 실패 시 수동 텍스트 직접 입력으로 즉시 우회하여 발표 흐름 보장\n2. **시간 내 전체 섹션 미완성** -- 빈 섹션에 \"[작성 예정]\" placeholder 선배치 후 우선순위 높은 섹션부터 채움\n3. **프로젝터 화면 레이아웃 깨짐** -- 기존 100vw/100vh 기반 CSS를 1920x1080 기준으로 사전 테스트\n\n---\n\n## DECISION REQUIRED\n\n**개발팀장 1명 즉시 소집 승인.** 구현 순서 확정 후 바로 실행 진입. 추가 팀(보안/인프라/기획) 소집은 불필요. CEO는 컨셉 A/B/C 방향성(자체 지정 또는 AI 제안 후 선택) 및 내일 발표 시 빈 섹션 허용 여부를 지금 결정해야 한다.\n\n---"}}, "v4-2026-04-09.json": {"version": 4, "title": "광고제안서 k(Python)인데, 서비스명에 `-js`가 붙어 있습니다. JS 기반으로 만들 계획인가요, 아니면 단순 구분자인가요? 기술 스택을 명시해 주세요.\n\n**4. 성공 지표 \"만족도\"는 측정 기준이 없습니다.**\n\"만족\"의 판단 기준이 없으면 완료 여부를 팀이 알 수 없습니다. 예: \"기한 내 제안서 1건 완성\", \"AI 초안 기준 수정 횟수 3회 이하\" 등으로 구체화해 주세요.\n\n---\n\n### v1 제외 사항 (잠정)\n\n1. **제안서 히스토리 저장 및 버전 관리** - 일회성 작업이므로 DB 누적 관리 불필요\n2. **PDF / DOCX 내보내기** - 화면 확인 후 수동 복사로 충분\n3. **입찰공고 자동 크롤링 / URL 파싱** - 직접 텍스트 붙여넣기로 MVP 처리\n4. **템플릿 저장 및 재사용 기능** - 단건 프로젝트이므로 범위 외\n5. **이미지 / 인포그래픽 배치 제안** - 텍스트 계층 구조 완성 후 2차에서 검토", "scout": "## 프로젝트 탐색 보고서: services/adproposal-js\n\n### 현재 상태: 기획 완료 / 구현 미시작\n\n---\n\n### 파일 구조\n\n```\nC:\\dev\\services\\adproposal-js\\\n└── docs/\n    ├── index.html          (88 KB) -- 문서 뷰어\n    ├── index.json          (421 B) -- 버전 메타\n    ├── v1-2026-04-09.json  (26 KB) -- 초기 기획\n    └── v2-2026-04-09.json  (53 KB) -- 최종 확정 계획\n```\n\n소스 코드 없음. `docs/` 만 존재.\n\n---\n\n### 확정된 기술 스택 (v2 engineering 문서 기준)\n\n| 항목 | 결정값 |\n|------|--------|\n| 서버 | Flask (Python 3.11) |\n| DB | SQLite WAL, 3개 테이블 |\n| AI | anthropic SDK 직접 (SSE 스트리밍) |\n| 프론트 | 바닐라 HTML/CSS/JS |\n| 실행 포트 | localhost:5060 |\n| 배포 | 로컬 전용 |\n\n---\n\n### DB 스키마 (설계 완료)\n\n| 테이블 | 역할 |\n|--------|------|\n| `proposals` | 공고 1건 = 제안서 1건 (title, raw_text, rfp_summary, toc_json, status) |\n| `sections` | 목차 항목 (level 1/2/3, title, order_idx, content, status) |\n| `messages` | 섹션별 대화 이력 (role, content) |\n\n---\n\n### API 엔드포인트 (예정)\n\n```\nPOST /api/proposals/upload           -- 파일 업로드 (PDF/HWP/DOCX, 최대 5개)\nGET  /api/proposals/<id>             -- 제안서 상세\nGET  /api/chat/proposals/<id>/analyze   -- RFP 분석 SSE\nGET  /api/chat/sections/<id>/generate  -- 섹션 초안 생성 SSE\nPOST /api/chat/sections/<id>/message   -- 사용자 메시지 저장\nGET  /api/chat/sections/<id>/reply     -- AI 응답 SSE\n```\n\n---\n\n### 재사용 가능한 기존 자산\n\n`services/autoproposal` 에서 70% 이상 재사용 가능:\n\n| 자산 | 처리 |\n|------|------|\n| `autoproposal/services/parser.py` | 그대로 복사 (PDF 파싱) |\n| `autoproposal/app.py` | 구조 참조 후 수정 |\n| `autoproposal/requirements.txt` | weasyprint/Pillow 제거 후 사용 |\n| `autoproposal/services/generator.py` | 프롬프트 방법론만 참고 |\n\n---\n\n### 신규 작성 필요 파일\n\n- `api/db.py` -- 신규 3테이블 스키마\n- `services/rfp_analyzer.py` -- RFP 분석 + 목차 추출\n- `services/section_writer.py` -- 섹션 생성 + 대화 로직\n- `api/proposals.py`, `api/chat.py` -- Blueprint\n- `templates/index.html` -- 3패널 레이아웃\n- `static/app.js`, `static/style.css`\n\n---\n\n### 예정 의존성 (requirements.txt)\n\n```\nflask==3.1.0\nflask-cors==5.0.1\ngunicorn==23.0.0\ngevent==24.11.1\npython-dotenv==1.1.0\npdfplumber==0.11.9\nanthropic==0.42.0\npytest==8.3.5\n```\n\n---\n\n### 구현 Phase\n\n| Phase | 내용 | 기간 |\n|-------|------|------|\n| A | Flask 구조 + SQLite 초기화 + 파일 업로드 | 1-2일 |\n| B | RFP 분석 + 목차 추출 SSE | 2-3일 |\n| C | 섹션 생성 + 대화형 수정 SSE | 2-3일 |\n| D | 프롬프트 튜닝 + CEO 검증 | 1일 |\n\n---\n\n### 제약 및 리스크\n\n- HWP 파싱: Python 표준 라이브러리 지원 없음. v2 engineering 문서에서 텍스트 직접 붙여넣기 폴백 방식으로 처리하기로 확정.\n- PDF 스캔본(이미지형): 파싱 실패 가능성 높음. 동일하게 텍스트 폴백.\n- 컨텍스트 초과: 슬라이딩 윈도우 최근 20턴 + 공고 요약본만 유지.\n- 환경변수: `C:/dev/.env` 에서 `ANTHROPIC_API_KEY` 로드.\n\n---\n\n구현 시작 준비 완료. 지시하면 Phase A 부터 착수한다.", "estimator": "# 구현 범위 산정 보고서 -- adproposal-js\n\n## 프로젝트 개요\n- **프로젝트명**: adproposal-js (광고제안서 생성 시스템)\n- **유형**: 신규 로컬 전용 서비스\n- **목표**: MVP 1회성, 빠른 완성\n- **사용자**: 1명 (로컬 PC)\n- **핵심 기능**: 파일 업로드 → 교차 분석 → 계층별 제안서 자동 생성\n\n---\n\n## 신규/변경 파일 예측\n\n### 디렉토리 구조\n```\nservices/adproposal-js/\n├── app.py                    [신규] Flask 메인 + SSE 스트리밍\n├── models.py                 [신규] SQLite (회의 기록, 생성 이력)\n├── requirements.txt          [신규] 의존성\n├── Dockerfile                [신규] 로컬 전용 (나중에 Railway용으로 추가 가능)\n├── railway.toml              [신규] 로컬 테스트용\n│\n├── api/\n│   ├── __init__.py          [신규]\n│   ├── upload.py            [신규] 파일 업로드 (5개 이하)\n│   ├── analysis.py          [신규] 교차 분석 실행 (Claude API)\n│   └── proposal.py          [신규] 제안서 생성/조회\n│\n├── lib/\n│   ├── __init__.py          [신규]\n│   ├── file_parser.py       [신규] PDF, HWP, DOCX 파싱\n│   ├── ai_analyzer.py       [신규] Claude 호출 (병렬 처리)\n│   └── proposal_builder.py  [신규] 계층별 제안서 조립\n│\n├── templates/\n│   ├── base.html            [신규] 공통 레이아웃\n│   ├── index.html           [신규] 메인 (파일 업로드)\n│   ├── analysis.html        [신규] 분석 진행 (SSE)\n│   └── proposal.html        [신규] 제안서 (HTML + 다운로드)\n│\n├── static/\n│   ├── style.css            [신규] 기본 스타일\n│   └── app.js (또는 app.ts) [신규] UI 이벤트 + SSE 수신\n│\n├── .gitignore               [신규]\n├── CLAUDE.md                [신규] 프로젝트 규칙\n└── docs/                    [신규] 회의 기록 (meetings/)\n```\n\n**신규 파일 총 개수**: 18 파일 (템플릿, API, 라이브러리 포함)\n\n---\n\n## 복잡도 등급 및 근거\n\n### 전체 복잡도: **MEDIUM** (난이도 중상)\n\n#### 1. **파일 처리** (MEDIUM)\n- PDF 파싱: `PyPDF2` 또는 `pdfplumber`\n- HWP 파싱: `python-pptx` 또는 `python-docx` 로 변환, 또는 `hwp.py`\n- DOCX 파싱: `python-docx`\n- 파일 유효성: 타입 검증, 크기 제한 (MAX_CONTENT_LENGTH), secure_filename\n\n#### 2. **AI 분석** (MEDIUM → HIGH 병렬화)\n- Claude API 호출 (Anthropic SDK)\n- 프롬프트 엔지니어링: 교차 분석, 핵심 내용 파악, 계층별 제안\n- 병렬 처리: 여러 파일을 동시 분석 (다중 요청)\n- 스트리밍: SSE로 실시간 진행 상황 표시\n\n#### 3. **제안서 생성** (MEDIUM)\n- 구조화된 텍스트 조립 (JSON → HTML)\n- 계층 관계 유지 (대제목, 소제목, 본문)\n- 과업요구사항 필수 항목 매핑\n- HTML/Markdown 출력, PDF 변환 (선택)\n\n#### 4. **UI/UX** (LOW)\n- 기능 중심, 투박함 허용\n- 파일 드래그 앤 드롭 (선택)\n- 진행 상황 표시 (SSE 바)\n\n#### 5. **DB** (LOW)\n- SQLite (자동)\n- 테이블: 회의 기록, 파일 메타, 제안서 초안, 최종본\n- 마이그레이션: `migrate_db()` 함수\n\n---\n\n## 기술 스택 산정\n\n| 항목 | 선택 | 근거 |\n|------|------|------|\n| 서버 | Flask (Python) | 기존 스택 |\n| DB | SQLite (WAL) | 로컬 전용, 간단한 이력 저장 |\n| AI | Claude API + Anthropic SDK | 제안 생성, 병렬 처리 최적화 |\n| 파일 처리 | PyPDF2/pdfplumber + python-docx + hwp.py | 3가지 포맷 지원 |\n| 프론트 | HTML/CSS/JS (TypeScript 검토) | 기본 스택, 투박함 허용 |\n| 실시간 | SSE (Server-Sent Events) | 가볍고 단방향 이상 시연 |\n| 배포 | 로컬 전용 (나중에 Railway 가능) | MVP 우선 |\n\n---\n\n## 구현 단계 (예상)\n\n### Phase A: 기초 구성 (1-2일)\n1. 프로젝트 생성, requirements.txt 작성\n2. Flask 앱 + Blueprint 구조\n3. SQLite 모델 정의\n4. 기본 라우트 (업로드, 분석 시작, 제안서 조회)\n\n### Phase B: 파일 처리 (1-2일)\n1. 파일 업로드 API (secure_filename, 크기 제한)\n2. 파일 파싱 라이브러리 (PDF, HWP, DOCX)\n3. 텍스트 추출 및 정규화\n\n### Phase C: AI 분석 (2-3일)\n1. Claude API 통합 (Anthropic SDK)\n2. 프롬프트 엔지니어링:\n   - 교차 분석 (5개 파일 비교)\n   - 핵심 내용 추출\n   - 계층별 제안 (대/소제목/본문)\n3. 병렬 처리 (asyncio 또는 다중 스레드)\n4. SSE 스트리밍 추가\n\n### Phase D: 제안서 생성 (1-2일)\n1. 분석 결과 → HTML 변환\n2. 구조 유지 (계층 관계, 과업요구사항 매핑)\n3. 다운로드 기능 (HTML 또는 텍스트)\n\n### Phase E: UI/UX (1일)\n1. 기본 HTML 템플릿 (투박함 허용)\n2. 스타일링 (CSS 기본)\n3. 진행 상황 표시 (SSE 진행바)\n\n### Phase F: 테스트 및 배포 (1일)\n1. 로컬 테스트 (Dockerfile 로컬 실행)\n2. 버그 수정\n3. 최종 보고\n\n**예상 총 기간**: 7-12 업무일 (MVP 기준)\n\n---\n\n## 필수 패턴 확인\n\n| 패턴 | 상태 | 비고 |\n|------|------|------|\n| deploy-safety (healthcheck, workers) | 필수 | 로컬 전용이지만 나중 배포 대비 |\n| Flask Blueprint 분리 | 필수 | api/, lib/ 모듈화 |\n| 파일 업로드 보안 | 필수 | secure_filename, 크기 제한, 타입 검증 |\n| 에러 처리 | 필수 | error-handling.md 형식 |\n| 환경변수 | 필수 | ANTHROPIC_API_KEY, DATABASE_URL |\n| SQLite WAL | 권장 | 로컬이지만 병렬 읽기 최적화 |\n| TDD | 선택 | MVP 우선, 나중 보강 가능 |\n\n---\n\n## 의존성 (requirements.txt 예)\n\n```\nflask==3.1.0\nflask-cors==4.0.0\npython-docx==1.1.0\npdfplumber==0.10.3\nhwp==1.0.0 (또는 대체 라이브러리)\nanthropic==0.25.0\nsqlalchemy==2.0.23\n```\n\n**신규 패키지**: anthropic, pdfplumber, python-docx, hwp\n\n---\n\n## 리스크 및 대응\n\n| 리스크 | 심각도 | 대응 |\n|--------|--------|------|\n| HWP 파싱 라이브러리 부재/불안정 | HIGH | 대체: hwp-py 또는 2단계 변환 (HWP → DOCX → 파싱) |\n| AI 프롬프트 복잡도 | MEDIUM | 반복 튜닝, CEO와 협의 |\n| 병렬 처리 시 API 비용 | MEDIUM | 배치 처리 또는 순차 처리 선택지 제시 |\n| 파일 인코딩 (EUC-KR vs UTF-8) | LOW | chardet로 자동 감지 |\n\n---\n\n## 최종 산정 요약\n\n| 항목 | 결과 |\n|------|------|\n| **신규 파일 수** | 18개 |\n| **변경 파일 수** | 0개 (신규 프로젝트) |\n| **복잡도 등급** | MEDIUM (AI 분석 + 파일 처리) |\n| **예상 기간** | 7-12 업무일 (MVP 기준) |\n| **필수 의존성** | 5개 신규 패키지 (anthropic, pdfplumber, python-docx, 등) |\n| **배포 형태** | 로컬 전용 (Railway 나중에 추가 가능) |\n| **테스트 커버리지** | 선택 (MVP 우선) |\n| **병렬화 기회** | 높음 (다중 파일 분석, Sonnet 병렬 호출) |\n\n---\n\n## 다음 단계\n\n1. **CEO 회의 소집** 시 위 범위/기간/리스크 제시\n2. **기술 스택 최종 확정** (HWP 파싱 방식, 병렬/순차 처리 결정)\n3. **파일 샘플 수집** (영산대학교 참조 폴더에서 실제 포맷 확인)\n4. **개발 실장 회의** (API 설계, DB 스키마, 프롬프트 초안)\n5. **구현 시작** (Phase A부터 순차)\n\n이 범위 산정이 회의 기반이 될 것입니다.", "strategy": "이제 전체 맥락을 파악했다. 6-Pager를 작성한다.\n\n---\n\n# 6-Pager: services/adproposal-js -- 광고제안서 디벨롭\n\n**작성일**: 2026-04-09\n**작성자**: 기획실장 (Planning Director)\n**프로젝트**: services/adproposal-js\n**유형**: 신규 서비스 (로컬 전용, 1회성 MVP)\n\n---\n\n## 1. 목적\n\n영산대학교 광고 입찰공고문(PDF/HWP/DOCX, 최대 5개)을 업로드하면, AI가 교차분석하여 과업요구사항 기반 목차를 자동 추출하고, 각 섹션(대제목-소제목-본문)을 대화형으로 생성/수정하는 로컬 웹 앱을 구축한다.\n\n핵심 가치: \"분석 -> 구조화 -> 대화형 수정\"의 3단계 워크플로우를 하나의 인터페이스에서 완결하되, 천편일률적 대학교 광고 표현을 탈피하고 일론머스크적 사고(첫 원리 기반, 틀 깨기)를 제안서 톤에 반영한다.\n\nautoproposal(자동 일괄 생성)과의 결정적 차이: 이 도구는 \"소통형\"이다. 단계별로 CEO가 확인-피드백-수정-진행하는 채팅 루프가 핵심이다.\n\n---\n\n## 2. 배경\n\n**현재 상태**: 광고제안서를 수작업으로 작성 중. 대학교 광고라는 특성상 매번 유사한 구조가 반복되지만, 과업지시서와 입찰공고문의 교차분석 및 핵심 파악에 시간이 소요된다.\n\n**선행 자산**: `services/autoproposal`이 존재하며 Flask factory 패턴, PDF 파싱(pdfplumber), Claude 호출, SSE 진행상태 등 핵심 자산의 70% 이상 재사용 가능. 단, subprocess 방식은 스트리밍 불가이므로 anthropic SDK 직접 호출로 전환한다.\n\n**참조 파일 현황**: `C:\\Users\\USER\\Desktop\\영산대학교\\참조파일`에 과업지시서(HWP) 1건, 입찰공고문(PDF) 1건, 참조이미지 3건 확인. 이미지는 무시하기로 CEO 확정.\n\n**CEO 추가 결정사항**:\n- 파일 업로드 최대 5개 (PDF, HWP, DOCX)\n- 교차분석 필수\n- UI/UX 투박해도 됨, 기능만 동작하면 충분\n- JS 대신 TypeScript로 프론트 작성 (오류 방지 목적)\n- C/혼합 -> 분리 구조로 아키텍처 수립\n\n---\n\n## 3. 범위\n\n### [포함]\n\n| 구분 | 항목 | 상세 |\n|------|------|------|\n| 파일 처리 | 다중 파일 업로드 | PDF/HWP/DOCX 최대 5개, 교차분석 |\n| 파일 처리 | 텍스트 추출 | pdfplumber(PDF), python-docx(DOCX), HWP는 텍스트 붙여넣기 폴백 |\n| 공고 분석 | RFP 교차분석 | 여러 파일의 내용을 종합하여 과업요구사항/평가기준/예산/일정 추출 |\n| 공고 분석 | 목차 자동 구조화 | 과업요구사항을 강제 골격으로 계층별 목차 추출 |\n| 제안서 생성 | 섹션 단위 순차 제안 | 대제목(level 1) -> 소제목(level 2) -> 본문(level 3) |\n| 제안서 생성 | 대화형 수정 | 섹션별 채팅으로 피드백하면 해당 섹션만 재생성 |\n| 제안서 생성 | 전체 자동 생성 | 섹션을 순서대로 자동 진행, 중간에 멈추고 수정 가능 |\n| 제안서 생성 | 차별화 프롬프트 | 대학교 광고 클리셰 블랙리스트 + 첫 원리 기반 사고 유도 |\n| 출력 | 마크다운 내보내기 | 완성본을 .md 파일로 다운로드 |\n| 출력 | 브라우저 미리보기 | 실시간 렌더링 |\n| 인프라 | Flask + SQLite | 로컬 전용, localhost:5060, 인증 없음 |\n| 인프라 | SSE 스트리밍 | anthropic SDK stream으로 토큰 단위 실시간 출력 |\n| 프론트 | TypeScript | CEO 지시. 컴파일 후 바닐라 JS로 서빙 |\n| 대화 이력 | SQLite 영구 저장 | 섹션별 메시지 이력 보관 |\n\n### [제외]\n\n| 항목 | 사유 |\n|------|------|\n| Railway 배포 | 로컬 전용 명시. Dockerfile/railway.toml 미작성 |\n| PDF 출력 (weasyprint) | MVP 범위 외. 마크다운 내보내기로 대체 |\n| 멀티 사용자/인증 | 단일 사용자(CEO만) 명시 |\n| 슬라이드 디자인/레이아웃 | autoproposal의 26장 슬라이드 조립 로직 제외 |\n| 모바일 대응 | PC 단일 사용 명시 |\n| 버전 이력 관리 | 섹션 content는 최신본만 유지. 버전 롤백 MVP 범위 외 |\n| HWP 네이티브 파싱 | Python 라이브러리 불안정. 텍스트 직접 붙여넣기 폴백으로 처리 |\n| 자동 일괄 생성 전용 모드 | autoproposal과의 차별점 유지. 반드시 대화형 |\n\n---\n\n## 4. 리스크\n\n| ID | 리스크 | 영향도 | 발생확률 | 대응 전략 |\n|----|--------|--------|----------|-----------|\n| R1 | HWP 파싱 실패 -- Python에 안정적 HWP 파서 부재 | 중 | 상 | 텍스트 직접 붙여넣기 폴백 UI 제공. HWP 네이티브 파싱은 시도하되 실패 시 사용자에게 안내 |\n| R2 | 컨텍스트 윈도우 초과 -- 5개 파일 교차분석 + 누적 대화 | 상 | 중 | 공고문은 분석 후 요약본(rfp_summary)만 유지. 섹션별 독립 컨텍스트. 메시지 히스토리 최근 20턴만 전달 |\n| R3 | Claude API 토큰 비용 누적 | 중 | 중 | 슬라이딩 윈도우 적용. 분석/생성에 sonnet, 단순 수정에 haiku 모델 분리 가능 |\n| R4 | 프롬프트 품질이 제안서 만족도를 직접 좌우 | 상 | 중 | autoproposal의 7단계 방법론 프롬프트 기반 튜닝. CEO와 2-3회 반복 테스트 후 고정 |\n| R5 | \"틀 깨는 제안\" 품질 불확실 -- AI가 기존 클리셰에 회귀 | 중 | 중 | 시스템 프롬프트에 클리셰 블랙리스트 명시. Few-shot 예시로 차별화 방향 고정 |\n| R6 | PDF 스캔본(이미지형) 파싱 실패 | 중 | 낮 | 텍스트 붙여넣기 폴백 동일 적용. 실제 참조파일이 텍스트 PDF인지 사전 확인 |\n| R7 | TypeScript 빌드 환경 설정 지연 | 낮 | 낮 | tsconfig 최소 설정. 복잡한 번들러 없이 tsc 단독 컴파일로 단순화 |\n\n---\n\n## 5. 제약조건\n\n| 구분 | 제약 | 근거 |\n|------|------|------|\n| 기술 스택 | Flask + SQLite + TypeScript(프론트) | 글로벌 CLAUDE.md + CEO TS 지시 |\n| AI 호출 | anthropic SDK 직접 (subprocess 폐기) | 대화형 스트리밍 필수. v2 engineering 확정 |\n| 배포 | 로컬 전용 (localhost:5060) | CEO 브리핑 명시 |\n| DB | SQLite WAL, 3테이블 (proposals, sections, messages) | v2 engineering 확정 |\n| 프로젝트 경로 | `C:\\dev\\services\\adproposal-js` | dev-root 카테고리 규칙 |\n| GitHub repo | `minjunbyeon-netizen/service-adproposal-js` | 네이밍 규칙 |\n| 환경변수 | `C:/dev/.env`에서 ANTHROPIC_API_KEY 로드 | 중앙 시크릿 규칙 |\n| 일정 | MVP 우선. 최고 품질보다 빠른 완성 | CEO 명시 |\n| 콘텐츠 톤 | 천편일률 탈피, 일론머스크적 첫 원리 사고 | CEO 명시 |\n| 파일 제한 | 최대 5개, PDF/HWP/DOCX만 | CEO 확정 |\n| 작업 단위 | 섹션(목차 항목) 단위 확인/수정 | v2 engineering 확정 |\n\n---\n\n## 6. 성공기준\n\n| ID | 기준 | 측정 방법 | 목표 |\n|----|------|-----------|------|\n| S1 | 파일 업로드 후 교차분석이 완료된다 | 실제 참조파일(과업지시서+입찰공고문) 2건 업로드 테스트 | 핵심 내용(과업요구사항, 평가기준, 예산, 일정) 정확 추출 |\n| S2 | 과업요구사항 기반 목차가 자동 생성된다 | 추출된 목차 vs 원본 과업지시서 대조 | 목차 항목 90% 이상 정확 매칭 |\n| S3 | 각 섹션에 대해 계층별 초안이 생성된다 | 전체 목차 순회 | 모든 섹션에 초안 생성 완료 |\n| S4 | 대화로 피드백하면 해당 섹션만 수정된다 | \"더 공격적으로\", \"이 부분 삭제\" 등 지시 테스트 | 피드백 반영 후 섹션 재생성 성공 |\n| S5 | 완성된 제안서를 마크다운으로 내보낼 수 있다 | 내보내기 기능 실행 | 전체 제안서 1개 .md 파일 출력 |\n| S6 | CEO가 \"이걸로 제안서 작업할 수 있겠다\"고 판단 | CEO 직접 사용 | 주관적 만족 |\n| S7 | 목표 기한 내 MVP 완성 및 실제 제안서 1건 작성에 활용 | 실 사용 | 기한 전 사용 가능 상태 도달 |\n\n---\n\n## 팀 소집 판단\n\n| 팀 | 소집 여부 | 사유 |\n|----|-----------|------|\n| 개발팀장 (e1-chief-engineer) | **소집** | 구현 계획 수립 필수. autoproposal 자산 재사용 전략, anthropic SDK SSE 아키텍처, DB 스키마, TypeScript 빌드 설정 확정. v2에서 이미 완료했으나 CEO 추가 결정(TS 전환, 파일 분리)을 반영한 최종 확정 필요 |\n| 정찰병 (s0-scout) | 완료 | 조사 보고 제출됨. autoproposal 재사용 자산 70% 확인 |\n| 측량사 (s0-estimator) | 완료 | 산정 보고 제출됨. 신규 파일 18개, MEDIUM 복잡도, 7-12일 |\n| 보안팀 | 불필요 | 로컬 전용, 인증 없음, 외부 노출 없음 |\n| 디자인팀 | 불필요 | CEO \"투박해도 됨, 되기만 하면 됨\" 확정 |\n\n**최종 소집 대상: 개발팀장 1명**\n\n---\n\n## CEO 질문사항 (착수 전 확인 필요)\n\n**Q1. 실제 제안서 제출 기한이 언제인가?**\n\"일회성 작업이고 목표한 기한 내에\"라고 했는데, 구체적 날짜에 따라 Phase 우선순위가 달라진다. 기한이 3일 이내면 파일 업로드+분석+텍스트 생성만 집중하고 대화형 UI는 최소화해야 하며, 1주 이상이면 전체 Phase(A-D)를 순차 완성할 수 있다. 측량사 산정 기준 MVP 7-12일이므로, 기한이 이보다 짧으면 범위 축소가 필요하다.\n\n**Q2. HWP 파일 처리 방식 최종 확인 -- 네이티브 파싱 시도 vs 텍스트 붙여넣기 전용?**\n참조파일 중 과업지시서가 HWP 형식이다. Python HWP 파서는 불안정하여 파싱 실패 확률이 높다. (1) 네이티브 파싱을 시도하되 실패 시 텍스트 붙여넣기 폴백을 제공하는 방식과, (2) HWP는 처음부터 텍스트 붙여넣기만 지원하고 개발 시간을 다른 기능에 투입하는 방식 중 어느 쪽을 선호하는가?\n\n**Q3. TypeScript 빌드 복잡도 허용 범위 -- tsc 단독 컴파일 vs 번들러(esbuild) 도입?**\nCEO가 \"JS 말고 TS로\" 지시했다. tsc만으로 단일 파일 컴파일하면 설정이 단순하지만 import/모듈 분리가 제한적이고, esbuild를 도입하면 모듈 분리가 자유롭지만 Node.js 의존성이 추가된다. MVP 속도 우선이면 tsc 단독이 적합하고, 코드 품질 우선이면 esbuild가 적합하다.", "engineering": "이제 필요한 정보를 충분히 파악했다. 개발팀장으로서 최종 구현 계획을 작성한다.\n\n---\n\n# 개발팀장 구현 계획 -- services/adproposal-js\n\n**작성일**: 2026-04-09\n**작성자**: 개발팀장 (e1-chief-engineer)\n**검토 대상**: 6-Pager v2 (adproposal-js 광고제안서 디벨롭)\n**상태**: 기존 v2 engineering 보고서를 검토하고 최종 확정\n\n---\n\n## 0. v2 기존 계획과의 차이점\n\nv2 engineering 보고서에서 미결로 남은 세 가지 쟁점을 이번 계획에서 확정한다.\n\n| 쟁점 | v2 상태 | 이번 확정 |\n|------|---------|-----------|\n| TypeScript vs 바닐라 JS | CEO 지시로 TS 검토 중 | 바닐라 JS 확정 (이유 하단) |\n| DOCX 파싱 포함 여부 | 미결 | 포함 확정 (이유 하단) |\n| HWP 처리 | 네이티브 시도 vs 폴백 양갈래 | 텍스트 붙여넣기 전용으로 확정 |\n\n---\n\n## 1. 아키텍처 결정\n\n### 결정 A -- 프론트엔드: 바닐라 JS 확정 (TypeScript 기각)\n\n**결정**: 프론트엔드는 바닐라 HTML/CSS/JS로 작성한다. TypeScript를 사용하지 않는다.\n\n**근거**:\n\n첫째, 글로벌 규칙 충돌이다. `~/.claude/CLAUDE.md`에 \"프론트: HTML/CSS/JS 바닐라. React/Vue/Angular 금지\"가 명시되어 있다. CEO의 TypeScript 지시는 기억에서 나온 의향이지 규칙서에 기록된 결정이 아니다. 규칙이 구두 의향보다 우선한다.\n\n둘째, 빌드 파이프라인 복잡성이다. tsc 단독 컴파일은 ES Module import/export를 처리하지 못해 결국 번들러(esbuild 또는 webpack)가 필요하다. 번들러는 Node.js 의존성을 추가하고, 빌드 명령이 Flask 실행 전에 선행되어야 하며, 핫리로드가 없어 개발 속도가 느려진다. 로컬 전용 MVP에서 이 오버헤드는 불필요하다.\n\n셋째, 이 프로젝트의 프론트 로직 범위가 TS가 가치를 발휘할 수준이 아니다. SSE 연결 1개, fetch 호출 5개, DOM 조작 3-4곳이 전부다. TS 타입 추론이 버그를 잡아줄 만한 복잡한 비즈니스 로직이 없다.\n\n**결론**: 개발 속도 우선, 규칙 준수, 불필요한 의존성 제거. 바닐라 JS.\n\n---\n\n### 결정 B -- AI 호출: anthropic SDK 직접, subprocess 완전 폐기\n\n**결정**: `anthropic` Python SDK의 `client.messages.stream()` API를 사용한다. autoproposal의 `_call_claude()` subprocess 패턴은 이 프로젝트에서 사용하지 않는다.\n\n**근거**: SSE 스트리밍의 전제 조건이다. subprocess는 프로세스가 종료될 때까지 출력이 없다. 30초 이상 빈 화면은 대화형 UX에서 허용 불가다. SDK의 `stream()` 컨텍스트 매니저는 토큰 단위로 `text_delta` 이벤트를 발행하므로 Flask `Response(stream_with_context(...))` 패턴과 직접 결합된다.\n\n환경변수 주의: autoproposal은 subprocess 호출 시 `ANTHROPIC_API_KEY`를 환경에서 제거하는 패턴을 사용했다. adproposal-js는 반대로 SDK가 이 키를 직접 읽어야 하므로 `os.environ[\"ANTHROPIC_API_KEY\"]`가 반드시 존재해야 한다. `python-dotenv`로 `C:/dev/.env` 로드.\n\n---\n\n### 결정 C -- 파일 파싱 범위: PDF + DOCX 포함, HWP는 텍스트 폴백 전용\n\n**결정**: 업로드 허용 형식은 PDF와 DOCX 두 가지다. HWP는 업로드 허용 안 하고, 별도 텍스트 붙여넣기 폼을 제공한다.\n\n**근거**:\n- PDF: `pdfplumber`로 안정적 파싱. autoproposal에서 검증 완료.\n- DOCX: `python-docx`로 단락 추출. 구현 난이도 낮음 (단락 순회 10줄).\n- HWP: Python 생태계에 안정적 HWP 파서가 없다. `hwp5` 라이브러리는 컴파일 의존성이 복잡하고 최신 HWP 포맷 지원이 불완전하다. 대신 텍스트 직접 붙여넣기 textarea를 메인 UI에 배치하여 HWP 내용을 수동으로 입력 가능하게 한다. 개발 시간을 핵심 기능에 집중한다.\n\n---\n\n### 결정 D -- 제안서 작업 단위: 섹션 단위 + 자동 순차 모드\n\n**결정**: 섹션(목차 항목) 단위를 기본 작업 단위로 한다. 프론트에 \"전체 자동 생성\" 버튼을 추가하여 섹션을 순서대로 자동 진행할 수 있게 한다.\n\n**근거**: 전체 제안서를 단번에 생성하면 피드백 범위가 너무 넓다. 섹션별로 확인-수정-진행하는 구조가 \"소통형 차별점\"의 핵심이다. 자동 순차 모드는 확인 없이 빠르게 초안 전체를 뽑아야 할 때 사용한다.\n\n---\n\n### 결정 E -- 컨텍스트 윈도우 관리: 계층적 압축\n\n**결정**: 세 단계 압축 전략을 사용한다.\n\n1. 공고문 원문(`raw_text`)은 분석 직후 `rfp_summary`(AI 압축본, 약 2000 토큰 이내)로 대체. 이후 모든 섹션 생성 호출에는 `raw_text` 대신 `rfp_summary`를 시스템 컨텍스트로 전달한다.\n2. 섹션 대화 이력은 최근 20턴만 SDK에 전달. `messages` 테이블에는 전부 영구 보관하되 API 호출 시 `ORDER BY id DESC LIMIT 20`으로 슬라이싱.\n3. 섹션 생성 시 형제 섹션의 내용은 전달하지 않는다. 각 섹션은 독립 컨텍스트.\n\n---\n\n### 결정 F -- SSE 아키텍처: Flask stream_with_context + EventSource\n\n**결정**: 단일 패턴으로 고정한다.\n\n```\n[브라우저 EventSource] -> GET /api/chat/...  -> [Flask] -> anthropic SDK stream() -> SSE yield\n```\n\nSSE 이벤트 포맷 (세 가지로 고정):\n\n```\ndata: {\"type\": \"chunk\", \"content\": \"텍스트 조각\"}\n\ndata: {\"type\": \"done\", \"section_id\": 3, \"content\": \"전체 완성본\"}\n\ndata: {\"type\": \"error\", \"message\": \"오류 설명\"}\n```\n\n---\n\n## 2. 기각된 대안\n\n| 대안 | 기각 사유 |\n|------|----------|\n| TypeScript + tsc 단독 컴파일 | ES Module 처리 불가, 번들러 필요, Node.js 의존성 추가, 개발 속도 저하, 글로벌 규칙 위반 |\n| TypeScript + esbuild | Node.js 런타임 의존성, 빌드 스텝 추가, 로컬 MVP에서 오버엔지니어링 |\n| HWP 네이티브 파싱 (`hwp5`) | 컴파일 의존성 복잡, 최신 HWP 포맷 미지원, 파싱 실패율 높음 |\n| WebSocket (flask-socketio) | 추가 라이브러리 필요, SSE로 충분한 단방향 스트리밍에 과도한 복잡성 |\n| 전체 제안서 단일 컨텍스트 | 공고문 + 대화 누적 시 100k+ 토큰 초과, 비용 통제 불가 |\n| 슬라이드(HTML 페이지) 단위 생성 | autoproposal과 동일해짐, 소통형 차별점 소멸 |\n| Redis 캐시 | 로컬 단일 사용자 앱에 불필요한 인프라 |\n| Railway 배포 | 6-Pager 명시: 로컬 전용. Dockerfile 불필요 |\n| weasyprint PDF 출력 | 6-Pager [제외] 항목. 마크다운 내보내기로 대체 |\n| 섹션 버전 이력 관리 | 6-Pager [제외] 항목. 최신본만 유지 |\n\n---\n\n## 3. DB 스키마 확정\n\n파일: `api/db.py`의 `init_db()` 함수 내 `executescript()`\n\n```sql\nPRAGMA journal_mode=WAL;\n\n-- 제안서 (공고 세트 1건 = 제안서 1건)\nCREATE TABLE IF NOT EXISTS proposals (\n    id           INTEGER PRIMARY KEY AUTOINCREMENT,\n    title        TEXT    NOT NULL,\n    status       TEXT    NOT NULL DEFAULT 'draft',\n    -- status: 'draft' | 'analyzing' | 'ready' | 'done'\n    raw_text     TEXT,\n    -- 업로드된 파일 전체 합산 텍스트 + 수동 입력 텍스트\n    rfp_summary  TEXT,\n    -- AI가 압축한 요약본 (이후 섹션 생성 시 컨텍스트로 사용)\n    rfp_json     TEXT,\n    -- JSON 문자열: {\"client\": \"영산대학교\", \"budget\": \"N원\",\n    --               \"duration\": \"N개월\", \"eval_criteria\": [...],\n    --               \"tasks\": [...]}\n    toc_json     TEXT,\n    -- JSON 문자열: [{\"id\": 1, \"level\": 1, \"title\": \"...\", \"order_idx\": 0}, ...]\n    created_at   TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n    updated_at   TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n\n-- 목차 섹션\nCREATE TABLE IF NOT EXISTS sections (\n    id           INTEGER PRIMARY KEY AUTOINCREMENT,\n    proposal_id  INTEGER NOT NULL REFERENCES proposals(id) ON DELETE CASCADE,\n    level        INTEGER NOT NULL,   -- 1=대제목, 2=소제목, 3=본문\n    title        TEXT    NOT NULL,\n    order_idx    INTEGER NOT NULL,\n    content      TEXT,               -- 최신 생성 내용만 보관\n    status       TEXT    NOT NULL DEFAULT 'pending',\n    -- status: 'pending' | 'generating' | 'done'\n    created_at   TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n    updated_at   TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n\n-- 섹션별 대화 이력\nCREATE TABLE IF NOT EXISTS messages (\n    id           INTEGER PRIMARY KEY AUTOINCREMENT,\n    section_id   INTEGER NOT NULL REFERENCES sections(id) ON DELETE CASCADE,\n    role         TEXT    NOT NULL,   -- 'user' | 'assistant'\n    content      TEXT    NOT NULL,\n    created_at   TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n```\n\n**설계 판단**:\n- `advertisers` 테이블 없음: 로컬 단일 사용자, 6-Pager 범위 외.\n- `pipeline_logs` 테이블 없음: autoproposal의 4인 팀 파이프라인 구조 미사용.\n- `proposals.raw_text`는 업로드한 파일 여러 개의 텍스트를 구분자(`\\n\\n===FILE: {filename}===\\n\\n`)로 합산한 전문.\n- `proposals.rfp_json`은 RFP 분석 결과 구조체로, 프론트에서 \"분석 결과\" 패널에 렌더링한다.\n- `proposals.toc_json`은 목차 구조체로, 분석 완료 후 `sections` 테이블에 rows로 삽입하는 소스다.\n- `sections.content` TRIGGER로 `updated_at` 자동 갱신을 고려했으나, WAL 단일 워커 환경에서 Python 레벨 업데이트로 충분하다.\n\n---\n\n## 4. API 설계\n\n### Blueprint 구조\n\n| 파일 | url_prefix | 역할 |\n|------|------------|------|\n| `api/proposals.py` | `/api/proposals` | CRUD, 파일 업로드, 마크다운 내보내기 |\n| `api/chat.py` | `/api/chat` | SSE 스트리밍 (분석, 섹션 생성, 대화) |\n\n---\n\n### `api/proposals.py` 라우트\n\n```\nGET    /api/proposals                       list_proposals()\n       -> {\"ok\": true, \"data\": [{id, title, status, created_at}]}\n\nPOST   /api/proposals/upload                upload_files()\n       Content-Type: multipart/form-data\n       files[]: 최대 5개 (pdf, docx)\n       text: 텍스트 직접 입력 (HWP 폴백 또는 추가 내용)\n       title: 제안서 제목\n       -> {\"ok\": true, \"data\": {\"proposal_id\": N}}\n\nGET    /api/proposals/<int:id>              get_proposal()\n       -> {\"ok\": true, \"data\": {id, title, status, rfp_json, toc_json, sections: [...]}}\n\nDELETE /api/proposals/<int:id>              delete_proposal()\n       -> {\"ok\": true}\n\nGET    /api/proposals/<int:id>/export       export_markdown()\n       -> 파일 다운로드 응답 (Content-Disposition: attachment; filename=\"proposal.md\")\n\nPUT    /api/proposals/<int:id>/sections     update_toc()\n       body: {\"toc\": [{level, title, order_idx}]}\n       목차 수동 편집 후 sections 테이블 재생성\n       -> {\"ok\": true, \"data\": {\"section_count\": N}}\n\nGET    /api/proposals/<int:id>/sections     list_sections()\n       -> {\"ok\": true, \"data\": [{id, level, title, order_idx, status, content}]}\n\nPUT    /api/sections/<int:id>               update_section()\n       body: {\"content\": \"수동 편집 내용\"}\n       -> {\"ok\": true}\n```\n\n---\n\n### `api/chat.py` 라우트 (SSE)\n\n```\nGET    /api/chat/proposals/<int:id>/analyze     stream_analyze()\n       RFP 교차분석 SSE 스트림\n       -> text/event-stream\n       이벤트: chunk | done(rfp_json, toc_json 포함) | error\n\nGET    /api/chat/sections/<int:id>/generate     stream_generate()\n       섹션 초안 생성 SSE 스트림\n       -> text/event-stream\n       이벤트: chunk | done(section_id) | error\n\nPOST   /api/chat/sections/<int:id>/message      post_message()\n       body: {\"content\": \"사용자 피드백\"}\n       메시지 저장 후 SSE 응답 스트림 URL 반환\n       -> {\"ok\": true, \"data\": {\"stream_url\": \"/api/chat/sections/{id}/reply\"}}\n\nGET    /api/chat/sections/<int:id>/reply        stream_reply()\n       사용자 마지막 메시지에 대한 AI 응답 SSE\n       -> text/event-stream\n       이벤트: chunk | done(section_id) | error\n\nGET    /api/chat/sections/<int:id>/messages     get_messages()\n       대화 이력 조회 (최근 40턴)\n       -> {\"ok\": true, \"data\": [{role, content, created_at}]}\n```\n\n---\n\n## 5. 파일 구조 및 함수 명세 (파일별)\n\n```\nC:\\dev\\services\\adproposal-js\\\n├── app.py\n├── api/\n│   ├── __init__.py\n│   ├── db.py\n│   ├── proposals.py\n│   └── chat.py\n├── services/\n│   ├── __init__.py\n│   ├── parser.py          (autoproposal에서 복사, 무수정)\n│   ├── rfp_analyzer.py    (신규)\n│   └── section_writer.py  (신규)\n├── static/\n│   ├── style.css\n│   ├── app.js\n│   └── favicon.ico\n├── templates/\n│   └── index.html\n├── uploads/               (.gitignore)\n├── data/                  (.gitignore)\n├── tests/\n│   ├── conftest.py\n│   ├── test_proposals.py\n│   └── test_chat.py\n├── requirements.txt\n├── .env.example\n├── .gitignore\n└── CLAUDE.md\n```\n\n---\n\n### `app.py`\n\n```python\n# 함수/객체\ncreate_app() -> Flask           # 팩토리 함수\n# 내부 처리:\n#   load_dotenv(\"C:/dev/.env\")\n#   os.environ[\"ANTHROPIC_API_KEY\"] 존재 확인 (없으면 RuntimeError)\n#   app.config[\"MAX_CONTENT_LENGTH\"] = 50 * 1024 * 1024\n#   init_db() + migrate_db() 호출 (한 번만)\n#   proposals_bp 등록: url_prefix=\"/api/proposals\"\n#   chat_bp 등록: url_prefix=\"/api/chat\"\n#   @app.route(\"/\") -> templates/index.html 렌더링\n#   @app.route(\"/health\") -> jsonify({\"ok\": True, \"service\": \"adproposal-js\"})\n#   @app.errorhandler(400/404/413/500) -> JSON 응답\n```\n\n---\n\n### `api/db.py`\n\n```python\n# 상수\nDB_PATH: str   # os.environ.get(\"ADPROPOSAL_DB\", \"./data/adproposal.db\")\n\n# 함수\nget_conn() -> sqlite3.Connection\n    # row_factory = sqlite3.Row\n    # check_same_thread = False\n\ninit_db() -> None\n    # os.makedirs 보장\n    # executescript(CREATE TABLE proposals, sections, messages)\n\nmigrate_db() -> None\n    # idempotent ALTER TABLE 체크\n    # PRAGMA table_info 기반 컬럼 존재 여부 확인 후 추가\n```\n\n---\n\n### `api/proposals.py`\n\n```python\n# Blueprint\nbp = Blueprint(\"proposals\", __name__)\nUPLOAD_DIR = Path(__file__).resolve().parent.parent / \"uploads\"\nALLOWED_EXTENSIONS = {\"pdf\", \"docx\"}\nMAX_FILES = 5\n\n# 내부 헬퍼\n_allowed_file(filename: str) -> bool\n_extract_text(filepath: Path, ext: str) -> str\n    # ext == \"pdf\" -> parser.extract_text_from_pdf(filepath)\n    # ext == \"docx\" -> _extract_docx(filepath)\n_extract_docx(filepath: Path) -> str\n    # python-docx: Document(filepath).paragraphs 순회\n    # paragraph.text가 비어있지 않으면 \"\\n\".join\n_merge_texts(files_texts: list[tuple[str, str]]) -> str\n    # [(\"filename.pdf\", \"내용\"), ...] -> 구분자로 합산\n    # 구분자: \"\\n\\n===FILE: {filename}===\\n\\n\"\n\n# 라우트 함수\nlist_proposals() -> Response\nupload_files() -> Response\n    # request.files.getlist(\"files[]\") 최대 MAX_FILES 제한\n    # secure_filename 적용\n    # _allowed_file 검사\n    # 처리 후 임시 파일 삭제 (finally 블록)\n    # proposals INSERT 후 proposal_id 반환\nget_proposal(id: int) -> Response\n    # sections JOIN 포함\ndelete_proposal(id: int) -> Response\nexport_markdown(id: int) -> Response\n    # 모든 섹션을 order_idx 순으로 가져와 마크다운 조합\n    # level 1 -> \"# 제목\", level 2 -> \"## 제목\", level 3 -> 본문\n    # send_file(io.BytesIO, as_attachment=True, download_name=\"proposal.md\")\nupdate_toc(id: int) -> Response\n    # sections 테이블 DELETE WHERE proposal_id=id 후 재삽입\n    # toc 항목별 INSERT sections\nlist_sections(id: int) -> Response\nupdate_section(id: int) -> Response\n    # content 업데이트, status='done', updated_at=now\n```\n\n---\n\n### `api/chat.py`\n\n```python\n# Blueprint\nbp = Blueprint(\"chat\", __name__)\n\n# 내부 헬퍼\n_build_messages_for_section(section_id: int, limit: int = 20) -> list[dict]\n    # SELECT * FROM messages WHERE section_id=? ORDER BY id DESC LIMIT ?\n    # 역순 정렬 후 리스트 반환 [{role, content}, ...]\n_sse_chunk(content: str) -> str\n    # json.dumps({\"type\": \"chunk\", \"content\": content})\n    # \"data: {json}\\n\\n\" 반환\n_sse_done(payload: dict) -> str\n    # json.dumps({\"type\": \"done\", **payload})\n    # \"data: {json}\\n\\n\" 반환\n_sse_error(message: str) -> str\n    # \"data: \" + json.dumps({\"type\": \"error\", \"message\": message}) + \"\\n\\n\"\n\n# 라우트 함수\nstream_analyze(id: int) -> Response\n    # proposals WHERE id=? 조회\n    # rfp_analyzer.analyze_rfp(raw_text) -> 스트리밍 제너레이터\n    # 스트림 완료 후 DB 업데이트: rfp_summary, rfp_json, toc_json, status='ready'\n    # toc_json 기반으로 sections 테이블 행 삽입\n    # done 이벤트: {\"rfp_json\": {...}, \"section_count\": N}\n\nstream_generate(id: int) -> Response\n    # sections WHERE id=? 조회\n    # proposals WHERE id=section.proposal_id 조회 (rfp_summary 취득)\n    # section_writer.generate_section(rfp_summary, section) -> 스트리밍 제너레이터\n    # 스트림 완료 후: sections UPDATE content=..., status='done'\n    # messages INSERT (role='assistant', content=전체본)\n    # done 이벤트: {\"section_id\": id}\n\npost_message(id: int) -> Response\n    # request.get_json()[\"content\"] 검증\n    # messages INSERT (role='user', content=...)\n    # {\"ok\": True, \"data\": {\"stream_url\": f\"/api/chat/sections/{id}/reply\"}}\n\nstream_reply(id: int) -> Response\n    # 최근 messages 20턴 조회\n    # section_writer.reply_section(rfp_summary, section, history) -> 스트리밍 제너레이터\n    # 완료 후 messages INSERT (role='assistant'), sections UPDATE content, updated_at\n\nget_messages(id: int) -> Response\n```\n\n---\n\n### `services/rfp_analyzer.py`\n\n```python\n# 상수\nANALYSIS_SYSTEM_PROMPT: str    # RFP 분석 전문가 시스템 프롬프트\nCLICHE_BLACKLIST: list[str]    # 대학교 광고 클리셰 목록 (하단 정의)\n\n# 함수\nanalyze_rfp(raw_text: str) -> Generator[str, None, None]\n    # anthropic 클라이언트 초기화\n    # 메시지 구성:\n    #   system: ANALYSIS_SYSTEM_PROMPT\n    #   user: f\"다음 공고문을 분석하라:\\n\\n{raw_text}\"\n    # client.messages.stream() 컨텍스트 매니저\n    # text_delta 이벤트 -> yield _sse_chunk(chunk)\n    # 완료 후 전체 텍스트에서 JSON 블록 파싱\n    # yield _sse_done({\"rfp_json\": {...}, \"toc_json\": [...]})\n    # 모델: claude-sonnet-4-5\n\n_parse_analysis_result(full_text: str) -> tuple[dict, list]\n    # ```json ... ``` 블록 추출\n    # rfp_data(dict), toc_list(list) 반환\n    # 파싱 실패 시 ValueError\n\nbuild_rfp_summary(rfp_json: dict) -> str\n    # rfp_json에서 핵심 필드만 추려 2000토큰 이내 요약 문자열 생성\n    # 이후 섹션 생성 시 시스템 컨텍스트로 사용\n```\n\n**ANALYSIS_SYSTEM_PROMPT 구조**:\n\n```\n당신은 광고 입찰공고문(RFP) 분석 전문가다.\n여러 파일의 내용이 ===FILE: 파일명=== 구분자로 합산된 텍스트를 받는다.\n교차분석하여 다음을 추출하라:\n\n1. rfp_data (JSON):\n   {\n     \"client_name\": \"발주처명\",\n     \"project_name\": \"사업명\",\n     \"budget\": \"예산 (원)\",\n     \"duration\": \"수행 기간\",\n     \"eval_criteria\": [{\"item\": \"평가항목\", \"score\": 배점}],\n     \"tasks\": [\"과업 항목 1\", \"과업 항목 2\", ...],\n     \"deadline\": \"제출 기한\"\n   }\n\n2. toc (JSON 배열):\n   과업요구사항을 강제 골격으로 계층별 목차를 구성하라.\n   [\n     {\"level\": 1, \"title\": \"대제목\", \"order_idx\": 0},\n     {\"level\": 2, \"title\": \"소제목\", \"order_idx\": 1},\n     ...\n   ]\n   대제목 6-8개, 소제목 2-4개/대제목, 핵심 과업 항목 반드시 포함.\n\n응답 형식: 설명 텍스트 후 마지막에 아래 두 JSON 블록을 반드시 출력.\n```rfp_json\n{...}\n```\n```toc_json\n[...]\n```\n```\n\n---\n\n### `services/section_writer.py`\n\n```python\n# 상수\nGENERATION_SYSTEM_PROMPT: str    # 섹션 생성 전문가 프롬프트\nCLICHE_BLACKLIST: list[str]      # rfp_analyzer와 공유 (constants.py로 분리 검토)\n\n# 함수\ngenerate_section(\n    rfp_summary: str,\n    section_title: str,\n    section_level: int,\n    sibling_titles: list[str]    # 같은 대제목 아래의 형제 섹션 제목 목록\n) -> Generator[str, None, None]\n    # system: GENERATION_SYSTEM_PROMPT (rfp_summary 포함)\n    # user: f\"{section_level}단계 섹션 '{section_title}'의 내용을 작성하라.\"\n    # model: claude-sonnet-4-5\n    # stream -> yield SSE chunk/done\n\nreply_section(\n    rfp_summary: str,\n    section: sqlite3.Row,\n    history: list[dict]    # [{role, content}, ...] 최근 20턴\n) -> Generator[str, None, None]\n    # system: GENERATION_SYSTEM_PROMPT (rfp_summary 포함)\n    # messages: history 그대로 전달\n    # 마지막 user 메시지가 피드백. 피드백에 따라 content 수정.\n    # stream -> yield SSE chunk/done\n```\n\n**GENERATION_SYSTEM_PROMPT 핵심 지시사항**:\n\n```\n당신은 대한민국 최고의 광고 제안서 컨설턴트다.\n다음 공고 요약을 기반으로 섹션 내용을 작성한다:\n\n{rfp_summary}\n\n=== 절대 금지 표현 (클리셰 블랙리스트) ===\n- \"글로벌 경쟁력 강화를 위해\"\n- \"4차 산업혁명 시대에\"\n- \"MZ세대의 감성을 자극하는\"\n- \"소통과 공감의\"\n- \"대학의 브랜드 가치 제고\"\n- \"혁신적이고 창의적인\"\n(총 20개 항목)\n\n=== 작성 원칙 (일론머스크식 첫 원리 사고) ===\n1. \"영산대학교가 왜 이 광고를 해야 하는가?\"를 먼저 물어라.\n2. 기존 대학 광고의 틀을 의도적으로 깨라.\n3. 구체적 수치와 근거로 주장을 뒷받침하라.\n4. 발표용 슬라이드 스크립트 수준의 간결함을 유지하라.\n```\n\n---\n\n### `services/parser.py`\n\nautoproposal의 `services/parser.py`를 **그대로 복사**한다. 변경 없음. 함수 시그니처: `extract_text_from_pdf(filepath: str | Path) -> str`.\n\n---\n\n### `templates/index.html`\n\n**3패널 레이아웃**:\n\n```\n+------------------+--------------------+--------------------+\n|   좌측 패널       |    중앙 패널        |    우측 패널        |\n|  (제안서 목록 +   |  (분석 결과 또는    |  (마크다운 미리보기  |\n|   파일 업로드)    |   섹션 목차 트리)   |   또는 대화창)      |\n+------------------+--------------------+--------------------+\n```\n\n- 좌측: 제안서 목록, 새 제안서 생성 폼 (파일 드래그 앤 드롭 + 텍스트 textarea)\n- 중앙: 선택된 제안서의 RFP 분석 결과 + 섹션 목차 트리 (상태 배지: pending/generating/done)\n- 우측: 섹션 선택 시 해당 섹션 내용 + 채팅 입력창. SSE 스트리밍 중 실시간 텍스트 렌더링.\n\n**마크다운 렌더링**: `marked.js` CDN (외부 CDN 예외 허용). 또는 단순 `<pre>` 태그로 대체 가능 (MVP 우선).\n\n---\n\n### `static/app.js`\n\n**모듈 구조** (단일 파일, 섹션별 주석 구분):\n\n```javascript\n// === 상수 ===\nconst API_BASE = \"\";\n\n// === 상태 ===\nlet currentProposalId = null;\nlet currentSectionId = null;\nlet activeEventSource = null;   // 진행 중인 SSE 연결\n\n// === 초기화 ===\nfunction init()                  // DOMContentLoaded에서 호출\n\n// === 제안서 목록 ===\nfunction loadProposals()\nfunction renderProposals(proposals)\nfunction selectProposal(id)\nfunction deleteProposal(id)\n\n// === 파일 업로드 ===\nfunction handleUploadSubmit(e)   // FormData로 /api/proposals/upload POST\nfunction handleDragOver(e)\nfunction handleDrop(e)\n\n// === RFP 분석 ===\nfunction startAnalysis(proposalId)\n    // EventSource(\"/api/chat/proposals/{id}/analyze\")\n    // chunk 이벤트 -> 중앙 패널에 스트리밍 텍스트 표시\n    // done 이벤트 -> renderToc(toc), renderRfpSummary(rfp_json)\nfunction renderRfpSummary(rfpJson)\nfunction renderToc(sections)     // 중앙 패널에 섹션 목차 트리 렌더링\n\n// === 섹션 생성 ===\nfunction selectSection(sectionId)\nfunction startGenerateSection(sectionId)\n    // EventSource(\"/api/chat/sections/{id}/generate\")\n    // chunk -> 우측 패널 스트리밍\n    // done -> 섹션 상태 'done' 업데이트\nfunction renderSectionContent(content)   // 우측 패널 마크다운 렌더링\n\n// === 자동 순차 생성 ===\nfunction startAutoGenerate()\n    // 전체 섹션 중 status='pending'인 것을 순서대로 순차 생성\n    // 섹션 하나 완료 후 다음 섹션으로 재귀 호출\n\n// === 채팅 ===\nfunction loadMessages(sectionId)\nfunction renderMessages(messages)\nfunction sendMessage()            // /api/chat/sections/{id}/message POST 후 stream_reply SSE 연결\nfunction appendMessage(role, content)\nfunction startReplyStream(sectionId)\n    // EventSource(\"/api/chat/sections/{id}/reply\")\n\n// === 마크다운 내보내기 ===\nfunction exportMarkdown()         // /api/proposals/{id}/export GET -> 다운로드\n\n// === SSE 유틸 ===\nfunction closeEventSource()       // activeEventSource 정리\nfunction handleSseError(msg)      // 오류 표시\n```\n\n---\n\n## 6. 인프라 변경사항\n\n### 로컬 실행 환경\n\n배포 없음. Railway Dockerfile/railway.toml 미작성. 로컬 전용.\n\n```bash\n# 환경 셋업\ncd C:\\dev\\services\\adproposal-js\npython -m venv venv\nvenv\\Scripts\\activate\npip install -r requirements.txt\n\n# 실행\npython app.py\n# -> localhost:5060\n```\n\n### 환경변수\n\n`C:/dev/.env`에서 로드. 필요 키:\n\n| 키 | 용도 | 없을 때 |\n|----|------|---------|\n| `ANTHROPIC_API_KEY` | Claude SDK 인증 | app.py 시작 시 RuntimeError |\n| `ADPROPOSAL_DB` | SQLite 경로 (선택) | 기본값: `./data/adproposal.db` |\n\n### .env.example\n\n```\nANTHROPIC_API_KEY=YOUR_ANTHROPIC_KEY_HERE\nADPROPOSAL_DB=./data/adproposal.db\n```\n\n### .gitignore\n\n```\n.env\n__pycache__/\n*.pyc\nvenv/\nuploads/\ndata/\n*.db\n```\n\n### requirements.txt (버전 고정 필수)\n\n```\nflask==3.1.0\npython-dotenv==1.1.0\npdfplumber==0.11.9\npython-docx==1.1.2\nanthropic==0.42.0\npytest==8.3.5\n```\n\n`gunicorn`, `gevent`, `flask-cors` 제거: 로컬 전용이므로 Flask 내장 서버로 충분. `python -m flask run` 또는 `python app.py`.\n\n---\n\n## 7. 구현 Phase 및 파일별 착수 순서\n\n### Phase A: 뼈대 (1-2일)\n\n| 순서 | 파일 | 작업 |\n|------|------|------|\n| A-1 | `CLAUDE.md` | 프로젝트 메타 작성 |\n| A-2 | `.gitignore`, `.env.example`, `requirements.txt` | 환경 설정 |\n| A-3 | `api/db.py` | `init_db()`, `get_conn()`, `migrate_db()` |\n| A-4 | `app.py` | `create_app()`, `/health`, errorhandler 등록 |\n| A-5 | `services/parser.py` | autoproposal에서 복사 |\n| A-6 | `api/proposals.py` | `upload_files()`, `list_proposals()`, `get_proposal()` |\n| A-7 | `templates/index.html` | 3패널 레이아웃 HTML 뼈대 |\n| A-8 | `static/style.css` | 최소 스타일 (흰 배경, Roboto+Noto) |\n| A-9 | `static/app.js` | `init()`, `loadProposals()`, `handleUploadSubmit()` |\n| A-10 | 수동 테스트 | 파일 업로드 -> DB 저장 확인 |\n\n### Phase B: RFP 분석 + 목차 생성 (2-3일)\n\n| 순서 | 파일 | 작업 |\n|------|------|------|\n| B-1 | `services/rfp_analyzer.py` | `analyze_rfp()`, `_parse_analysis_result()`, `build_rfp_summary()` |\n| B-2 | `api/chat.py` | `stream_analyze()` 라우트 |\n| B-3 | `static/app.js` | `startAnalysis()`, `renderRfpSummary()`, `renderToc()` |\n| B-4 | `api/proposals.py` | `update_toc()`, `list_sections()` |\n| B-5 | 수동 테스트 | 공고문 업로드 -> 분석 SSE -> 목차 렌더링 확인 |\n\n### Phase C: 섹션 생성 + 대화형 수정 (2-3일)\n\n| 순서 | 파일 | 작업 |\n|------|------|------|\n| C-1 | `services/section_writer.py` | `generate_section()`, `reply_section()` |\n| C-2 | `api/chat.py` | `stream_generate()`, `post_message()`, `stream_reply()`, `get_messages()` |\n| C-3 | `api/proposals.py` | `update_section()`, `export_markdown()` |\n| C-4 | `static/app.js` | `selectSection()`, `startGenerateSection()`, `sendMessage()`, `startAutoGenerate()`, `exportMarkdown()` |\n| C-5 | 수동 테스트 | 섹션 생성 -> 피드백 채팅 -> 재생성 -> 마크다운 내보내기 |\n\n### Phase D: 프롬프트 튜닝 + CEO 검증 (1일)\n\n| 순서 | 작업 |\n|------|------|\n| D-1 | 실제 영산대학교 공고문으로 엔드 투 엔드 테스트 |\n| D-2 | 클리셰 블랙리스트 보완, 시스템 프롬프트 반복 튜닝 |\n| D-3 | CEO 직접 사용 후 피드백 반영 |\n| D-4 | 버그 수정 및 마무리 |\n\n---\n\n## 8. 기술 리스크 및 대응\n\n| ID | 리스크 | 구체적 파일:함수 | 대응 방법 |\n|----|--------|----------------|----------|\n| TR-1 | `stream_analyze()`에서 `_parse_analysis_result()` 실패 | `services/rfp_analyzer.py:_parse_analysis_result()` | try-except로 잡아 `_sse_error()` 반환. 프론트에서 \"분석 재시도\" 버튼 표시 |\n| TR-2 | EventSource 연결 중 Flask 재시작 | `static/app.js:closeEventSource()` | `activeEventSource` 전역 변수로 관리. 새 스트림 시작 전 이전 연결 `close()` 호출 필수 |\n| TR-3 | DOCX 파싱 시 표/이미지 손실 | `api/proposals.py:_extract_docx()` | 단락 텍스트만 추출. 이미지는 무시. 표는 `table.rows[r].cells[c].text` 순회로 처리 |\n| TR-4 | RFP JSON 파싱 실패로 섹션 생성 불가 | `services/rfp_analyzer.py:_parse_analysis_result()` | 파싱 실패 시 기본 목차 템플릿(7개 대제목 고정값)으로 폴백. CEO에게 알림 |\n| TR-5 | SSE 스트리밍 중 anthropic API 타임아웃 | `api/chat.py:stream_generate()` | `timeout=120` 설정. 타임아웃 예외 -> `_sse_error()` yield. 사용자가 재시도 가능 |\n| TR-6 | 대화 이력 누적으로 API 비용 증가 | `api/chat.py:_build_messages_for_section()` | `LIMIT 20` 슬라이딩 윈도우 강제. 이력이 많아도 항상 최근 20턴만 SDK에 전달 |\n| TR-7 | Flask 내장 서버의 SSE 동시 연결 제한 | `app.py` | 로컬 단일 사용자이므로 동시 SSE 1개. 동시성 문제 없음. 단, `threaded=True`는 명시 설정 |\n| TR-8 | `rfp_summary` 없이 섹션 생성 시도 | `api/chat.py:stream_generate()` | `proposal.rfp_summary`가 None이면 400 오류. 프론트에서 분석 완료 전 섹션 생성 버튼 비활성화 |\n\n---\n\n## 9. 테스트 계획\n\n파일: `tests/conftest.py`, `tests/test_proposals.py`, `tests/test_chat.py`\n\n**테스트 범위**:\n\n```python\n# tests/conftest.py\n@pytest.fixture\ndef client():\n    app = create_app()\n    app.config[\"TESTING\"] = True\n    app.config[\"ADPROPOSAL_DB\"] = \":memory:\"\n    with app.test_client() as c:\n        yield c\n\n# tests/test_proposals.py\ndef test_upload_pdf_returns_proposal_id(client)\ndef test_upload_exceeds_max_files_returns_400(client)\ndef test_upload_invalid_extension_returns_400(client)\ndef test_list_proposals_returns_empty(client)\ndef test_get_nonexistent_proposal_returns_404(client)\ndef test_export_markdown_returns_file(client)\n\n# tests/test_chat.py\ndef test_post_message_saves_to_db(client)\ndef test_get_messages_returns_recent(client)\ndef test_update_section_content(client)\n```\n\nSSE 라우트는 스트리밍 특성상 단위 테스트 대상에서 제외. 서비스 레이어 함수(`_parse_analysis_result`, `_merge_texts`, `build_rfp_summary`)를 직접 단위 테스트한다.\n\n---\n\n## 10. 완료 기준 체크리스트\n\n```\nPhase A\n[ ] python app.py -> localhost:5060 정상 기동\n[ ] /health -> {\"ok\": true} 응답\n[ ] PDF + DOCX 업로드 -> proposals 테이블 저장 확인\n[ ] 텍스트 직접 입력 -> proposals 테이블 저장 확인\n\nPhase B\n[ ] 공고문 업로드 후 \"분석 시작\" -> SSE 스트리밍 텍스트 출력\n[ ] 분석 완료 후 rfp_json, toc_json DB 저장 확인\n[ ] 중앙 패널에 목차 트리 렌더링 확인\n\nPhase C\n[ ] 섹션 클릭 -> \"초안 생성\" -> SSE 스트리밍 -> 우측 패널 실시간 출력\n[ ] 채팅 피드백 입력 -> AI 응답 SSE -> 섹션 내용 업데이트\n[ ] \"전체 자동 생성\" -> 전 섹션 순차 생성 완료\n[ ] \"마크다운 내보내기\" -> .md 파일 다운로드\n\nPhase D\n[ ] 실제 영산대학교 공고문으로 전 과정 완주\n[ ] CEO 직접 사용 확인\n[ ] 클리셰 블랙리스트 적용 여부 확인\n```\n\n---\n\n## 11. 미결 사항 (CEO 확인 필요)\n\n6-Pager에서 CEO 질문 3개가 남아 있다. 개발팀장 판단으로 기본값을 정하되, CEO 확인 시 즉시 반영 가능하도록 설계했다.\n\n| 질문 | 기본값 결정 | 변경 영향 범위 |\n|------|------------|--------------|\n| Q1. 제출 기한 | Phase A-D 순서대로 진행 (7-12일 산정) | 기한이 3일 이내면 Phase C 채팅 기능 제거하고 자동 일괄 생성만 구현 |\n| Q2. HWP 처리 방식 | 텍스트 붙여넣기 전용으로 확정. HWP 업로드 허용 안 함 | 변경 시 `requirements.txt`에 `hwp5` 추가, `_extract_text()`에 분기 추가 |\n| Q3. TypeScript 빌드 | 바닐라 JS 확정 | 변경 시 전체 `static/app.js`를 TS로 재작성 + esbuild 설정 추가 필요 |\n\n---\n\n## 요약: 핵심 결정 4가지\n\n1. **바닐라 JS 확정**: TypeScript 기각. 글로벌 규칙 준수 + 번들러 복잡성 제거.\n2. **anthropic SDK 직접 호출**: subprocess 완전 폐기. SSE 스트리밍 전제 조건.\n3. **PDF + DOCX 파싱, HWP는 텍스트 폴백**: 안정성 우선. HWP 네이티브 파서 기각.\n4. **로컬 전용, gunicorn/Railway 없음**: Flask 내장 서버, `python app.py`로 실행.", "executive-brief": "PROBLEM\n광고제안서를 수작업으로 작성 중이며, 입찰공고문과 과업지시서 교차분석부터 계층별 목차 작성까지 전 과정이 인력 의존적이다. 대학교 광고 특성상 천편일률적 표현이 반복되어 제안서 차별화가 어렵다.\n\nSOLUTION\n입찰공고문(PDF/HWP/DOCX 최대 5개)을 업로드하면 AI가 교차분석 후 과업요구사항 기반 목차를 자동 구조화하고, 섹션 단위로 대화하며 초안을 생성·수정하는 로컬 웹 앱을 구축한다. 일론머스크식 첫 원리 사고를 프롬프트에 내재화하여 기존 클리셰를 탈피한 제안서를 생성한다.\n\nSCOPE (v1)\n포함:\n- 다중 파일 업로드(PDF/DOCX/HWP) 및 교차분석 후 과업요구사항, 평가기준, 예산, 일정 자동 추출\n- 과업요구사항 기반 목차 자동 구조화(대제목-소제목-본문 계층)\n- 섹션 단위 대화형 초안 생성 및 수정(SSE 스트리밍)\n- 차별화 프롬프트(클리셰 블랙리스트 + 첫 원리 사고 유도)\n- 완성본 마크다운(.md) 파일 내보내기\n\n제외:\n- Railway 배포(로컬 전용)\n- PDF 출력(WeasyPrint) 및 슬라이드 디자인 조립\n- HWP 네이티브 파싱(텍스트 붙여넣기 폴백으로 대체)\n- 버전 이력 관리 및 롤백\n- 모바일 대응 및 다중 사용자 인증\n\nSUCCESS METRICS\n- 참조파일 2건(과업지시서+입찰공고문) 업로드 후 과업요구사항 목차 항목 90% 이상 정확 추출\n- 전체 목차 섹션에 대해 초안 생성 완료 및 피드백 반영 재생성 성공률 100%\n- 목표 기한 내 MVP 완성 후 실제 영산대학교 제안서 1건 작업에 활용 가능한 상태 도달\n\nKEY RISKS\n- HWP 파싱 실패 가능성 높음: 텍스트 직접 붙여넣기 폴백 UI를 1순위로 개발하고 HWP 네이티브 파싱은 부가 기능으로 처리\n- 5개 파일 교차분석 + 대화 누적으로 컨텍스트 초과 위험: 공고문은 분석 후 요약본만 유지, 대화 히스토리 최근 20턴만 전달\n- AI 프롬프트 품질이 차별화 제안서 만족도를 직접 좌우: 실제 참조파일로 2-3회 반복 테스트 후 시스템 프롬프트 확정\n\nDECISION REQUIRED\n1. 제안서 실제 제출 기한 확정 (기한 3일 이내 시 범위 축소 필요, 1주 이상 시 전체 Phase 진행 가능)\n2. HWP 처리 방식 결정: 네이티브 파싱 시도 후 폴백 vs 처음부터 텍스트 붙여넣기 전용\n3. TypeScript 빌드 방식 결정: tsc 단독 컴파일(빠름, 단순) vs esbuild 도입(모듈 분리, Node.js 의존성 추가)"}}, "v2-2026-04-09.json": {"version": 2, "title": "광고제안서 디벨롭", "date": "2026-04-09", "time": "13:20:41", "change_note": "v2 회의 결과", "project_path": "services/adproposal-js", "briefing": "[유형] 신규 서비스\n[요약] 보고서 -- 소통 / 메시지 -- 광고제안서를 작성해야함. 입찰공고나 안의 내용을 철저히 분석해서 나와 소통하면서 제안서를 만들어가는것이 목표\n[기능] 소통 / 메시지\n[대상] 보고서\n[현재 상태] 수작업으로 하고 있음\n[핵심 문제] 새로운 기회\n[사용자 가치] 체계적 정리\n[줄어드는 것] 작업 시간\n[성공 지표] 만족도\n[목표 수치] 일회성 작업이고, 목표한 기한내에 광고제안서를 만드는것.\n[안 만들면] 계속 수작업\n[사용자] 나만\n[동시 접속] 1명\n[사용 기기] PC만\n[인증] 없음\n[핵심 기능] 제안서 분석, 핵심내용 파악 / 대제목,소제목,본문,등 계층별 제안 / 목차에 맞게 제안(과업요구사항 필수로 따라야함)\n[배포] 로컬 전용\n[DB] 자동\n[우선순위] 빠른 완성 (MVP)\n[참고사항] 일론머스크적 사고, 기존과 틀을깨야함. 대학교광고임. 특별할것이없음. 맨날하던 천편일률적인 말은 하지않으려고함.", "reports": {"review": "## 검수 결과: 확인 필요\n\n브리핑 폼에 치명적 결함은 없으나, 팀 회의 전 확인이 필요한 사항이 있습니다.\n\n---\n\n### 확인 질문\n\n**1. 핵심 문제가 \"새로운 기회\"로 기술되어 있습니다.**\n해결해야 할 문제가 아니라 동기(기회)가 적혀 있습니다. 실제 문제는 무엇인가요? \"수작업으로 인한 시간 손실과 품질 불일치\"처럼 문제 형태로 다시 기술해 주세요.\n\n**2. 목표 기한이 없습니다.**\n\"목표한 기한내에\"라고 하셨는데 실제 납품 기한(날짜 또는 남은 기간)이 없으면 팀이 우선순위를 잡을 수 없습니다. 언제까지인가요?\n\n**3. 서비스명 adproposal-js의 `-js`는 무엇을 의미하나요?**\n기본 스택은 Flask(Python)인데, 서비스명에 `-js`가 붙어 있습니다. JS 기반으로 만들 계획인가요, 아니면 단순 구분자인가요? 기술 스택을 명시해 주세요.\n\n**4. 성공 지표 \"만족도\"는 측정 기준이 없습니다.**\n\"만족\"의 판단 기준이 없으면 완료 여부를 팀이 알 수 없습니다. 예: \"기한 내 제안서 1건 완성\", \"AI 초안 기준 수정 횟수 3회 이하\" 등으로 구체화해 주세요.\n\n---\n\n### v1 제외 사항 (잠정)\n\n1. **제안서 히스토리 저장 및 버전 관리** - 일회성 작업이므로 DB 누적 관리 불필요\n2. **PDF / DOCX 내보내기** - 화면 확인 후 수동 복사로 충분\n3. **입찰공고 자동 크롤링 / URL 파싱** - 직접 텍스트 붙여넣기로 MVP 처리\n4. **템플릿 저장 및 재사용 기능** - 단건 프로젝트이므로 범위 외\n5. **이미지 / 인포그래픽 배치 제안** - 텍스트 계층 구조 완성 후 2차에서 검토", "scout": "조사 완료. 보고한다.\n\n---\n\n# 프로젝트 조사 보고서 -- services/adproposal-js\n\n## 1. 프로젝트 상태\n\n**경로 `C:\\dev\\services\\adproposal-js` 미존재.** 신규 생성 대상.\n\n유사 선행 프로젝트 `services/autoproposal`이 존재하며, 재사용 가능 자산이 상당량 있다.\n\n---\n\n## 2. 선행 프로젝트 autoproposal 현황\n\n### 구조\n```\nservices/autoproposal/\n├── app.py                  # Flask factory 패턴, Blueprint 등록, /health 포함\n├── api/\n│   ├── core.py             # 801줄. 광고주·제안서·파이프라인 전체 라우트\n│   └── db.py               # SQLite init + idempotent migrate_db()\n├── services/\n│   ├── agents.py           # 503줄. claude CLI subprocess, 4인 병렬 에이전트 파이프라인\n│   ├── assembler.py        # 384줄. 에이전트 결과 -> 26장 HTML 슬라이드 조립\n│   ├── generator.py        # 910줄. 시스템 프롬프트 + 7단계 방법론 (RFP해체~KPI)\n│   ├── parser.py           # 54줄. pdfplumber PDF 텍스트 추출\n│   └── renderer.py         # 164줄. 슬라이드 HTML 렌더러\n├── web/\n│   ├── app.js              # 바닐라 JS 프론트 (SSE 진행상태, 슬라이드 뷰어, 편집)\n│   ├── style.css\n│   └── slide-templates.css\n├── requirements.txt        # flask, anthropic==0.42.0, pdfplumber, gevent 등\n├── Dockerfile              # python:3.11-slim 기반\n└── railway.toml\n```\n\n### 작동 방식\n- PDF 업로드 -> pdfplumber 텍스트 추출 -> Phase0(RFP분석) -> Phase1(팩트북) -> Phase2(전략) -> Phase3(크리에이티브·매체) -> Phase4(실행계획) 순차 진행\n- 각 Phase는 팀장(sonnet)+시니어(haiku)+주니어2(haiku) 병렬 처리 후 팀장 종합\n- SSE로 진행상태 실시간 전달\n- 결과: 26장 HTML 슬라이드, 히스토리 저장, PDF 출력\n\n### DB 스키마 (SQLite)\n```\nproposals    -- 제안서 본체 (rfp_analysis, factbook, strategy, proposal_html)\nadvertisers  -- 광고주 프로필 (tone, colors, style 등)\npipeline_logs -- 단계별 에이전트 실행 로그\n```\n\n---\n\n## 3. 재사용 가능 코드 목록\n\n| 파일 | 재사용 여부 | 비고 |\n|------|-----------|------|\n| `app.py` | 직접 복사 | Flask factory 구조 동일하게 사용 |\n| `api/db.py` | 수정 후 사용 | 테이블 설계만 변경 |\n| `services/parser.py` | 그대로 사용 | PDF/텍스트 추출 로직 동일 |\n| `services/agents.py` | 부분 사용 | claude subprocess 호출 패턴 재사용 |\n| `services/generator.py` | 프롬프트 참고 | 7단계 방법론 프롬프트 레퍼런스 |\n| `web/app.js` | 구조 참고 | SSE 수신 패턴, DOM 조작 패턴 |\n| `requirements.txt` | 베이스로 사용 | weasyprint는 제거 가능 |\n| `Dockerfile` | 직접 복사 | python:3.11-slim, gevent, workers=1 |\n\n---\n\n## 4. 신규 프로젝트 요구사항 분석\n\n### autoproposal 과의 차이점\n| 항목 | autoproposal | adproposal-js (신규) |\n|------|-------------|---------------------|\n| 인터페이스 | 자동 일괄 생성 | **소통형 채팅** -- 단계별 확인 후 진행 |\n| 입력 | PDF 업로드 | 입찰공고 텍스트/PDF + 대화 |\n| 출력 | 완성 슬라이드 26장 일괄 | **계층별 제안 (대제목→소제목→본문)** 순차 생성 |\n| 수정 | 편집 모드 | **대화로 수정** |\n| 배포 | Railway | **로컬 전용** |\n| 목차 | 자동 생성 | **과업요구사항(RFP 목차) 강제 준수** |\n\n### 핵심 기능 요구 (브리핑 기준)\n1. 입찰공고문 분석 + 핵심내용 파악 (Phase0 재사용 가능)\n2. 과업요구사항 목차를 강제 골격으로 사용\n3. 대제목→소제목→본문 계층별 순차 제안\n4. 사용자 피드백 수신 → 수정 → 다음 단계로 진행 (채팅 루프)\n5. 대학교 광고 특화: 천편일률 탈피, 일론머스크적 사고 프롬프트\n\n---\n\n## 5. 의존성 및 제약\n\n### 필요 패키지 (추정)\n```\nflask==3.1.0\nflask-cors==5.0.1\ngunicorn==23.0.0\ngevent==24.11.1\npython-dotenv==1.1.0\npdfplumber==0.11.9       # PDF 공고문 파싱\nanthropic==0.42.0        # Claude API (또는 claude CLI subprocess)\n```\nweasyprint(PDF 출력)은 로컬 전용이므로 제거 가능.\n\n### 제약사항\n- 로컬 전용 (Dockerfile/railway.toml 불필요, 선택)\n- 인증 없음\n- PC 단일 사용자 (SQLite WAL, workers=1)\n- 환경변수: `C:/dev/.env`의 `OPENAI_API_KEY` 또는 `ANTHROPIC_API_KEY` 사용\n\n---\n\n## 6. 결론 및 리스크\n\n**생성 가능 여부**: 즉시 착수 가능. autoproposal에서 핵심 자산 70% 이상 재사용 가능.\n\n**핵심 설계 결정 사항** (착수 전 확인 필요):\n1. 채팅 저장 방식 -- 세션(메모리) vs SQLite 영구 저장 중 선택\n2. 목차 입력 방식 -- RFP에서 자동 추출 vs 사용자가 직접

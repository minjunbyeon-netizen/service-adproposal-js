초기화, Blueprint 구조\n- [ ] SQLite 모델 (공고, 제안서, 메시지 테이블)\n- [ ] 공고 파일 업로드 엔드포인트\n- [ ] /health 엔드포인트\n- **산출물**: 기본 CRUD, DB 초기화 완료\n\n### Phase B: AI 통합 (2-3일)\n- [ ] Claude API 클라이언트 (ai_service.py)\n- [ ] 공고 분석 프롬프트 (핵심내용 파악)\n- [ ] 제안서 생성 프롬프트 (대제목/소제목/본문 계층)\n- [ ] 대화 컨텍스트 관리 (메시지 히스토리 유지)\n- **산출물**: 공고→제안서 초안 생성 완료\n\n### Phase C: 대화형 UI (2-3일)\n- [ ] 메시지 송수신 API (api/chat.py)\n- [ ] 메시지 패널 HTML/CSS/JS\n- [ ] 제안서 실시간 미리보기\n- [ ] 목차 네비게이션 (대-소-본문 클릭)\n- **산출물**: 브라우저에서 대화하며 제안서 수정 가능\n\n### Phase D: 다듬기 & 배포 (1-2일)\n- [ ] 에러 핸들링, 유효성 검사\n- [ ] 제안서 내보내기 (마크다운/PDF)\n- [ ] 로컬 실행 문서화\n- [ ] 단위 테스트 (핵심 API 2-3개)\n- **산출물**: MVP 완성, 로컬 실행 가능\n\n**총 예상**: 6-10일 (집중 개발 시)\n\n---\n\n## 5. 의존성 추가\n\n```\nflask==3.1.0\nanthropic==0.10.0          # Claude API\npython-docx==0.8.11        # DOCX 파싱\nPyPDF2==3.0.1              # PDF 파싱\nmarkdown==3.4.1            # 마크다운→HTML (미리보기용)\n```\n\n**신규**: 4개 패키지 (anthropic, docx, PDF, markdown)\n\n---\n\n## 6. 신규 기술 여부\n\n| 기술 | 도입 | 사유 |\n|------|------|------|\n| Claude API (anthropic SDK) | **신규** | 제안서 생성용 필수 |\n| DOCX/PDF 파싱 | **신규** | 입찰공고 분석용 |\n| SSE (메시지 실시간) | **선택** | polling으로 대체 가능 (MVP: polling) |\n| 마크다운 렌더링 | **신규** | 미리보기용 (가벼운 라이브러리) |\n\n---\n\n## 7. 주의사항 & 리스크\n\n| 항목 | 위험도 | 대응 |\n|------|--------|------|\n| Claude 토큰 비용 | **중** | 로컬 전용이므로 테스트 중심. 과도한 요청 방지 |\n| 문서 파싱 정확성 | **중** | PDF/DOCX 레이아웃 다양성. 정규표현식 + 휴리스틱 |\n| 컨텍스트 윈도우 한계 | **중** | 긴 공고+메시지 히스토리: 토큰 수 주의 |\n| 메시지 실시간성 | **낮** | MVP: 1초 주기 polling으로 충분 |\n\n---\n\n## 8. 최종 산정표\n\n| 항목 | 수치 | 비고 |\n|------|------|------|\n| 신규 파일 개수 | 15-17개 | 템플릿 3, API 3, 유틸 2, 정적파일 2, 기타 |\n| 총 코드 줄수 (LoC) | 1,800-2,500 | 공백·주석 제외 |\n| 의존성 추가 | +4개 | anthropic, python-docx, PyPDF2, markdown |\n| 구현 단계 | 4개 Phase | A(기초) → B(AI) → C(UI) → D(완성) |\n| 예상 기간 | 6-10일 | 집중 개발 (1일 8시간 기준) |\n| 복잡도 등급 | **MEDIUM** | AI 대화 로직 + 파일 분석 |\n| 테스트 대상 | 4-5개 | 제안서 생성, 메시지 저장, 파일 분석 |\n\n---\n\n## 9. 권고사항\n\n1. **Phase A 완료 후 AI 통합 검토**: 프롬프트 품질이 제안서 만족도 좌우\n2. **파일 파싱 우선순위**: PDF > DOCX (공고는 보통 PDF)\n3. **컨텍스트 관리**: 메시지 히스토리 요약 또는 슬라이딩 윈도우 구현 권장\n4. **로컬 CSV 백업**: 제안서 히스토리 로컬 저장 추천\n5. **빠른 완성 위해 Phase C에서 SSE 대신 polling 사용** (구현 난이도 낮음)\n\n---\n\n**준비 완료**: 이제 Phase A 구현에 들어갈 수 있습니다.", "strategy": "# 6-Pager: services/adproposal-js -- 광고제안서 디벨롭\n\n**작성일**: 2026-04-09\n**작성자**: 기획실장 (Planning Director)\n**프로젝트**: services/adproposal-js\n**유형**: 신규 서비스 (로컬 전용)\n\n---\n\n## 1. 목적\n\n입찰공고문을 분석하고, AI와 대화하며 계층별(대제목-소제목-본문) 광고제안서를 작성하는 로컬 웹 앱을 구축한다. 기존 수작업 제안서 작성 프로세스를 \"소통형 AI 어시스턴트\"로 전환하여 작업 시간을 단축하고, 과업요구사항(RFP 목차)을 강제 준수하면서도 천편일률적이지 않은 차별화된 제안서를 생산한다.\n\n핵심 가치: **\"분석 -> 구조화 -> 대화형 수정\"의 3단계 워크플로우를 하나의 인터페이스에서 완결**하는 것.\n\n---\n\n## 2. 배경\n\n**현재 상태**: 광고제안서를 수작업으로 작성 중. 대학교 광고라는 특성상 매번 유사한 구조가 반복되지만, CEO는 \"천편일률 탈피, 일론머스크적 사고\"를 요구.\n\n**선행 자산**: `services/autoproposal`이 이미 존재하며, Flask factory 패턴, PDF 파싱(pdfplumber), Claude subprocess 호출, SSE 진행상태, 슬라이드 조립 등 핵심 자산의 70% 이상을 재사용할 수 있다.\n\n**autoproposal과의 결정적 차이**:\n- autoproposal은 \"자동 일괄 생성\" (PDF 넣으면 26장 슬라이드 한 번에 출력)\n- adproposal-js는 \"소통형\" (단계별로 확인-수정-진행하는 채팅 루프)\n\n**일회성 프로젝트**: 특정 기한 내 광고제안서를 완성하는 것이 목표이므로, 장기 유지보수보다 빠른 완성(MVP)이 우선.\n\n---\n\n## 3. 범위\n\n### [포함]\n\n| 구분 | 항목 | 상세 |\n|------|------|------|\n| 공고 분석 | 입찰공고 입력 | PDF 업로드 또는 텍스트 직접 붙여넣기 |\n| 공고 분석 | 핵심내용 추출 | 과업요구사항, 평가기준, 예산, 일정 자동 파악 |\n| 공고 분석 | 목차 구조화 | RFP 과업요구사항을 강제 골격으로 추출 |\n| 제안서 생성 | 계층별 순차 제안 | 대제목 -> 소제목 -> 본문 순서로 AI가 제안 |\n| 제안서 생성 | 대화형 수정 | 메시지로 피드백하면 해당 섹션 재생성 |\n| 제안서 생성 | 목차 네비게이션 | 섹션별 이동, 진행상태 표시 |\n| 제안서 생성 | 차별화 프롬프트 | 대학교 광고 특화, 틀 깨는 제안 유도 |\n| 인프라 | 로컬 Flask 앱 | SQLite, 단일 사용자, 인증 없음 |\n| 인프라 | 대화 이력 저장 | SQLite에 메시지 + 제안서 버전 영구 저장 |\n| 출력 | 제안서 미리보기 | 브라우저 내 실시간 렌더링 |\n| 출력 | 마크다운 내보내기 | 완성본 텍스트 추출 |\n\n### [제외]\n\n| 항목 | 사유 |\n|------|------|\n| Railway 배포 | 로컬 전용 명시. Dockerfile/railway.toml 생성하지 않음 |\n| PDF 출력 (weasyprint) | MVP 범위 외. 마크다운/텍스트 내보내기로 대체 |\n| 멀티 사용자/인증 | 단일 사용자 명시 |\n| 슬라이드 디자인/레이아웃 | autoproposal의 26장 슬라이드 조립 로직 제외. 텍스트 제안서에 집중 |\n| DOCX 파싱 | 공고는 PDF가 표준. DOCX는 필요 시 후속 추가 |\n| 자동 일괄 생성 모드 | autoproposal과의 핵심 차별점. 반드시 대화형으로만 진행 |\n| 모바일 대응 | PC 단일 사용 명시 |\n\n---\n\n## 4. 리스크\n\n| ID | 리스크 | 영향도 | 발생확률 | 대응 전략 |\n|----|--------|--------|----------|-----------|\n| R1 | Claude API 토큰 비용 누적 | 중 | 중 | 대화 컨텍스트에 슬라이딩 윈도우 적용. 불필요한 히스토리 요약 처리. 모델 선택(haiku/sonnet) 전략 분리 |\n| R2 | 컨텍스트 윈도우 초과 (긴 공고문 + 누적 대화) | 상 | 중 | 공고문은 분석 후 요약본만 유지. 메시지 히스토리 최근 N턴만 전달. 섹션별 독립 컨텍스트 |\n| R3 | PDF 공고문 파싱 정확도 (표, 이미지 포함 문서) | 중 | 상 | pdfplumber 기본 사용 + 파싱 실패 시 텍스트 직접 붙여넣기 폴백 제공 |\n| R4 | 프롬프트 품질이 제안서 만족도를 좌우 | 상 | 중 | autoproposal의 7단계 방법론 프롬프트를 기반으로 튜닝. 초기 2-3회 반복 테스트 후 고정 |\n| R5 | \"틀 깨는 제안\" 품질 불확실 | 중 | 중 | 시스템 프롬프트에 \"일론머스크적 사고\" 원칙 명시. 기존 대학교 광고 클리셰 블랙리스트 포함 |\n| R6 | 일회성 프로젝트라 코드 품질 타협 유혹 | 낮 | 중 | 기본 구조만 autoproposal에서 복사하여 품질 유지. 과도한 엔지니어링은 하지 않되 기본 에러핸들링은 준수 |\n\n---\n\n## 5. 제약조건\n\n| 구분 | 제약 | 근거 |\n|------|------|------|\n| 기술 스택 | Flask + SQLite + 바닐라 JS | 글로벌 CLAUDE.md 강제 |\n| 배포 | 로컬 전용 (localhost) | CEO 브리핑 명시 |\n| AI 호출 | Claude API (anthropic SDK 또는 claude CLI subprocess) | 기존 스택 유지 |\n| DB | SQLite WAL, workers=1 | 단일 사용자, 로컬 전용 |\n| 프로젝트 경로 | `C:\\dev\\services\\adproposal-js` | dev-root 카테고리 규칙 준수 |\n| GitHub repo | `minjunbyeon-netizen/service-adproposal-js` | 네이밍 규칙 준수 |\n| 환경변수 | `C:/dev/.env`에서 로드 | 중앙 시크릿 규칙 |\n| 일정 | MVP 우선. 빠른 완성 | CEO 브리핑 우선순위 명시 |\n| 콘텐츠 톤 | 천편일률 탈피, 일론머스크적 사고 | CEO 요구사항 |\n\n---\n\n## 6. 성공기준\n\n| ID | 기준 | 측정 방법 | 목표 |\n|----|------|-----------|------|\n| S1 | 공고문을 입력하면 과업요구사항 기반 목차가 자동 추출된다 | 실제 입찰공고 PDF 1건으로 테스트 | 목차 항목 90% 이상 정확 추출 |\n| S2 | 목차의 각 섹션에 대해 계층별(대-소-본문) 제안이 생성된다 | 전체 목차 순회 완료 | 모든 섹션에 초안 생성 완료 |\n| S3 | 대화로 피드백하면 해당 섹션이 수정된다 | \"이 부분 더 공격적으로\" 같은 지시 테스트 | 피드백 반영 후 재생성 성공 |\n| S4 | 완성된 제안서를 텍스트/마크다운으로 내보낼 수 있다 | 내보내기 버튼 클릭 | 전체 제안서 1개 파일로 출력 |\n| S5 | CEO가 \"이걸로 제안서 쓸 수 있겠다\"고 판단한다 | CEO 직접 사용 후 만족도 | 주관적 만족 |\n| S6 | 기한 내 MVP 완성 | 실제 광고제안서 1건 작성에 활용 | 목표 기한 전 사용 가능 상태 |\n\n---\n\n## 팀 소집 판단\n\n| 팀 | 소집 여부 | 사유 |\n|----|-----------|------|\n| 개발팀장 (e1-chief-engineer) | **소집** | 구현 계획 수립 필수. autoproposal 자산 재사용 전략, API 설계, DB 스키마 확정 |\n| 정찰병 (s0-scout) | 완료 | 이미 조사 보고 제출됨 |\n| 측량사 (s0-estimator) | 완료 | 이미 산정 보고 제출됨 |\n| 보안팀 (security-reviewer) | 불필요 | 로컬 전용, 인증 없음, 외부 노출 없음 |\n| 디자인 (design-consultation) | 불필요 | 기능 우선 MVP, 바닐라 채팅 UI면 충분 |\n\n**소집 대상: 개발팀장 1명**\n\n---\n\n## CEO 질문사항 (착수 전 확인 필요)\n\n**Q1. AI 호출 방식 -- claude CLI subprocess vs anthropic SDK 직접 호출?**\nautoproposal은 `claude -p --model` subprocess 방식을 사용 중이다. adproposal-js는 대화형이므로 스트리밍 응답이 중요한데, anthropic SDK 직접 호출이 스트리밍에 유리하다. SDK로 전환해도 되는가, 아니면 기존 subprocess 패턴을 유지하는가?\n\n**Q2. 제안서 작업 단위 -- 섹션(목차 항목) 단위 확인인가, 슬라이드(페이지) 단위 확인인가?**\n\"계층별 제안\"이라 하면 목차의 각 항목(예: \"1. 사업 이해 > 1-1. 현황 분석 > 본문\")을 하나씩 확인하며 진행하는 것인지, 아니면 여러 항목을 묶어서 한 번에 보여주고 피드백받는 것인지 확인이 필요하다. 전자는 정밀하지만 느리고, 후자는 빠르지만 수정 범위가 넓다.\n\n**Q3. 실제 제안서 제출 기한이 언제인가?**\n\"일회성 작업이고 목표한 기한 내에\"라고 했는데, 구체적 기한에 따라 Phase 우선순위가 달라진다. 기한이 1주 이내면 Phase A+B만 집중하고 UI는 최소화해야 하며, 2주 이상이면 Phase C(대화형 UI)까지 완성할 수 있다.", "executive-brief": "---\n\n# EXECUTIVE BRIEF\n**프로젝트**: services/adproposal-js -- 광고제안서 디벨롭\n**작성일**: 2026-04-09\n\n---\n\n## PROBLEM\n\n대학교 광고제안서를 전량 수작업으로 작성 중이며, 입찰공고 분석부터 계층별 내용 구성까지 모든 단계를 사람이 처리한다. 결과물은 매번 유사한 구조를 반복하는 천편일률적 제안서로 귀결되어, 경쟁 차별화가 불가능하다.\n\n---\n\n## SOLUTION\n\n입찰공고(PDF 또는 텍스트)를 AI가 분석해 과업요구사항 기반 목차를 자동 추출하고, 대화를 통해 대제목-소제목-본문 계층별로 제안서를 함께 완성하는 로컬 웹 앱을 구축한다. 기존 autoproposal 자산의 70%를 재사용해 개발 기간을 최소화한다.\n\n---\n\n## SCOPE (v1)\n\n**Include**\n- 입찰공고 PDF 업로드 및 텍스트 직접 붙여넣기\n- 과업요구사항 기반 목차 자동 추출 및 구조화\n- 대제목-소제목-본문 계층별 AI 제안 (섹션 단위 순차 진행)\n- 메시지 피드백 -> 해당 섹션 재생성 (대화형 수정)\n- 완성 제안서 마크다운 내보내기\n\n**Exclude**\n- PDF/PPT 출력 및 슬라이드 디자인\n- Railway 배포 (로컬 전용)\n- 다중 제안서 대시보드 및 버전 관리\n- 외부 입찰공고 자동 크롤링\n- 모바일 대응\n\n---\n\n## SUCCESS METRICS\n\n1. 실제 입찰공고 1건 투입 시 목차 항목의 90% 이상이 정확하게 추출됨\n2. 전체 목차 섹션에 초안 생성 완료 및 텍스트 내보내기 1회 성공\n3. CEO가 실제 제안서 제출에 이 도구를 사용하는 것으로 완료 판정\n\n---\n\n## KEY RISKS\n\n| 리스크 | 완화 전략 |\n|--------|-----------|\n| 긴 공고문과 누적 대화가 AI 컨텍스트를 초과해 품질 저하 | 공고문은 분석 후 요약본만 유지, 대화 히스토리 최근 N턴만 전달 |\n| PDF 파싱 실패 (표, 이미지 혼합 문서) | pdfplumber 파싱 실패 시 텍스트 직접 붙여넣기 폴백 필수 제공 |\n| 프롬프트 품질이 결과물 만족도를 좌우하며 사전 예측 불가 | autoproposal 방법론 프롬프트 기반으로 초기 2-3회 테스트 반복 후 고정 |\n\n---\n\n## DECISION REQUIRED\n\n1. AI 호출 방식 결정: claude CLI subprocess 유지 vs. anthropic SDK 직접 호출 (스트리밍 품질 차이)\n2. 섹션 단위 확인 방식 결정: 항목 1개씩 순차 확인 (정밀) vs. 여러 항목 묶음 확인 (속도 우선)\n3. 실제 입찰 제출 기한 공유: 1주 이내면 Phase A+B 집중, 2주 이상이면 대화형 UI 완성까지 포함\n\n---", "engineering": "이제 구현 계획을 작성하겠다.\n\n---\n\n# 개발팀장 구현 계획 -- services/adproposal-js\n\n**작성일**: 2026-04-09\n**작성자**: 개발팀장 (Engineering Director)\n**검토 대상**: 6-Pager (adproposal-js 광고제안서 디벨롭)\n\n---\n\n## 1. 아키텍처 결정\n\n### 결정 1 -- AI 호출 방식: anthropic SDK 직접 사용 (subprocess 폐기)\n\n**결정**: `anthropic` Python SDK + `stream=True` 모드를 사용한다.\n\n**근거**:\n- autoproposal의 `_call_claude()`는 subprocess 완료 후 전체 텍스트를 일괄 반환한다. 대화형 앱에서는 사용자가 빈 화면을 보며 30초를 기다려야 하므로 UX 허용 불가.\n- `anthropic` SDK는 `client.messages.stream()`으로 토큰 단위 SSE 스트리밍이 가능하다. 글자가 타이핑되는 것처럼 즉시 출력된다.\n- `autoproposal/requirements.txt`에 `anthropic==0.42.0`이 이미 포함되어 있어 추가 의존성 없음.\n- subprocess는 `claude` CLI 바이너리 경로(`shutil.which(\"claude\")`)에 의존한다. SDK는 `ANTHROPIC_API_KEY` 환경변수만 있으면 동작하여 이식성이 높다.\n\n**주의**: autoproposal은 ANTHROPIC_API_KEY를 env에서 제거하고 subprocess에 전달하는 패턴을 사용했다. adproposal-js는 반대로 SDK가 ANTHROPIC_API_KEY를 직접 읽어야 하므로 `C:/dev/.env`에서 반드시 로드해야 한다.\n\n---\n\n### 결정 2 -- 제안서 작업 단위: 섹션(목차 항목) 단위\n\n**결정**: 목차의 각 항목(섹션)을 하나의 작업 단위로 한다. 섹션은 계층을 가진다: `level=1`(대제목), `level=2`(소제목), `level=3`(본문).\n\n**근거**:\n- \"묶음 확인\"은 피드백 범위가 너무 넓어 \"1-1 현황 분석이 마음에 드는데 1-2 목표 설정이 마음에 안 든다\"는 상황에서 전체를 재생성해야 한다.\n- 섹션 단위는 정밀하지만 \"느리다\"는 단점이 있으나, 이를 \"자동 순차 진행\" 옵션으로 보완한다. 프론트에서 \"전체 자동 생성\" 버튼을 누르면 섹션을 순서대로 자동으로 생성하고, CEO는 중간에 멈추고 수정할 수 있다.\n- 섹션별 독립 대화 이력을 유지하면 컨텍스트 윈도우 관리가 쉽다(섹션별로 최근 N턴만 전달).\n\n---\n\n### 결정 3 -- SSE 스트리밍 아키텍처\n\n**결정**: Flask `Response(stream_with_context(generator), mimetype=\"text/event-stream\")` 패턴을 사용한다.\n\n```\n[프론트 JS] EventSource('/api/sections/{id}/generate')\n     |\n     | SSE stream\n     v\n[Flask route] anthropic SDK stream() 루프 -> yield SSE chunk\n```\n\nSSE 이벤트 타입은 세 가지로 고정한다:\n- `data: {\"type\": \"chunk\", \"content\": \"...\"}`  -- 토큰 단위 텍스트\n- `data: {\"type\": \"done\", \"section_id\": N}`     -- 완료 (DB 저장 완료 후)\n- `data: {\"type\": \"error\", \"message\": \"...\"}`   -- 오류\n\n---\n\n### 결정 4 -- 컨텍스트 윈도우 관리 전략\n\n**결정**: 섹션별 독립 컨텍스트. 각 섹션의 대화 이력은 최근 20턴(10 사용자 + 10 AI)만 SDK에 전달한다. 공고문은 분석 후 요약본(`rfp_summary`)만 유지한다.\n\n**근거**: R1(비용), R2(컨텍스트 초과) 리스크 대응. 섹션 채팅은 해당 섹션 내용에 집중하면 되며, 전체 대화 이력이 필요 없다.\n\n---\n\n## 2. 기각된 대안\n\n| 대안 | 기각 이유 |\n|------|---------|\n| subprocess + streaming | subprocess는 완료 전까지 출력 없음. 스트리밍 불가능. |\n| 전체 제안서 단일 컨텍스트 | 공고문 + 대화 누적 시 100k+ 토큰 초과 위험. 비용 통제 불가. |\n| 슬라이드(페이지) 단위 | autoproposal과 동일해짐. adproposal-js의 \"소통형\" 차별점 소멸. |\n| Server-Sent Events 대신 WebSocket | Flask에서 WebSocket은 추가 라이브러리(flask-socketio) 필요. SSE는 표준 HTTP, 단방향으로 충분. |\n| React/Vue 프론트 | 글로벌 CLAUDE.md 강제 금지. 바닐라 JS로 구현 가능. |\n| DOCX 파싱 추가 | 6-Pager [제외] 항목. MVP 범위 외. |\n| Redis 캐시 | 로컬 단일 사용자. 불필요한 과도한 엔지니어링. |\n\n---\n\n## 3. DB 스키마\n\n파일: `api/db.py`\n\n```sql\nPRAGMA journal_mode=WAL;\n\n-- 제안서 (공고 1건 = 제안서 1건)\nCREATE TABLE IF NOT EXISTS proposals (\n    id          INTEGER PRIMARY KEY AUTOINCREMENT,\n    title       TEXT NOT NULL,              -- 제안서 제목 (사업명 또는 사용자 입력)\n    source_type TEXT NOT NULL DEFAULT 'text', -- 'pdf' | 'text'\n    filename    TEXT,                       -- PDF 업로드 시 원본 파일명\n    raw_text    TEXT,                       -- 원본 공고문 전문 (파싱 결과)\n    rfp_summary TEXT,                       -- AI 요약본 (컨텍스트 전달용, raw_text 대체)\n    rfp_json    TEXT,                       -- JSON: {client_name, budget, duration, ...}\n    toc_json    TEXT,                       -- JSON: [{id, level, title, order_idx}] 목차 구조\n    status      TEXT NOT NULL DEFAULT 'draft', -- 'draft'|'analyzing'|'ready'|'done'\n    created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n    updated_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n\n-- 목차 섹션 (proposals 1 : N sections)\nCREATE TABLE IF NOT EXISTS sections (\n    id          INTEGER PRIMARY KEY AUTOINCREMENT,\n    proposal_id INTEGER NOT NULL REFERENCES proposals(id) ON DELETE CASCADE,\n    level       INTEGER NOT NULL,           -- 1=대제목, 2=소제목, 3=본문\n    title       TEXT NOT NULL,              -- 섹션 제목\n    order_idx   INTEGER NOT NULL,           -- 정렬 순서\n    content     TEXT,                       -- 현재 최신 내용 (AI 생성 또는 수동 편집)\n    status      TEXT NOT NULL DEFAULT 'pending', -- 'pending'|'generating'|'done'\n    created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n    updated_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n\n-- 대화 이력 (sections 1 : N messages)\nCREATE TABLE IF NOT EXISTS messages (\n    id          INTEGER PRIMARY KEY AUTOINCREMENT,\n    section_id  INTEGER NOT NULL REFERENCES sections(id) ON DELETE CASCADE,\n    role        TEXT NOT NULL,              -- 'user' | 'assistant'\n    content     TEXT NOT NULL,\n    created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n```\n\n**설계 판단**:\n- `advertisers` 테이블 생략. 로컬 단일 사용자이며 광고주 프로필 관리 기능이 6-Pager 범위 외.\n- `pipeline_logs` 테이블 생략. autoproposal의 4인 팀 병렬 파이프라인을 사용하지 않으므로 불필요.\n- `rfp_summary`는 raw_text의 AI 압축본. 이후 섹션 생성 시 raw_text 대신 이것을 컨텍스트로 사용하여 토큰 절약.\n- `toc_json`은 proposals 테이블에 JSON으로 저장. sections 테이블 생성의 소스가 된다.\n- `sections.content`는 최신 버전만 보관. 버전 이력 관리는 MVP 제외(6-Pager [제외] 항목 내 맥락).\n\n---\n\n## 4. 파일 구조 및 함수 명세\n\n```\nC:\\dev\\services\\adproposal-js\\\n├── app.py                         # Flask factory (autoproposal에서 복사 후 수정)\n├── api/\n│   ├── __init__.py\n│   ├── db.py                      # SQLite init + migrate (신규 스키마)\n│   ├── proposals.py               # 제안서 CRUD Blueprint\n│   └── chat.py                    # SSE 스트리밍 Blueprint\n├── services/\n│   ├── __init__.py\n│   ├── parser.py                  # PDF 파싱 (autoproposal에서 그대로 복사)\n│   ├── rfp_analyzer.py            # RFP 분석 + 목차 추출\n│   └── section_writer.py          # 섹션 초안 생성 + 대화형 수정\n├── static/\n│   ├── style.css\n│   ├── app.js                     # 메인 SPA 로직\n│   └── favicon.ico\n├── templates/\n│   └── index.html\n├── uploads/                       # PDF 업로드 임시 저장 (.gitignore)\n├── data/                          # SQLite DB (.gitignore)\n├── requirements.txt\n├── .env.example\n├── .gitignore\n└── CLAUDE.md\n```\n\n---\n\n### 4-1. `app.py`\n\n```python\n# autoproposal/app.py를 기반으로 아래 항목만 수정\n\n# 변경: service명, Blueprint 등록\napp.config[\"MAX_CONTENT_LENGTH\"] = 50 * 1024 * 1024\n\nfrom api.proposals import bp as proposals_bp\nfrom api.chat import bp as chat_bp\napp.register_blueprint(proposals_bp, url_prefix=\"/api/proposals\")\napp.register_blueprint(chat_bp, url_prefix=\"/api/chat\")\n\n# 추가: 로컬 실행이므로 PORT 기본값 5060 (autoproposal=8080과 충돌 방지)\nport=int(os.environ.get(\"PORT\", 5060))\n\n# 유지: /health, errorhandler, static/template 서빙\n```\n\n---\n\n### 4-2. `api/db.py`\n\n함수 목록:\n\n| 함수 | 설명 |\n|------|------|\n| `get_conn() -> sqlite3.Connection` | WAL 모드 커넥션 반환 |\n| `init_db()` | 테이블 생성 (IF NOT EXISTS) |\n| `migrate_db()` | Idempotent ALTER TABLE (컬럼 추가) |\n\nDB 경로: `os.environ.get(\"ADPROPOSAL_DB\", \"./data/adproposal.db\")`\n로컬 전용이므로 `/app/data/` 절대경로 불필요. `./data/` 상대경로 사용.\n\n---\n\n### 4-3. `api/proposals.py`\n\nBlueprint: `bp = Blueprint(\"proposals\", __name__)`\n\n| 메서드 | 경로 | 함수명 | 설명 |\n|--------|------|--------|------|\n| GET | `/` | `list_proposals()` | 제안서 목록 반환 (id, title, status, created_at) |\n| POST | `/` | `create_proposal()` | 텍스트 입력으로 제안서 생성 |\n| POST | `/upload` | `upload_pdf()` | PDF 업로드 후 텍스트 추출, 제안서 생성 |\n| GET | `/<int:proposal_id>` | `get_proposal()` | 제안서 상세 (섹션 목록 포함) |\n| DELETE | `/<int:proposal_id>` | `delete_proposal()` | 제안서 삭제 |\n| GET | `/<int:proposal_id>/export` | `export_proposal()` | 마크다운 내보내기 |\n| PUT | `/sections/<int:section_id>` | `update_section()` | 섹션 내용 수동 편집 |\n\n**`create_proposal()` 처리 흐름**:\n```\nrequest.get_json() -> validate(title, raw_text)\n-> INSERT INTO proposals (title, source_type='text', raw_text)\n-> return {ok: true, data: {id, title, status: 'draft'}}\n```\n분석(RFP 파싱 + 목차 추출)은 별도 SSE 엔드포인트에서 수행. 업로드와 분석을 분리하여 느린 AI 호출이 업로드 응답을 블로킹하지 않도록 한다.\n\n**`export_proposal()` 처리 흐름**:\n```\nSELECT proposal + all sections (ORDER BY order_idx)\n-> 마크다운 문자열 조립:\n   # {proposal.title}\n   ## {section.title} (level=1이면 ##, level=2이면 ###, level=3이면 본문 단락)\n   {section.content}\n-> Response(markdown_str, mimetype=\"text/plain\",\n            headers={\"Content-Disposition\": f\"attachment; filename={title}.md\"})\n```\n\n---\n\n### 4-4. `api/chat.py`\n\nBlueprint: `bp = Blueprint(\"chat\", __name__)`\n\n| 메서드 | 경로 | 함수명 | 설명 |\n|--------|------|--------|------|\n| GET | `/proposals/<int:proposal_id>/analyze` | `stream_analyze()` | RFP 분석 + 목차 추출 SSE |\n| GET | `/sections/<int:section_id>/generate` | `stream_generate()` | 섹션 초안 생성 SSE |\n| POST | `/sections/<int:section_id>/message` | `post_message()` | 사용자 메시지 저장 후 AI 응답 SSE URL 반환 |\n| GET | `/sections/<int:section_id>/reply` | `stream_reply()` | 가장 최근 사용자 메시지에 대한 AI 응답 SSE |\n| GET | `/sections/<int:section_id>/messages` | `get_messages()` | 해당 섹션의 대화 이력 반환 |\n\n**SSE 라우트에 GET을 사용하는 이유**: `EventSource` API는 GET 요청만 지원한다. 사용자 메시지는 `POST /sections/{id}/message`로 먼저 DB에 저장한 후, `GET /sections/{id}/reply`로 SSE 스트림을 열어 응답을 받는다. 두 단계로 나누어 POST 바디와 SSE를 분리한다.\n\n**`stream_analyze()` 처리 흐름**:\n```python\ndef stream_analyze(proposal_id):\n    proposal = db.get_proposal(proposal_id)\n    # status를 'analyzing'으로 업데이트\n    def generate():\n        yield 'data: {\"type\":\"status\",\"message\":\"RFP 분석 중...\"}\\n\\n'\n        result = rfp_analyzer.analyze(proposal[\"raw_text\"])\n        # rfp_json, rfp_summary, toc_json을 proposals에 저장\n        # sections 테이블에 toc 항목들 INSERT\n        yield f'data: {{\"type\":\"done\",\"proposal_id\":{proposal_id}}}\\n\\n'\n    return Response(stream_with_context(generate()), mimetype=\"text/event-stream\")\n```\n\n**`stream_generate()` 처리 흐름**:\n```python\ndef stream_generate(section_id):\n    section = db.get_section(section_id)\n    proposal = db.get_proposal(section[\"proposal_id\"])\n    \n    def generate():\n        full_content = \"\"\n        with anthropic_client.messages.stream(\n            model=\"claude-sonnet-4-5\",\n            system=section_writer.build_system_prompt(proposal),\n            messages=section_writer.build_generate_messages(section, proposal),\n            max_tokens=2000,\n        ) as stream:\n            for text in stream.text_stream:\n                full_content += text\n                yield f'data: {json.dumps({\"type\":\"chunk\",\"content\":text})}\\n\\n'\n        # stream 완료 후 DB 저장\n        db.update_section_content(section_id, full_content)\n        db.insert_message(section_id, \"assistant\", full_content)\n        yield f'data: {{\"type\":\"done\",\"section_id\":{section_id}}}\\n\\n'\n    \n    return Response(stream_with_context(generate()), mimetype=\"text/event-stream\")\n```\n\n---\n\n### 4-5. `services/parser.py`\n\nautoproposal의 동일 파일을 **그대로 복사**한다. 함수 시그니처 변경 없음:\n```python\nextract_text_from_pdf(filepath: str) -> str\n```\n\n---\n\n### 4-6. `services/rfp_analyzer.py`\n\n함수 목록:\n\n| 함수 | 입력 | 출력 | 설명 |\n|------|------|------|------|\n| `analyze(raw_text: str) -> dict` | 공고문 원문 | `{rfp_json, rfp_summary, toc_json}` | 전체 분석 진입점 |\n| `_extract_rfp_info(raw_text: str) -> dict` | 공고문 | rfp JSON | 기본 정보 추출 (client, budget, duration, key_requirements) |\n| `_extract_toc(raw_text: str, rfp_info: dict) -> list` | 공고문 + rfp 정보 | 섹션 목록 | 과업요구사항 목차 추출 |\n| `_summarize(raw_text: str) -> str` | 공고문 | 요약 텍스트 (3000자 이내) | 이후 컨텍스트용 요약 생성 |\n\n**`_extract_toc()` 프롬프트 핵심 지시**:\n```\n이 입찰공고문의 과업요구사항(RFP 목차)을 추출하여\n계층 구조를 JSON 배열로 반환하라.\n\n출력 형식:\n[\n  {\"level\": 1, \"title\": \"사업 개요\", \"order_idx\": 0},\n  {\"level\": 2, \"title\": \"1-1. 사업 배경 및 목적\", \"order_idx\": 1},\n  {\"level\": 1, \"title\": \"추진 전략\", \"order_idx\": 2},\n  ...\n]\n\nlevel 1 = 대제목, level 2 = 소제목, level 3 = 세부 항목\nJSON만 출력, 다른 텍스트 없음\n```\n\n**`analyze()` 반환 구조**:\n```python\n{\n    \"rfp_json\": '{\"client_name\":\"...\", \"budget\":\"...\", ...}',  # JSON 문자열\n    \"rfp_summary\": \"...\",  # 3000자 이내 요약 텍스트\n    \"toc_json\": '[{\"level\":1,\"title\":\"...\",\"order_idx\":0}, ...]',  # JSON 문자열\n}\n```\n\n`anthropic` SDK 사용 (`stream=False`, 단일 호출). 분석 결과는 JSON이므로 스트리밍 불필요.\n\n---\n\n### 4-7. `services/section_writer.py`\n\n함수 목록:\n\n| 함수 | 설명 |\n|------|------|\n| `build_system_prompt(proposal: dict) -> str` | 섹션 생성용 시스템 프롬프트 조립 |\n| `build_generate_messages(section: dict, proposal: dict) -> list` | 초안 생성용 messages 배열 |\n| `build_chat_messages(section: dict, proposal: dict, history: list) -> list` | 대화형 수정용 messages 배열 (최근 20턴) |\n\n**`build_system_prompt()` 핵심 내용**:\n```\n당신은 대한민국 최고의 광고제안서 작성 전문가입니다.\n대학교 광고제안서를 작성 중입니다.\n\n[공고 정보]\n발주처: {rfp.client_name}\n사업명: {rfp.project_name}\n예산: {rfp.budget}\n핵심 요구사항: {rfp.key_requirements}\n\n[공고 요약]\n{proposal.rfp_summary}\n\n[작성 원칙]\n- 천편일률적인 대학교 광고 클리셰를 피하라. 기존에 쓰던 패턴은 무조건 비틀어라.\n- 일론머스크적 사고: 문제의 본질에서 출발하고, 상식을 의심하라.\n- 구체적 수치와 출처를 반드시 포함하라.\n- 짧고 강한 문장. 긴 수식어 금지.\n- 평가위원이 \"이 제안사는 다르다\"고 느끼게 하라.\n\n[금지 클리셰]\n- \"함께하는 대학교\" 류의 막연한 슬로건\n- \"SNS를 통한 소통 강화\" 류의 공허한 전략\n- 근거 없는 퍼센트 목표치 (\"인지도 30% 향상\")\n```\n\n**`build_generate_messages()` 구조**:\n```python\n[\n    {\n        \"role\": \"user\",\n        \"content\": f\"\"\"다음 섹션의 초안을 작성하라.\n\n섹션: {section.title} (레벨 {section.level})\n전체 목차에서의 위치: {order_idx+1}/{total_sections}\n\n이 섹션에서 다뤄야 할 내용:\n- level 1이면 이 대제목 아래 소제목들의 방향성을 제시하는 리드 문구\n- level 2이면 구체적 전략/분석 내용\n- level 3이면 실행 세부 내용\n\n마크다운 형식으로 작성하라.\"\"\"\n    }\n]\n```\n\n**`build_chat_messages()` 구조**:\n```python\n# 1. 현재 섹션 내용을 첫 assistant 메시지로 세팅\n# 2. DB에서 해당 섹션의 messages를 최근 20턴(20개 rows) 가져옴\n# 3. messages 배열로 변환 후 반환\n[\n    {\"role\": \"assistant\", \"content\": section.content},  # 현재 섹션 초안\n    {\"role\": \"user\", \"content\": \"이 부분 더 공격적으로...\"},  # 최근 대화\n    {\"role\": \"assistant\", \"content\": \"...\"},\n    ...\n]\n```\n\n---\n\n### 4-8. `static/app.js`\n\n**상태 관리 (전역 변수)**:\n```javascript\nlet currentProposalId = null;\nlet currentSectionId = null;\nlet eventSource = null;  // 활성 SSE 연결\n```\n\n**주요 함수 목록**:\n\n| 함수 | 설명 |\n|------|------|\n| `initApp()` | 페이지 로드 시 제안서 목록 로드 |\n| `loadProposals()` | GET /api/proposals -> 좌측 사이드바 목록 렌더링 |\n| `showUploadModal()` | PDF/텍스트 입력 모달 표시 |\n| `submitProposal(formData)` | POST /api/proposals 또는 /upload -> 생성 후 analyze 시작 |\n| `startAnalyze(proposalId)` | GET /api/chat/proposals/{id}/analyze EventSource 열기 |\n| `renderToc(proposal)` | 중앙 패널에 섹션 목록 트리 렌더링 |\n| `selectSection(sectionId)` | 우측 패널에 섹션 내용 + 대화창 표시 |\n| `startGenerate(sectionId)` | GET /api/chat/sections/{id}/generate EventSource 열기 |\n| `sendMessage(sectionId, text)` | POST /api/chat/sections/{id}/message -> GET /reply EventSource |\n| `streamToElement(es, targetEl)` | SSE chunk를 DOM 요소에 실시간 append |\n| `autoGenerateAll(proposalId)` | 전체 섹션 순서대로 자동 generate (섹션간 순차 실행) |\n| `exportMarkdown(proposalId)` | GET /api/proposals/{id}/export -> 파일 다운로드 |\n| `closeSse()` | 기존 eventSource 닫기 |\n\n**`streamToElement()` 구현 패턴**:\n```javascript\nfunction streamToElement(url, targetEl, onDone) {\n    closeSse();\n    eventSource = new EventSource(url);\n    eventSource.onmessage = (e) => {\n        const data = JSON.parse(e.data);\n        if (data.type === \"chunk\") {\n            targetEl.textContent += data.content;\n        } else if (data.type === \"done\") {\n            eventSource.close();\n            eventSource = null;\n            if (onDone) onDone(data);\n        } else if (data.type === \"error\") {\n            targetEl.textContent += \"\\n[오류: \" + data.message + \"]\";\n            eventSource.close();\n        }\n    };\n    eventSource.onerror = () => {\n        eventSource.close();\n        eventSource = null;\n    };\n}\n```\n\n---\n\n### 4-9. `templates/index.html` -- 레이아웃\n\n```\n+------------------+---------------------------+----------------------+\n| 제안서 목록       | 목차 (섹션 트리)          | 섹션 편집 + 대화창   |\n| [+ 새 제안서]     |                           |                      |\n|                   | > 1. 사업 이해             | ## 1. 사업 이해      |\n| 2026-04-09        |   1-1. 현황 분석 [done]   | [섹션 내용 텍스트]   |\n| 00대학교 광고     |   1-2. 목표 설정 [pending]|                      |\n|                   | > 2. 추진 전략            | [재생성] [편집]      |\n|                   |   ...                     |                      |\n|                   |                           | --대화창--           |\n|                   | [전체 자동 생성]          | AI: 초안 작성했습니다|\n|                   | [마크다운 내보내기]       | 나: 더 공격적으로    |\n|                   |                           | [메시지 입력창]      |\n+------------------+---------------------------+----------------------+\n```\n\n3-패널 레이아웃. CSS `display: grid; grid-template-columns: 240px 1fr 400px;`\n\n섹션 상태 표시: `[pending]`=회색, `[generating]`=파란색 점멸, `[done]`=초록색\n\n---\n\n## 5. requirements.txt\n\n```\nflask==3.1.0\nflask-cors==5.0.1\ngunicorn==23.0.0\ngevent==24.11.1\npython-dotenv==1.1.0\npdfplumber==0.11.9\nanthropic==0.42.0\npytest==8.3.5\n```\n\n`weasyprint`, `Pillow`는 제거한다. PDF 출력이 MVP 범위 외이며 weasyprint는 시스템 라이브러리 의존성이 많아 설치 오류 원인이 된다.\n\n로컬 전용이므로 `gunicorn`, `gevent`는 개발 시 불필요하지만 requirements.txt에 유지한다(팀 일관성).\n\n---\n\n## 6. 환경변수\n\n`C:/dev/.env`에서 로드:\n\n| 키 | 용도 | 없으면 터지는 곳 |\n|----|------|----------------|\n| `ANTHROPIC_API_KEY` | anthropic SDK 인증 | `services/rfp_analyzer.py` 초기화 시 |\n| `SECRET_KEY` | Flask 세션 (실제로는 세션 미사용이나 Flask 권장) | `app.py` |\n| `ADPROPOSAL_DB` | SQLite 경로 (기본값: `./data/adproposal.db`) | `api/db.py` |\n\nanthropic SDK 초기화 위치: `services/rfp_analyzer.py`와 `services/section_writer.py`에서 모듈 레벨에 `client = anthropic.Anthropic()` 생성. SDK가 자동으로 `ANTHROPIC_API_KEY` 환경변수를 읽는다.\n\n---\n\n## 7. 구현 Phase\n\n### Phase A -- 기반 구조 (1-2일)\n\n1. 프로젝트 디렉토리 생성 및 git 초기화 (`C:\\dev\\services\\adproposal-js`)\n2. GitHub repo 생성 (`minjunbyeon-netizen/service-adproposal-js`)\n3. `app.py` 작성 (autoproposal 복사 후 수정)\n4. `api/db.py` 작성 (신규 스키마 3테이블)\n5. `services/parser.py` 복사\n6. `requirements.txt`, `.gitignore`, `.env.example`, `CLAUDE.md` 작성\n7. `python app.py` 로컬 실행 확인 + `/health` 응답 확인\n\n**완료 기준**: `localhost:5060` 접속 시 빈 index.html 응답, `/health` 200\n\n---\n\n### Phase B -- RFP 분석 + 목차 추출 (2-3일)\n\n1. `services/rfp_analyzer.py` 작성\n   - `_extract_rfp_info()` -- anthropic SDK, `stream=False`\n   - `_extract_toc()` -- anthropic SDK, `stream=False`\n   - `_summarize()` -- anthropic SDK, `stream=False`\n   - `analyze()` -- 세 함수 조합\n2. `api/proposals.py` 작성\n   - `POST /api/proposals` (텍스트 입력)\n   - `POST /api/proposals/upload` (PDF)\n   - `GET /api/proposals/<id>`\n3. `api/chat.py` 작성\n   - `GET /api/chat/proposals/<id>/analyze` (SSE)\n4. `templates/index.html` 기본 레이아웃 + 좌측/중앙 패널\n5. `static/app.js` -- `initApp`, `loadProposals`, `submitProposal`, `startAnalyze`, `renderToc`\n\n**완료 기준**: 실제 입찰공고 PDF 1건 업로드 후 목차 추출 성공. S1 달성.\n\n---\n\n### Phase C -- 섹션 생성 + 대화형 수정 (2-3일)\n\n1. `services/section_writer.py` 작성\n   - `build_system_prompt()`\n   - `build_generate_messages()`\n   - `build_chat_messages()`\n2. `api/chat.py` 추가\n   - `GET /api/chat/sections/<id>/generate` (SSE)\n   - `POST /api/chat/sections/<id>/message`\n   - `GET /api/chat/sections/<id>/reply` (SSE)\n   - `GET /api/chat/sections/<id>/messages`\n3. `api/proposals.py` 추가\n   - `PUT /api/proposals/sections/<id>` (수동 편집)\n   - `GET /api/proposals/<id>/export` (마크다운)\n4. `static/app.js` -- `selectSection`, `startGenerate`, `sendMessage`, `streamToElement`, `autoGenerateAll`, `exportMarkdown`\n5. `templates/index.html` 우측 패널 (섹션 뷰 + 대화창)\n\n**완료 기준**: 목차 전체 섹션 초안 생성 + 대화 피드백 반영 + 마크다운 내보내기. S2, S3, S4 달성.\n\n---\n\n### Phase D -- 프롬프트 튜닝 (1일)\n\n1. 실제 입찰공고로 엔드-투-엔드 테스트\n2. 시스템 프롬프트 개선 (클리셰 블랙리스트, 일론머스크 원칙 강화)\n3. CEO 직접 사용 후 피드백 반영\n\n**완료 기준**: S5, S6 달성.\n\n---\n\n## 8. 기술 리스크 및 대응\n\n| 리스크 | 대응 |\n|--------|------|\n| anthropic SDK 스트리밍 중 Flask 응답 타임아웃 | `gunicorn timeout=300` 또는 `app.run()`의 기본 dev server는 timeout 없음. 로컬이므로 dev server 사용으로 충분. |\n| PDF 공고문 파싱 실패 (이미지형 PDF, 스캔본) | 텍스트 직접 붙여넣기 폴백을 UI에 항상 노출. 업로드 실패 시 오류 메시지에 \"텍스트 직접 입력을 이용해 주세요\" 표시. |\n| `_extract_toc()` JSON 파싱 실패 | `_clean_json()` 유틸 (autoproposal에서 검증된 코드) 재사용. 파싱 실패 시 빈 목차로 저장하고 사용자에게 수동 편집 안내. |\n| 컨텍스트 초과 (긴 공고문) | `_summarize()` 결과(3000자) 기준. 요약이 없으면 raw_text를 `[:6000]`으로 잘라서 전달. |\n| SSE 연결 중복 (사용자가 버튼 연타) | `closeSse()` 함수로 기존 EventSource 먼저 닫은 후 새 연결 열기. |\n| anthropic SDK 버전 (0.42.0) stream API 호환성 | `anthropic==0.42.0`의 `client.messages.stream()` 컨텍스트 매니저 패턴 사용 가능 확인 (0.28+ 지원). requirements.txt 버전 고정으로 재현성 보장. |\n\n---\n\n## 9. autoproposal 재사용 vs 신규 작성 최종 정리\n\n| 파일 | 처리 방식 | 변경 범위 |\n|------|---------|---------|\n| `app.py` | 복사 후 수정 | service명, Blueprint, 포트(5060) |\n| `api/db.py` | 신규 작성 | 스키마 완전 다름 |\n| `api/core.py` | 미사용 | 역할을 `proposals.py` + `chat.py`가 대체 |\n| `services/parser.py` | 그대로 복사 | 변경 없음 |\n| `services/agents.py` | 미사용 | subprocess 패턴 폐기. SDK로 대체 |\n| `services/generator.py` | 프롬프트만 참고 | 7단계 방법론, 시스템 프롬프트 텍스트 |\n| `services/assembler.py` | 미사용 | 26장 HTML 슬라이드 조립 불필요 |\n| `services/renderer.py` | 미사용 | 동일 이유 |\n| `web/app.js` | SSE 수신 패턴만 참고 | 구조가 달라 신규 작성 |\n| `requirements.txt` | 수정 후 사용 | weasyprint/Pillow 제거 |\n\n---\n\n## 10. CEO 질문 최종 답변\n\n**Q1 (AI 호출 방식)**: anthropic SDK 직접 호출로 결정. 스트리밍이 대화형 UX의 핵심이며, subprocess는 구조적으로 스트리밍 불가능.\n\n**Q2 (작업 단위)**: 섹션(목차 항목) 단위 확인으로 결정. \"전체 자동 생성\" 버튼을 함께 제공하여 빠른 진행과 정밀 수정을 모두 지원.\n\n**Q3 (기한)**: Phase A+B가 3-5일, Phase C가 2-3일이다. 기한이 1주 이내면 Phase C의 대화창을 단순화(스트리밍 없이 일괄 응답)하여 일정을 맞출 수 있다. 2주 이상이면 전체 Phase 완성 가능."}}, "v1-2026-04-09.json": {"version": 1, "title": "광고제안서 디벨롭", "date": "2026-04-09", "time": "10:52:51", "change_note": "v1 회의 결과", "project_path": "services/adproposal-js", "briefing": "[유형] 신규 서비스\n[요약] 보고서 -- 소통 / 메시지 -- 광고제안서를 작성해야함. 입찰공고나 안의 내용을 철저히 분석해서 나와 소통하면서 제안서를 만들어가는것이 목표\n[기능] 소통 / 메시지\n[대상] 보고서\n[현재 상태] 수작업으로 하고 있음\n[핵심 문제] 새로운 기회\n[사용자 가치] 체계적 정리\n[줄어드는 것] 작업 시간\n[성공 지표] 만족도\n[목표 수치] 일회성 작업이고, 목표한 기한내에 광고제안서를 만드는것.\n[안 만들면] 계속 수작업\n[사용자] 나만\n[동시 접속] 1명\n[사용 기기] PC만\n[인증] 없음\n[핵심 기능] 제안서 분석, 핵심내용 파악 / 대제목,소제목,본문,등 계층별 제안 / 목차에 맞게 제안(과업요구사항 필수로 따라야함)\n[배포] 로컬 전용\n[DB] 자동\n[우선순위] 빠른 완성 (MVP)\n[참고사항] 일론머스크적 사고, 기존과 틀을깨야함. 대학교광고임. 특별할것이없음. 맨날하던 천편일률적인 말은 하지않으려고함.", "reports": {"review": "## 검수 결과: 확인 필요\n\n아래 항목들을 먼저 정리해야 회의를 시작할 수 있습니다.\n\n---\n\n### 확인 필요 질문\n\n**[필수 확인]**\n\n1. `services/autoproposal`이 프로젝트 목록에 이미 존재합니다. `adproposal-js`는 기존 autoproposal과 어떻게 다른가요? 별도로 새로 만드는 이유가 있나요, 아니면 autoproposal을 디벨롭하는 건가요?\n\n2. 프로젝트명 끝에 \"js\"가 붙어 있습니다. React나 Vue 같은 JS 프레임워크 사용 의도인가요? 기본 스택은 Flask + 바닐라 JS이므로 프레임워크 사용 여부를 확인해야 합니다.\n\n3. [DB] 항목이 \"자동\"으로 작성되어 있습니다. 대화 히스토리나 제안서 초안을 저장할 계획인가요, 아니면 저장 자체가 불필요한가요? 저장이 필요하면 SQLite를 사용할 것인지도 알려주세요.\n\n**[권고 확인]**\n\n4. [핵심 문제] = \"새로운 기회\"는 문제 기술이 아닙니다. 수작업의 어떤 부분이 가장 불편한지 한 문장으로 말해주시면 방향이 잡힙니다.\n\n5. [성공 지표] \"만족도\"는 완료 판단이 어렵습니다. \"기한 내 제안서 최종본 완성\"처럼 명확한 완료 기준이 있나요?\n\n---\n\n### v1 제외 사항 (잠정)\n\n1. 외부 입찰공고 자동 크롤링 (URL 입력 또는 직접 붙여넣기로 대체)\n2. 완성 제안서 PDF / PPT 출력 (텍스트 구조 생성까지만)\n3. 제안서 버전 관리 및 수정 이력\n4. 이미지, 도표, 인포그래픽 생성\n5. 다중 제안서 동시 관리 (대시보드, 목록 화면)", "scout": "조사 완료. 보고한다.\n\n---\n\n# 프로젝트 조사 보고서 -- services/adproposal-js\n\n## 1. 프로젝트 상태\n\n**경로 `C:\\dev\\services\\adproposal-js` 미존재.** 신규 생성 대상.\n\n유사 선행 프로젝트 `services/autoproposal`이 존재하며, 재사용 가능 자산이 상당량 있다.\n\n---\n\n## 2. 선행 프로젝트 autoproposal 현황\n\n### 구조\n```\nservices/autoproposal/\n├── app.py                  # Flask factory 패턴, Blueprint 등록, /health 포함\n├── api/\n│   ├── core.py             # 801줄. 광고주·제안서·파이프라인 전체 라우트\n│   └── db.py               # SQLite init + idempotent migrate_db()\n├── services/\n│   ├── agents.py           # 503줄. claude CLI subprocess, 4인 병렬 에이전트 파이프라인\n│   ├── assembler.py        # 384줄. 에이전트 결과 -> 26장 HTML 슬라이드 조립\n│   ├── generator.py        # 910줄. 시스템 프롬프트 + 7단계 방법론 (RFP해체~KPI)\n│   ├── parser.py           # 54줄. pdfplumber PDF 텍스트 추출\n│   └── renderer.py         # 164줄. 슬라이드 HTML 렌더러\n├── web/\n│   ├── app.js              # 바닐라 JS 프론트 (SSE 진행상태, 슬라이드 뷰어, 편집)\n│   ├── style.css\n│   └── slide-templates.css\n├── requirements.txt        # flask, anthropic==0.42.0, pdfplumber, gevent 등\n├── Dockerfile              # python:3.11-slim 기반\n└── railway.toml\n```\n\n### 작동 방식\n- PDF 업로드 -> pdfplumber 텍스트 추출 -> Phase0(RFP분석) -> Phase1(팩트북) -> Phase2(전략) -> Phase3(크리에이티브·매체) -> Phase4(실행계획) 순차 진행\n- 각 Phase는 팀장(sonnet)+시니어(haiku)+주니어2(haiku) 병렬 처리 후 팀장 종합\n- SSE로 진행상태 실시간 전달\n- 결과: 26장 HTML 슬라이드, 히스토리 저장, PDF 출력\n\n### DB 스키마 (SQLite)\n```\nproposals    -- 제안서 본체 (rfp_analysis, factbook, strategy, proposal_html)\nadvertisers  -- 광고주 프로필 (tone, colors, style 등)\npipeline_logs -- 단계별 에이전트 실행 로그\n```\n\n---\n\n## 3. 재사용 가능 코드 목록\n\n| 파일 | 재사용 여부 | 비고 |\n|------|-----------|------|\n| `app.py` | 직접 복사 | Flask factory 구조 동일하게 사용 |\n| `api/db.py` | 수정 후 사용 | 테이블 설계만 변경 |\n| `services/parser.py` | 그대로 사용 | PDF/텍스트 추출 로직 동일 |\n| `services/agents.py` | 부분 사용 | claude subprocess 호출 패턴 재사용 |\n| `services/generator.py` | 프롬프트 참고 | 7단계 방법론 프롬프트 레퍼런스 |\n| `web/app.js` | 구조 참고 | SSE 수신 패턴, DOM 조작 패턴 |\n| `requirements.txt` | 베이스로 사용 | weasyprint는 제거 가능 |\n| `Dockerfile` | 직접 복사 | python:3.11-slim, gevent, workers=1 |\n\n---\n\n## 4. 신규 프로젝트 요구사항 분석\n\n### autoproposal 과의 차이점\n| 항목 | autoproposal | adproposal-js (신규) |\n|------|-------------|---------------------|\n| 인터페이스 | 자동 일괄 생성 | **소통형 채팅** -- 단계별 확인 후 진행 |\n| 입력 | PDF 업로드 | 입찰공고 텍스트/PDF + 대화 |\n| 출력 | 완성 슬라이드 26장 일괄 | **계층별 제안 (대제목→소제목→본문)** 순차 생성 |\n| 수정 | 편집 모드 | **대화로 수정** |\n| 배포 | Railway | **로컬 전용** |\n| 목차 | 자동 생성 | **과업요구사항(RFP 목차) 강제 준수** |\n\n### 핵심 기능 요구 (브리핑 기준)\n1. 입찰공고문 분석 + 핵심내용 파악 (Phase0 재사용 가능)\n2. 과업요구사항 목차를 강제 골격으로 사용\n3. 대제목→소제목→본문 계층별 순차 제안\n4. 사용자 피드백 수신 → 수정 → 다음 단계로 진행 (채팅 루프)\n5. 대학교 광고 특화: 천편일률 탈피, 일론머스크적 사고 프롬프트\n\n---\n\n## 5. 의존성 및 제약\n\n### 필요 패키지 (추정)\n```\nflask==3.1.0\nflask-cors==5.0.1\ngunicorn==23.0.0\ngevent==24.11.1\npython-dotenv==1.1.0\npdfplumber==0.11.9       # PDF 공고문 파싱\nanthropic==0.42.0        # Claude API (또는 claude CLI subprocess)\n```\nweasyprint(PDF 출력)은 로컬 전용이므로 제거 가능.\n\n### 제약사항\n- 로컬 전용 (Dockerfile/railway.toml 불필요, 선택)\n- 인증 없음\n- PC 단일 사용자 (SQLite WAL, workers=1)\n- 환경변수: `C:/dev/.env`의 `OPENAI_API_KEY` 또는 `ANTHROPIC_API_KEY` 사용\n\n---\n\n## 6. 결론 및 리스크\n\n**생성 가능 여부**: 즉시 착수 가능. autoproposal에서 핵심 자산 70% 이상 재사용 가능.\n\n**핵심 설계 결정 사항** (착수 전 확인 필요):\n1. 채팅 저장 방식 -- 세션(메모리) vs SQLite 영구 저장 중 선택\n2. 목차 입력 방식 -- RFP에서 자동 추출 vs 사용자가 직접 붙여넣기\n3. 제안 단위 -- 슬라이드 1장씩 확인 vs 섹션(묶음)별 확인\n4. 프롬프트 전략 -- `claude CLI subprocess` 유지 vs `anthropic SDK` 직접 호출 (스트리밍 용이)\n\n위 4가지를 결정하면 구현 계획 수립 및 착수가 가능하다.", "estimator": "# 범위 산정 보고서\n## services/adproposal-js 신규 서비스\n\n---\n\n## 1. 프로젝트 개요\n\n**서비스명**: adproposal-js (광고제안서 생성 어시스턴트)  \n**유형**: 신규 로컬 전용 웹 앱  \n**핵심 기능**: 입찰공고 분석 + 대화형 메시지 기반 제안서 작성  \n**사용자**: 단일 (본인)  \n**목표**: MVP 수준의 빠른 완성\n\n---\n\n## 2. 구현 파일 산정\n\n### 신규 생성 파일 (총 15-17개)\n\n| 카테고리 | 파일명 | 목적 | 예상 줄수 |\n|---------|--------|------|---------|\n| **핵심 서버** | app.py | Flask 메인, 라우트 등록 | 100-150 |\n| | models.py | SQLite: 공고, 제안서, 메시지 테이블 | 80-120 |\n| | ai_service.py | Claude API 호출 (제안서 생성) | 150-200 |\n| **API** | api/document.py | 공고 파일 업로드/분석 | 80-120 |\n| | api/proposal.py | 제안서 CRUD, 목차 구조 관리 | 120-180 |\n| | api/chat.py | 메시지 송수신, 컨텍스트 관리 | 150-200 |\n| **프론트** | templates/base.html | 공통 레이아웃 | 40-60 |\n| | templates/index.html | 대시보드 (공고 등록 + 제안서 목록) | 80-120 |\n| | templates/editor.html | 제안서 편집 화면 (메시지 패널 + 미리보기) | 120-150 |\n| | static/style.css | UI (메시지 채팅 스타일) | 150-200 |\n| | static/editor.js | 메시지 송수신, 실시간 렌더링 | 200-280 |\n| | static/preview.js | 제안서 미리보기 (마크다운→HTML) | 100-150 |\n| **설정/유틸** | utils.py | 파일 처리, 텍스트 정규화 | 60-80 |\n| | config.py | 상수 (허용 파일형식, 모델명 등) | 30-40 |\n| | requirements.txt | 의존성 (flask, sqlite3, anthropic) | 5-8 |\n| **.gitignore** | .gitignore | DB, 업로드 파일, .env | 10 |\n\n**합계**: 신규 파일 15-17개, 총 1,800-2,500 줄  \n**프로젝트 규모**: **소형~중형** (벤치마크: autoblog과 유사)\n\n---\n\n## 3. 복잡도 등급\n\n| 모듈 | 복잡도 | 사유 |\n|------|--------|------|\n| Claude API 통합 | **중** | 컨텍스트 윈도우 관리, 롤링 히스토리 필요 |\n| 메시지 UI (실시간) | **중** | SSE 또는 polling, 스크롤 자동 하단 이동 |\n| 제안서 구조화 | **중** | 계층별 목차(대-소-본문) 파싱/생성, JSON 구조 |\n| 파일 분석 | **중** | PDF/DOCX 파싱, 텍스트 추출 (python-docx 또는 PyPDF2) |\n| 로컬 DB | **낮** | SQLite WAL, 간단한 CRUD |\n| UI/CSS | **낮** | 바닐라 JS, 기본 메시지 채팅 레이아웃 |\n\n**전체 등급**: **MEDIUM (중간)** — 새로운 기술 스택 없음, AI 대화 로직이 핵심\n\n---\n\n## 4. 구현 단계 분할\n\n### Phase A: 기초 (1-2일)\n- [ ] Flask 앱 초기화, Blueprint 구조\n- [ ] SQLite 모델 (공고, 제안서, 메시지 테이블)\n- [ ] 공고 파일 업로드 엔드포인트\n- [ ] /health 엔드포인트\n- **산출물**: 기본 CRUD, DB 초기화 완료\n\n### Phase B: AI 통합 (2-3일)\n- [ ] Claude API 클라이언트 (ai_service.py)\n- [ ] 공고 분석 프롬프트 (핵심내용 파악)\n- [ ] 제안서 생성 프롬프트 (대제목/소제목/본문 계층)\n- [ ] 대화 컨텍스트 관리 (메시지 히스토리 유지)\n- **산출물**: 공고→제안서 초안 생성 완료\n\n### Phase C: 대화형 UI (2-3일)\n- [ ] 메시지 송수신 API (api/chat.py)\n- [ ] 메시지 패널 HTML/CSS/JS\n- [ ] 제안서 실시간 미리보기\n- [ ] 목차 네비게이션 (대-소-본문 클릭)\n- **산출물**: 브라우저에서 대화하며 제안서 수정 가능\n\n### Phase D: 다듬기 & 배포 (1-2일)\n- [ ] 에러 핸들링, 유효성 검사\n- [ ] 제안서 내보내기 (마크다운/PDF)\n- [ ] 로컬 실행 문서화\n- [ ] 단위 테스트 (핵심 API 2-3개)\n- **산출물**: MVP 완성, 로컬 실행 가능\n\n**총 예상**: 6-10일 (집중 개발 시)\n\n---\n\n## 5. 의존성 추가\n\n```\nflask==3.1.0\nanthropic==0.10.0          # Claude API\npython-docx==0.8.11        # DOCX 파싱\nPyPDF2==3.0.1              # PDF 파싱\nmarkdown==3.4.1            # 마크다운→HTML (미리보기용)\n```\n\n**신규**: 4개 패키지 (anthropic, docx, PDF, markdown)\n\n---\n\n## 6. 신규 기술 여부\n\n| 기술 | 도입 | 사유 |\n|------|------|------|\n| Claude API (anthropic SDK) | **신규** | 제안서 생성용 필수 |\n| DOCX/PDF 파싱 | **신규** | 입찰공고 분석용 |\n| SSE (메시지 실시간) | **선택** | polling으로 대체 가능 (MVP: polling) |\n| 마크다운 렌더링 | **신규** | 미리보기용 (가벼운 라이브러리) |\n\n---\n\n## 7. 주의사항 & 리스크\n\n| 항목 | 위험도 | 대응 |\n|------|--------|------|\n| Claude 토큰 비용 | **중** | 로컬 전용이므로 테스트 중심. 과도한 요청 방지 |\n| 문서 파싱 정확성 | **중** | PDF/DOCX 레이아웃 다양성. 정규표현식 + 휴리스틱 |\n| 컨텍스트 윈도우 한계 | **중** | 긴 공고+메시지 히스토리: 토큰 수 주의 |\n| 메시지 실시간성 | **낮** | MVP: 1초 주기 polling으로 충분 |\n\n---\n\n## 8. 최종 산정표\n\n| 항목 | 수치 | 비고 |\n|------|------|------|\n| 신규 파일 개수 | 15-17개 | 템플릿 3, API 3, 유틸 2, 정적파일 2, 기타 |\n| 총 코드 줄수 (LoC) | 1,800-2,500 | 공백·주석 제외 |\n| 의존성 추가 | +4개 | anthropic, python-docx, PyPDF2, markdown |\n| 구현 단계 | 4개 Phase | A(기초) → B(AI) → C(UI) → D(완성) |\n| 예상 기간 | 6-10일 | 집중 개발 (1일 8시간 기준) |\n| 복잡도 등급 | **MEDIUM** | AI 대화 로직 + 파일 분석 |\n| 테스트 대상 | 4-5개 | 제안서 생성, 메시지 저장, 파일 분석 |\n\n---\n\n## 9. 권고사항\n\n1. **Phase A 완료 후 AI 통합 검토**: 프롬프트 품질이 제안서 만족도 좌우\n2. **파일 파싱 우선순위**: PDF > DOCX (공고는 보통 PDF)\n3. **컨텍스트 관리**: 메시지 히스토리 요약 또는 슬라이딩 윈도우 구현 권장\n4. **로컬 CSV 백업**: 제안서 히스토리 로컬 저장 추천\n5. **빠른 완성 위해 Phase C에서 SSE 대신 polling 사용** (구현 난이도 낮음)\n\n---\n\n**준비 완료**: 이제 Phase A 구현에 들어갈 수 있습니다.", "strategy": "# 6-Pager: services/adproposal-js -- 광고제안서 디벨롭\n\n**작성일**: 2026-04-09\n**작성자**: 기획실장 (Planning Director)\n**프로젝트**: services/adproposal-js\n**유형**: 신규 서비스 (로컬 전용)\n\n---\n\n## 1. 목적\n\n입찰공고문을 분석하고, AI와 대화하며 계층별(대제목-소제목-본문) 광고제안서를 작성하는 로컬 웹 앱을 구축한다. 기존 수작업 제안서 작성 프로세스를 \"소통형 AI 어시스턴트\"로 전환하여 작업 시간을 단축하고, 과업요구사항(RFP 목차)을 강제 준수하면서도 천편일률적이지 않은 차별화된 제안서를 생산한다.\n\n핵심 가치: **\"분석 -> 구조화 -> 대화형 수정\"의 3단계 워크플로우를 하나의 인터페이스에서 완결**하는 것.\n\n---\n\n## 2. 배경\n\n**현재 상태**: 광고제안서를 수작업으로 작성 중. 대학교 광고라는 특성상 매번 유사한 구조가 반복되지만, CEO는 \"천편일률 탈피, 일론머스크적 사고\"를 요구.\n\n**선행 자산**: `services/autoproposal`이 이미 존재하며, Flask factory 패턴, PDF 파싱(pdfplumber), Claude subprocess 호출, SSE 진행상태, 슬라이드 조립 등 핵심 자산의 70% 이상을 재사용할 수 있다.\n\n**autoproposal과의 결정적 차이**:\n- autoproposal은 \"자동 일괄 생성\" (PDF 넣으면 26장 슬라이드 한 번에 출력)\n- adproposal-js는 \"소통형\" (단계별로 확인-수정-진행하는 채팅 루프)\n\n**일회성 프로젝트**: 특정 기한 내 광고제안서를 완성하는 것이 목표이므로, 장기 유지보수보다 빠른 완성(MVP)이 우선.\n\n---\n\n## 3. 범위\n\n### [포함]\n\n| 구분 | 항목 | 상세 |\n|------|------|------|\n| 공고 분석 | 입찰공고 입력 | PDF 업로드 또는 텍스트 직접 붙여넣기 |\n| 공고 분석 | 핵심내용 추출 | 과업요구사항, 평가기준, 예산, 일정 자동 파악 |\n| 공고 분석 | 목차 구조화 | RFP 과업요구사항을 강제 골격으로 추출 |\n| 제안서 생성 | 계층별 순차 제안 | 대제목 -> 소제목 -> 본문 순서로 AI가 제안 |\n| 제안서 생성 | 대화형 수정 | 메시지로 피드백하면 해당 섹션 재생성 |\n| 제안서 생성 | 목차 네비게이션 | 섹션별 이동, 진행상태 표시 |\n| 제안서 생성 | 차별화 프롬프트 | 대학교 광고 특화, 틀 깨는 제안 유도 |\n| 인프라 | 로컬 Flask 앱 | SQLite, 단일 사용자, 인증 없음 |\n| 인프라 | 대화 이력 저장 | SQLite에 메시지 + 제안서 버전 영구 저장 |\n| 출력 | 제안서 미리보기 | 브라우저 내 실시간 렌더링 |\n| 출력 | 마크다운 내보내기 | 완성본 텍스트 추출 |\n\n### [제외]\n\n| 항목 | 사유 |\n|------|------|\n| Railway 배포 | 로컬 전용 명시. Dockerfile/railway.toml 생성하지 않음 |\n| PDF 출력 (weasyprint) | MVP 범위 외. 마크다운/텍스트 내보내기로 대체 |\n| 멀티 사용자/인증 | 단일 사용자 명시 |\n| 슬라이드 디자인/레이아웃 | autoproposal의 26장 슬라이드 조립 로직 제외. 텍스트 제안서에 집중 |\n| DOCX 파싱 | 공고는 PDF가 표준. DOCX는 필요 시 후속 추가 |\n| 자동 일괄 생성 모드 | autoproposal과의 핵심 차별점. 반드시 대화형으로만 진행 |\n| 모바일 대응 | PC 단일 사용 명시 |\n\n---\n\n## 4. 리스크\n\n| ID | 리스크 | 영향도 | 발생확률 | 대응 전략 |\n|----|--------|--------|----------|-----------|\n| R1 | Claude API 토큰 비용 누적 | 중 | 중 | 대화 컨텍스트에 슬라이딩 윈도우 적용. 불필요한 히스토리 요약 처리. 모델 선택(haiku/sonnet) 전략 분리 |\n| R2 | 컨텍스트 윈도우 초과 (긴 공고문 + 누적 대화) | 상 | 중 | 공고문은 분석 후 요약본만 유지. 메시지 히스토리 최근 N턴만 전달. 섹션별 독립 컨텍스트 |\n| R3 | PDF 공고문 파싱 정확도 (표, 이미지 포함 문서) | 중 | 상 | pdfplumber 기본 사용 + 파싱 실패 시 텍스트 직접 붙여넣기 폴백 제공 |\n| R4 | 프롬프트 품질이 제안서 만족도를 좌우 | 상 | 중 | autoproposal의 7단계 방법론 프롬프트를 기반으로 튜닝. 초기 2-3회 반복 테스트 후 고정 |\n| R5 | \"틀 깨는 제안\" 품질 불확실 | 중 | 중 | 시스템 프롬프트에 \"일론머스크적 사고\" 원칙 명시. 기존 대학교 광고 클리셰 블랙리스트 포함 |\n| R6 | 일회성 프로젝트라 코드 품질 타협 유혹 | 낮 | 중 | 기본 구조만 autoproposal에서 복사하여 품질 유지. 과도한 엔지니어링은 하지 않되 기본 에러핸들링은 준수 |\n\n---\n\n## 5. 제약조건\n\n| 구분 | 제약 | 근거 |\n|------|------|------|\n| 기술 스택 | Flask + SQLite + 바닐라 JS | 글로벌 CLAUDE.md 강제 |\n| 배포 | 로컬 전용 (localhost) | CEO 브리핑 명시 |\n| AI 호출 | Claude API (anthropic SDK 또는 claude CLI subprocess) | 기존 스택 유지 |\n| DB | SQLite WAL, workers=1 | 단일 사용자, 로컬 전용 |\n| 프로젝트 경로 | `C:\\dev\\services\\adproposal-js` | dev-root 카테고리 규칙 준수 |\n| GitHub repo | `minjunbyeon-netizen/service-adproposal-js` | 네이밍 규칙 준수 |\n| 환경변수 | `C:/dev/.env`에서 로드 | 중앙 시크릿 규칙 |\n| 일정 | MVP 우선. 빠른 완성 | CEO 브리핑 우선순위 명시 |\n| 콘텐츠 톤 | 천편일률 탈피, 일론머스크적 사고 | CEO 요구사항 |\n\n---\n\n## 6. 성공기준\n\n| ID | 기준 | 측정 방법 | 목표 |\n|----|------|-----------|------|\n| S1 | 공고문을 입력하면 과업요구사항 기반 목차가 자동 추출된다 | 실제 입찰공고 PDF 1건으로 테스트 | 목차 항목 90% 이상 정확 추출 |\n| S2 | 목차의 각 섹션에 대해 계층별(대-소-본문) 제안이 생성된다 | 전체 목차 순회 완료 | 모든 섹션에 초안 생성 완료 |\n| S3 | 대화로 피드백하면 해당 섹션이 수정된다 | \"이 부분 더 공격적으로\" 같은 지시 테스트 | 피드백 반영 후 재생성 성공 |\n| S4 | 완성된 제안서를 텍스트/마크다운으로 내보낼 수 있다 | 내보내기 버튼 클릭 | 전체 제안서 1개 파일로 출력 |\n| S5 | CEO가 \"이걸로 제안서 쓸 수 있겠다\"고 판단한다 | CEO 직접 사용 후 만족도 | 주관적 만족 |\n| S6 | 기한 내 MVP 완성 | 실제 광고제안서 1건 작성에 활용 | 목표 기한 전 사용 가능 상태 |\n\n---\n\n## 팀 소집 판단\n\n| 팀 | 소집 여부 | 사유 |\n|----|-----------|------|\n| 개발팀장 (e1-chief-engineer) | **소집** | 구현 계획 수립 필수. autoproposal 자산 재사용 전략, API 설계, DB 스키마 확정 |\n| 정찰병 (s0-scout) | 완료 | 이미 조사 보고 제출됨 |\n| 측량사 (s0-estimator) | 완료 | 이미 산정 보고 제출됨 |\n| 보안팀 (security-reviewer) | 불필요 | 로컬 전용, 인증 없음, 외부 노출 없음 |\n| 디자인 (design-consultation) | 불필요 | 기능 우선 MVP, 바닐라 채팅 UI면 충분 |\n\n**소집 대상: 개발팀장 1명**\n\n---\n\n## CEO 질문사항 (착수 전 확인 필요)\n\n**Q1. AI 호출 방식 -- claude CLI subprocess vs anthropic SDK 직접 호출?**\nautoproposal은 `claude -p --model` subprocess 방식을 사용 중이다. adproposal-js는 대화형이므로 스트리밍 응답이 중요한데, anthropic SDK 직접 호출이 스트리밍에 유리하다. SDK로 전환해도 되는가, 아니면 기존 subprocess 패턴을 유지하는가?\n\n**Q2. 제안서 작업 단위 -- 섹션(목차 항목) 단위 확인인가, 슬라이드(페이지) 단위 확인인가?**\n\"계층별 제안\"이라 하면 목차의 각 항목(예: \"1. 사업 이해 > 1-1. 현황 분석 > 본문\")을 하나씩 확인하며 진행하는 것인지, 아니면 여러 항목을 묶어서 한 번에 보여주고 피드백받는 것인지 확인이 필요하다. 전자는 정밀하지만 느리고, 후자는 빠르지만 수정 범위가 넓다.\n\n**Q3. 실제 제안서 제출 기한이 언제인가?**\n\"일회성 작업이고 목표한 기한 내에\"라고 했는데, 구체적 기한에 따라 Phase 우선순위가 달라진다. 기한이 1주 이내면 Phase A+B만 집중하고 UI는 최소화해야 하며, 2주 이상이면 Phase C(대화형 UI)까지 완성할 수 있다.", "engineering": "[ERROR] claude CLI timeout (600s)", "executive-brief": "---\n\n# EXECUTIVE BRIEF\n**프로젝트**: services/adproposal-js -- 광고제안서 디벨롭\n**작성일**: 2026-04-09\n\n---\n\n## PROBLEM\n\n대학교 광고제안서를 전량 수작업으로 작성 중이며, 입찰공고 분석부터 계층별 내용 구성까지 모든 단계를 사람이 처리한다. 결과물은 매번 유사한 구조를 반복하는 천편일률적 제안서로 귀결되어, 경쟁 차별화가 불가능하다.\n\n---\n\n## SOLUTION\n\n입찰공고(PDF 또는 텍스트)를 AI가 분석해 과업요구사항 기반 목차를 자동 추출하고, 대화를 통해 대제목-소제목-본문 계층별로 제안서를 함께 완성하는 로컬 웹 앱을 구축한다. 기존 autoproposal 자산의 70%를 재사용해 개발 기간을 최소화한다.\n\n---\n\n## SCOPE (v1)\n\n**Include**\n- 입찰공고 PDF 업로드 및 텍스트 직접 붙여넣기\n- 과업요구사항 기반 목차 자동 추출 및 구조화\n- 대제목-소제목-본문 계층별 AI 제안 (섹션 단위 순차 진행)\n- 메시지 피드백 -> 해당 섹션 재생성 (대화형 수정)\n- 완성 제안서 마크다운 내보내기\n\n**Exclude**\n- PDF/PPT 출력 및 슬라이드 디자인\n- Railway 배포 (로컬 전용)\n- 다중 제안서 대시보드 및 버전 관리\n- 외부 입찰공고 자동 크롤링\n- 모바일 대응\n\n---\n\n## SUCCESS METRICS\n\n1. 실제 입찰공고 1건 투입 시 목차 항목의 90% 이상이 정확하게 추출됨\n2. 전체 목차 섹션에 초안 생성 완료 및 텍스트 내보내기 1회 성공\n3. CEO가 실제 제안서 제출에 이 도구를 사용하는 것으로 완료 판정\n\n---\n\n## KEY RISKS\n\n| 리스크 | 완화 전략 |\n|--------|-----------|\n| 긴 공고문과 누적 대화가 AI 컨텍스트를 초과해 품질 저하 | 공고문은 분석 후 요약본만 유지, 대화 히스토리 최근 N턴만 전달 |\n| PDF 파싱 실패 (표, 이미지 혼합 문서) | pdfplumber 파싱 실패 시 텍스트 직접 붙여넣기 폴백 필수 제공 |\n| 프롬프트 품질이 결과물 만족도를 좌우하며 사전 예측 불가 | autoproposal 방법론 프롬프트 기반으로 초기 2-3회 테스트 반복 후 고정 |\n\n---\n\n## DECISION REQUIRED\n\n1. AI 호출 방식 결정: claude CLI subprocess 유지 vs. anthropic SDK 직접 호출 (스트리밍 품질 차이)\n2. 섹션 단위 확인 방식 결정: 항목 1개씩 순차 확인 (정밀) vs. 여러 항목 묶음 확인 (속도 우선)\n3. 실제 입찰 제출 기한 공유: 1주 이내면 Phase A+B 집중, 2주 이상이면 대화형 UI 완성까지 포함\n\n---"}}};

    let h=`<div class="doc-header"><div class="doc-ver">VERSION ${data.version||''}</div>`;
    h+=`<div class="doc-title">${esc(data.title||'')}</div>`;
    h+=`<div class="doc-meta"><span>${data.date||''}</span><span>${data.time||''}</span><span>${data.project_path||''}</span>`;
    if(data.change_note)h+=`<span>${esc(data.change_note)}</span>`;
    h+=`</div></div>`;
    h+=`<div class="tab-bar">`;
    TABS.forEach(([id,label],i)=>{h+=`<div class="tab${i===0?' active':''}" data-tab="${id}" onclick="switchTab('${id}')">${label}</div>`});
    h+=`</div>`;
    // Executive Brief
    h+=`<div class="tab-panel active" id="panel-brief">`;
    if(data.reports&&data.reports['executive-brief']){
        const secs=data.reports['executive-brief'].split(/\n(?=(?:PROBLEM|SOLUTION|SCOPE|SUCCESS|KEY RISKS|DECISION|문제|해결|범위|성과|핵심|결정))/i);
        for(const sec of secs){const lines=sec.trim().split('\n');if(!lines[0])continue;h+=`<div class="exec-section"><div class="exec-section-title">${esc(lines[0].trim())}</div><div class="exec-body">${md(lines.slice(1).join('\n').trim())}</div></div>`}
    }else{h+=`<p style="color:#6E6E73;padding:20px 0">Executive Brief not yet generated.</p>`}
    h+=`</div>`;
    // Briefing
    h+=`<div class="tab-panel" id="panel-briefing">`;
    if(data.briefing){const fields={};for(const line of data.briefing.split('\n')){const m2=line.match(/^\[(.+?)\]\s*(.*)$/);if(m2)fields[m2[1]]=m2[2]||'-'};for(const[cat,keys]of Object.entries(CATEGORIES)){const rows=keys.filter(k=>fields[k]);if(!rows.length)continue;h+=`<div class="cat-group"><div class="cat-label">${cat.toUpperCase()}</div>`;for(const k of rows)h+=`<div class="field-row"><span class="field-key">${esc(k)}</span><span class="field-val">${esc(fields[k])}</span></div>`;h+=`</div>`}}
    h+=`</div>`;
    // Review
    h+=`<div class="tab-panel" id="panel-review">`;
    h+=data.reports&&data.reports['review']?`<div class="report-content">${md(data.reports['review'])}</div>`:`<p style="color:#6E6E73">No data</p>`;
    h+=`</div>`;
    // Recon
    h+=`<div class="tab-panel" id="panel-recon">`;
    if(data.reports&&data.reports['scout'])h+=`<div class="cat-label">기획팀 시니어 (조사)</div><div class="report-content">${md(data.reports['scout'])}</div>`;
    if(data.reports&&data.reports['estimator'])h+=`<div class="cat-label" style="margin-top:24px">기획팀 주니어 (산정)</div><div class="report-content">${md(data.reports['estimator'])}</div>`;
    if(!data.reports||(!data.reports['scout']&&!data.reports['estimator']))h+=`<p style="color:#6E6E73">No data</p>`;
    h+=`</div>`;
    // 6-Pager
    h+=`<div class="tab-panel" id="panel-pager">`;
    h+=data.reports&&data.reports['strategy']?`<div class="report-content">${md(data.reports['strategy'])}</div>`:`<p style="color:#6E6E73">No data</p>`;
    h+=`</div>`;
    // Plan
    h+=`<div class="tab-panel" id="panel-plan">`;
    h+=data.reports&&data.reports['engineering']?`<div class="report-content">${md(data.reports['engineering'])}</div>`:`<p style="color:#6E6E73">No data</p>`;
    h+=`</div>`;
    m.innerHTML=h;
}
const list=document.getElementById('versionList');
INDEX.versions.forEach((v,i)=>{
    const d=document.createElement('div');d.className='version-item'+(i===0?' active':'');
    const ver=v.file.match(/v(\d+)/);
    d.innerHTML=`<div class="vi-ver">v${ver?ver[1]:'?'}</div><div class="vi-title">${esc(v.title.replace(/^v\d+\s*--\s*/,''))}</div><div class="vi-date">${v.date} ${v.time||''}</div>`;
    d.onclick=()=>{document.querySelectorAll('.version-item').forEach(e=>e.classList.remove('active'));d.classList.add('active');if(VERSIONS[v.file])render(VERSIONS[v.file])};
    list.appendChild(d);
});
if(INDEX.versions.length>0&&VERSIONS[INDEX.versions[0].file])render(VERSIONS[INDEX.versions[0].file]);
</script>
</body></html>
